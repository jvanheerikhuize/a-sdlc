# =============================================================================
# Infrastructure Security Baseline Report Template
# =============================================================================
# Produced during Step 5.4 by control SC-16.
# Records production environment configuration scan against approved security
# baseline. Any deviations must be resolved or formally accepted by SA before
# deployment proceeds.
#
# Retention: 7 years (DORA Art. 8(6)).
#
# Usage:
#   Copy: cp infrastructure-security-report.yaml FEAT-XXXX-infrastructure-security-report.yaml
# =============================================================================

feat_id: ""                        # FEAT-XXXX
stage: 5
control: SC-16
scanned_at: ""                     # ISO 8601 datetime
environment: ""                    # Production environment name/identifier
baseline_ref: ""                   # Reference to approved security baseline version

checks:
  patching:
    status: ""                     # compliant | deviations_found | not_checked
    unpatched_critical: 0
    unpatched_high: 0
    notes: ""
  access_control:
    status: ""
    deviations: 0
    notes: ""
  network_segmentation:
    status: ""
    deviations: 0
    notes: ""
  iac_compliance:
    status: ""
    deviations: 0
    notes: ""
  configuration_drift:
    status: ""
    drifted_resources: 0
    notes: ""

deviations: []
# Per-deviation entries, e.g.:
# - id: "ISB-001"
#   check_category: ""             # patching | access_control | network_segmentation | iac_compliance | configuration_drift
#   resource: ""
#   description: ""
#   severity: ""                   # critical | high | medium | low
#   resolution:
#     status: ""                   # open | resolved | accepted
#     resolved_at: ""
#     accepted_by: ""              # SA name (required for any accepted deviations)
#     acceptance_rationale: ""

summary:
  total_deviations: 0
  by_severity:
    critical: 0
    high: 0
    medium: 0
    low: 0
  unresolved_deviations: 0        # Must be 0 or formally accepted before deployment
  status: ""                       # passed | passed_with_accepted_risk | failed
  reviewed_by: ""                  # SA name (required if any deviations found)
  reviewed_at: ""                  # ISO 8601 datetime
