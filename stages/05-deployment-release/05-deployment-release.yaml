# =============================================================================
# Stage 5: Deployment & Release
# Lightweight stage definition — lists required controls by ID.
# Full control definitions: controls/[track]/[ID].yaml
# =============================================================================

number: 5
name: Deployment & Release
description: Execute the approved deployment with formal CAB sign-off, verified rollback procedures, and cryptographic artefact
  integrity checking. RC-06 CAB Approval is a mandatory human gate that cannot be delegated.

roles:
  - code: RENG
    name: Release Engineer
    execution_mode: autonomous
    responsibilities: Compiles release readiness checklist; prepares CAB submission; validates rollback; runs infrastructure and integrity checks
    ref: roles/RENG.yaml
  - code: REL
    name: Release Manager
    execution_mode: gated
    responsibilities: Reviews and approves release readiness checklist and rollback plan; orchestrates deployment execution
    ref: roles/REL.yaml
  - code: RO
    name: Risk Officer
    execution_mode: gated
    responsibilities: Makes the formal CAB approval decision for high-risk changes
    ref: roles/RO.yaml
  - code: SA
    name: Security Architect
    execution_mode: gated
    responsibilities: Reviews infrastructure security baseline deviations; investigates deployment integrity failures
    ref: roles/SA.yaml
  - code: OPS
    name: Operations / SRE
    execution_mode: gated
    responsibilities: Executes deployment pipeline; monitors smoke tests; manages hypercare window; confirms Stage 6 handover
    ref: roles/OPS.yaml
  - code: CO
    name: Compliance Officer
    execution_mode: gated
    responsibilities: Reviews approval records during regulatory audits
    ref: roles/CO.yaml

# Execution DAG: Machine-parseable sequencing (agents use this, not process.md)
# QC-09 compiles release package. RC-06 is the CAB approval gate (human-required).
# Steps 5.3–5.4 (RC-07, SC-16) run in parallel after approval.
# SC-17 (deployment integrity) runs immediately before deployment.
# SC-18 (secrets management) runs in parallel with RC-07/SC-16.
workflow:
  nodes:
    - id: n-qc5a
      step_number: "5.1"
      title: Release Readiness Checklist
      control: QC-09
      description: Release readiness checklist
      delegation: "Agent compiles, REL approves"
      depends_on: []
      actors:
        - role: AGT
          action: Query audit trail (GC-01) to confirm all prior stage controls were executed and passed
        - role: AGT
          action: Confirm Stage 4 RC-05 result is pass or approved conditional pass
        - role: AGT
          action: Verify documentation is current and release package is complete
        - role: AGT
          action: Flag any gaps in control evidence
        - role: REL
          action: Review completed checklist; approve release package or require resolution of gaps
      input: "Audit trail (GC-01) + Stage 4 risk threshold evaluation (RC-05 output)"
      output: "Release readiness checklist (artifacts/outputs/release-readiness-checklist.yaml)"
      on_failure: "Gaps in prior control evidence block the release; must be resolved before seeking CAB approval"
    - id: n-rc5a
      step_number: "5.2"
      title: CAB Approval
      control: RC-06
      description: CAB (Change Advisory Board) approval (human-required gate)
      delegation: Human required
      depends_on: [n-qc5a]
      actors:
        - role: AGT
          action: Prepare change approval request with full release readiness package; schedule CAB slot if required
        - role: RO
          action: Review the full evidence package and make the formal approval decision
        - role: RO
          action: "Approve: record identity, role, and timestamp; advance to Steps 5.3 and 5.4"
        - role: RO
          action: "Reject: document rejection reason; work may return to any required stage"
      input: "Release readiness checklist (Step 5.1 output) + Stage 1 risk classification"
      output: "Change approval record (artifacts/outputs/change-approval-record.yaml)"
      on_failure: "Deployment blocked; rejection reason documented; escalate to determine required remediation"
      tables:
        - title: "Approval authority by risk tier"
          columns: [Risk Tier, Required Approval Authority]
          rows:
            - [critical, "Change Advisory Board (full CAB)"]
            - [high, "Change Advisory Board (full CAB)"]
            - [medium, "Line management"]
            - [low, "Pre-approved standard change procedure"]
    - id: n-rc5b
      step_number: "5.3"
      title: Rollback Plan Validation
      control: RC-07
      description: Rollback plan validation
      delegation: "Agent validates, REL approves"
      depends_on: [n-rc5a]
      actors:
        - role: AGT
          action: "Validate rollback plan completeness: triggers, procedure steps, decision authority, time window"
        - role: AGT
          action: Execute rollback procedure test in pre-production environment; record execution time
        - role: AGT
          action: Report test results
        - role: REL
          action: Review rollback test results; approve plan or require improvements before deployment
      input: "Rollback plan draft + pre-production environment access"
      output: "Rollback plan validation report (artifacts/outputs/rollback-plan.yaml)"
      on_failure: "Deployment blocked if rollback cannot be validated in pre-production"
    - id: n-sc5a
      step_number: "5.4"
      title: Infrastructure Security Baseline
      control: SC-16
      description: Infrastructure security baseline validation
      delegation: Fully automated
      depends_on: [n-rc5a]
      actors:
        - role: AGT
          action: Scan production environment configuration against approved security baseline
        - role: AGT
          action: "Check: patching status, access control configurations, network segmentation, IaC compliance, configuration drift"
        - role: SA
          action: Review any deviations; resolve before deployment or provide documented risk acceptance
      input: "Production environment + approved security baseline configuration"
      output: "Infrastructure security baseline report (artifacts/outputs/infrastructure-security-report.yaml)"
      on_failure: "Deviations block deployment until resolved or formally accepted by SA"
    - id: n-sc5c
      step_number: "5.4-secrets"
      title: Secrets & Key Management Lifecycle
      control: SC-18
      description: Secrets and key management lifecycle validation
      delegation: Fully automated
      depends_on: [n-rc5a]
      actors:
        - role: AGT
          action: Verify all secrets and encryption keys for the deployment are properly vaulted and accessible
        - role: AGT
          action: Validate key rotation schedules and access control policies
        - role: SA
          action: Review vaulting configuration; approve or require remediation
      input: "Deployment configuration + secret vault configuration"
      output: "Secrets management validation report (artifacts/outputs/secrets-management-report.yaml)"
      on_failure: "Deployment blocked if secrets are not properly vaulted or access-controlled"
    - id: n-sc5b
      step_number: "5.5"
      title: Deployment Integrity Verification
      control: SC-17
      description: Deployment integrity verification (immediately before deploy)
      delegation: Fully automated
      depends_on: [n-rc5b, n-sc5a, n-sc5c]
      actors:
        - role: AGT
          action: Compute cryptographic checksums of artefacts staged for production deployment
        - role: AGT
          action: Compare against checksums of artefacts tested in Stage 4
        - role: AGT
          action: "Match: record verification and advance to Step 5.6"
        - role: AGT
          action: "Mismatch: block deployment immediately; notify SA; initiate security incident process"
      input: "Staged deployment artefacts + Stage 4 tested artefact checksums"
      output: "Deployment integrity verification record (artifacts/outputs/deployment-integrity-record.yaml)"
      on_failure: "Deployment immediately blocked; security incident process initiated; SA investigates before any retry"
      note: "This check runs immediately before deployment execution. Any integrity failure halts the deployment and initiates a security incident process."
    - id: n-handover
      step_number: "5.6"
      title: Deploy & Handover
      control: null
      description: Deployment execution and Stage 6 handover
      delegation: "Agent executes pipeline, OPS confirms"
      depends_on: [n-sc5b]
      actors:
        - role: AGT
          action: Execute deployment via approved pipeline
        - role: OPS
          action: Execute smoke tests against production
        - role: OPS
          action: Confirm service health and enter hypercare window
        - role: OPS
          action: Activate Stage 6 monitoring profile
        - role: OPS
          action: Confirm Stage 6 handover; record handover timestamp
      input: "Verified deployment artefacts (Step 5.5 output)"
      output: "Handover confirmation recorded in deployment integrity record"
      on_failure: "Initiate rollback per validated rollback plan (Step 5.3 output); do not remain in partial deployment state"
  parallelism:
    max_concurrent: 3
    groups:
      - [n-rc5b, n-sc5a, n-sc5c]

required_controls:
- id: QC-09
- id: RC-06
  note: Human-required gate — cannot be delegated to an agent
- id: RC-07
- id: SC-16
- id: SC-17
  note: Must run immediately before deployment execution
- id: SC-18
  note: Verify all secrets and keys are properly vaulted, rotated, and access-controlled
- id: AC-04
  note: Applicable when change involves AI models — verify deployed model version matches registry
exit_criteria:
- 'QC-09: Release readiness checklist completed — all prior controls evidenced'
- 'RC-06: CAB approval granted by appropriate authority'
- 'RC-07: Rollback plan validated and tested in pre-production'
- 'SC-16: Infrastructure security baseline validated — no unresolved deviations'
- 'SC-17: Deployment integrity verified — artefact checksums match tested build'
- 'SC-18: All secrets/keys validated for proper vaulting, rotation, and access control'
next_stage: 6
artifacts:
  inputs:
    - ../04-testing-documentation/artifacts/outputs/RC-05-risk-threshold-evaluation.yaml
    - ../03-coding-implementation/artifacts/outputs/QC-04-pull-request-record.yaml
  outputs:
    - artifacts/outputs/QC-09-release-readiness-checklist.yaml
    - artifacts/outputs/RC-06-change-approval-record.yaml
    - artifacts/outputs/RC-07-rollback-plan.yaml
    - artifacts/outputs/SC-16-infrastructure-security-report.yaml
    - artifacts/outputs/SC-17-deployment-integrity-record.yaml
    - artifacts/outputs/SC-18-secrets-management-report.yaml
