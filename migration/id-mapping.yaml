# =============================================================================
# Control ID Migration Mapping
# =============================================================================
# Old format: [Track]-[Stage][Letter] (e.g., SC-2B)
# New format: [Track]-[NN] (e.g., SC-02)
#
# Numbering: cross-cutting first, then sequential by primary stage.
# Future controls append at end of track sequence.
# =============================================================================

version: "1.0"
description: "Migration mapping from stage-embedded IDs to sequential IDs"
old_format: "[Track]-[Stage][Letter]"
new_format: "[Track]-[NN]"
old_regex: "^(QC|RC|SC|AC|GC)-[0-6][A-Z]$"
new_regex: "^(QC|RC|SC|AC|GC)-\\d{2}$"

