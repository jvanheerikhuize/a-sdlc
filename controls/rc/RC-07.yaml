# =============================================================================
# Control: RC-07 — Rollback Plan Validation
# Track:   RC (Risk Controls)
# Owner:   Engineering / Release Management / Release Manager
# Schema:  ../../../schema/control.schema.json
# =============================================================================

id: RC-07
moscow_score: should
name: Rollback Plan Validation
description: 'Verify the rollback strategy: define specific triggers that will initiate a rollback, test the rollback procedure
  in a pre-production environment, and confirm the decision authority for initiating rollback during a live deployment. The
  rollback procedure must be executable within a defined time window.'
required_in_stages:
- number: 5
  name: Deployment & Release
  mandatory: true
track:
  code: RC
  name: Risk Controls
delegation:
  pattern: agent_validates_human_approves
  human_display: Agent validates, human approves
  agent_role: Validate rollback plan completeness; execute rollback test in pre-production; report results.
  human_role: Review rollback test results; approve plan or require improvements before deployment.
owner:
  team: Engineering / Release Management
  role: Release Manager
  contact: ''
regulatory_mapping:
  dora:
  - article: Art. 11(6)
    obligation: ICT business continuity requirements including restoration procedures for failed changes
outputs:
- name: Rollback plan validation report
  type: evidence
  description: Rollback procedure, trigger conditions, decision authority, pre-production test results, and execution time.
  retention: 7 years (DORA)
failure_behaviour:
  action: block
  escalation_target: Release Manager
  description: Deployment is blocked if rollback cannot be validated in pre-production.
automation:
  frequency: per_release
dependencies:
- RC-06
metadata:
  version: '1.0'
  last_updated: '2026-03-02'
  status: approved
