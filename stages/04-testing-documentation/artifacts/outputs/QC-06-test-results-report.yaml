  negative:
    executed: 0
    passed: 0
    failed: 0
  boundary:
    executed: 0
    passed: 0
    failed: 0
  performance:
    executed: 0
    passed: 0
    failed: 0
    p95_latency_ms: null
    target_p95_latency_ms: null
  load:
    executed: 0
    passed: 0
    failed: 0
  stress:
    executed: 0
    passed: 0
    failed: 0
  accessibility:
    executed: 0
    passed: 0
    failed: 0
    standard: ""                   # e.g. WCAG 2.2 AA
  resilience:
    executed: 0
    passed: 0
