# =============================================================================
# A-SDLC Framework Documentation Generation Catalog
# =============================================================================
#
# Orchestration specification for automated documentation generation.
#
# SINGLE SOURCE OF TRUTH:
#   asdlc.yaml is the authoritative framework definition, including:
#   - Framework metadata (id, name, version, regulatory scope)
#   - Stages (number, name, workflow, controls, artifacts, directives)
#   - Control tracks, delegation patterns, roles
#   - Cross-cutting controls and feedback loops
#
# This file (catalog.yaml) defines:
#   - doc_generation targets: what to generate, from what source, using what template
#
# Load protocol (agent load sequence) is derived from asdlc.yaml:stages during generation.
#
# To update documentation:
#   1. Edit the YAML sources (asdlc.yaml, stages/*.yaml, controls/*.yaml)
#   2. Run: python3 scripts/generate-docs.py
#   3. Generated files (README.md, AGENTS.md, context/*.md) are updated automatically
#
# DO NOT edit generated .md files directly.
# =============================================================================

doc_generation:
  templates_dir: scripts/templates/
  generator_script: scripts/generate-docs.py
  targets:
    # Root documentation
    - source: asdlc.yaml
      template: framework-overview
      output: README.md
      description: "Root README: framework overview, stages, control framework, and regulatory compliance"

    - source: asdlc.yaml
      template: agents
      output: AGENTS.md
      description: "Agent entrypoint: controls, delegation patterns, lifecycle navigation"

    # Stage-specific documentation
    - source: stages/01-intent-ingestion/01-intent-ingestion.yaml
      template: stage-readme
      output: stages/01-intent-ingestion/README.md
      description: "Stage 1 overview, workflow, and controls"

    - source: stages/02-system-design/02-system-design.yaml
      template: stage-readme
      output: stages/02-system-design/README.md
      description: "Stage 2 overview, workflow, and controls"

    - source: stages/03-coding-implementation/03-coding-implementation.yaml
      template: stage-readme
      output: stages/03-coding-implementation/README.md
      description: "Stage 3 overview, workflow, and controls"

    - source: stages/04-testing-documentation/04-testing-documentation.yaml
      template: stage-readme
      output: stages/04-testing-documentation/README.md
      description: "Stage 4 overview, workflow, and controls"

    - source: stages/05-deployment-release/05-deployment-release.yaml
      template: stage-readme
      output: stages/05-deployment-release/README.md
      description: "Stage 5 overview, workflow, and controls"

    - source: stages/06-observability-maintenance/06-observability-maintenance.yaml
      template: stage-readme
      output: stages/06-observability-maintenance/README.md
      description: "Stage 6 overview, workflow, and controls"

    # Stages overview documentation
    - source: asdlc.yaml
      template: stages-overview
      output: stages/README.md
      description: "Lifecycle stages overview, roles, and directory structure"

    # Control track documentation
    - source: controls/registry.yaml
      template: controls-index
      output: controls/README.md
      description: "Control registry and navigation guide"

    # Regulatory documentation
    - source: regulatory/
      template: regulatory-index
      output: regulatory/README.md
      description: "Regulatory compliance mapping and obligations"

    # Feedback loops documentation
    - source: feedbackloops/feedback-loops.yaml
      template: feedback-loops-guide
      output: feedbackloops/README.md
      description: "Feedback loop paths and re-entry procedures"

    # Agent context bundles (per-stage consolidated context)
    - source: stages/01-intent-ingestion/01-intent-ingestion.yaml
      template: stage-context-bundle
      output: context/stage-01-intent-ingestion.md
      description: "Agent context bundle for Stage 1 — all controls and workflow in one file"

    - source: stages/02-system-design/02-system-design.yaml
      template: stage-context-bundle
      output: context/stage-02-system-design.md
      description: "Agent context bundle for Stage 2 — all controls and workflow in one file"

    - source: stages/03-coding-implementation/03-coding-implementation.yaml
      template: stage-context-bundle
      output: context/stage-03-coding-implementation.md
      description: "Agent context bundle for Stage 3 — all controls and workflow in one file"

    - source: stages/04-testing-documentation/04-testing-documentation.yaml
      template: stage-context-bundle
      output: context/stage-04-testing-documentation.md
      description: "Agent context bundle for Stage 4 — all controls and workflow in one file"

    - source: stages/05-deployment-release/05-deployment-release.yaml
      template: stage-context-bundle
      output: context/stage-05-deployment-release.md
      description: "Agent context bundle for Stage 5 — all controls and workflow in one file"

    - source: stages/06-observability-maintenance/06-observability-maintenance.yaml
      template: stage-context-bundle
      output: context/stage-06-observability-maintenance.md
      description: "Agent context bundle for Stage 6 — all controls and workflow in one file"

