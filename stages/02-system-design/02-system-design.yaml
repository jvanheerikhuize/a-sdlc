# =============================================================================
# Stage 2: System Design
# Lightweight stage definition — lists required controls by ID.
# Full control definitions: controls/[track]/[ID].yaml
# =============================================================================

number: 2
name: System Design
description: Translate the approved specification into a complete, approved system design. Security directives are injected
  before coding begins. No implementation may start without RC-02 (design approval) and SC-02 directive injection confirmation.

roles:
  - code: ARCH
    name: Solution Architect
    execution_mode: autonomous
    responsibilities: Drafts system design; generates threat model; injects directives
    ref: roles/ARCH.yaml
  - code: LAD
    name: Lead Architect
    execution_mode: gated
    responsibilities: Validates and approves design completeness and standards compliance
    ref: roles/LAD.yaml
  - code: SA
    name: Security Architect
    execution_mode: gated
    responsibilities: Validates STRIDE threat model; signs and publishes directive payload
    ref: roles/SA.yaml
  - code: RO
    name: Risk Officer
    execution_mode: gated
    responsibilities: Makes formal design approval decision; determines sign-off authority by risk tier
    ref: roles/RO.yaml
  - code: AGL
    name: AI Governance Lead
    execution_mode: gated
    responsibilities: Reviews and approves AI component design (if AI component involved)
    ref: roles/AGL.yaml
  - code: CO
    name: Compliance Officer
    execution_mode: gated
    responsibilities: Reviews design records during regulatory audits
    ref: roles/CO.yaml

# Execution DAG: Machine-parseable sequencing (agents use this, not process.md)
# Steps 2.2, 2.3, 2.4 (plus SC-06, RC-03) run in parallel after QC-03 draft completes
workflow:
  nodes:
    - id: n-qc2a-draft
      step_number: "2.1"
      title: Draft System Design
      control: QC-03
      description: Draft system design
      delegation: "Agent drafts"
      depends_on: []
      actors:
        - role: AGT
          action: Parse approved feature specification; translate requirements into architecture
        - role: AGT
          action: Produce component diagram, integration map, data flow diagram, and technology decisions
        - role: AGT
          action: Map every requirement to a specific architectural component; flag any unmapped requirements
        - role: AGT
          action: Validate design coverage against organisational patterns; flag gaps and standards deviations
      input: "Approved feature specification (FEAT-XXXX)"
      output: "Draft design document (artifacts/outputs/design-document.yaml)"
      note: "Lead Architect review is at Step 2.2; this step only produces the draft"
    - id: n-qc2a-validate
      step_number: "2.2"
      title: Design Validation
      control: QC-03
      description: Validate design completeness and standards
      delegation: "Agent validates, LAD approves"
      depends_on: [n-qc2a-draft]
      actors:
        - role: LAD
          action: Review draft design; verify all requirements are mapped to architectural components
        - role: LAD
          action: Confirm design follows organisational architectural patterns and technology standards
        - role: LAD
          action: "Approve: advance to Step 2.5 package. Reject: return to Step 2.1 with documented gaps"
      input: "Draft design document"
      output: "Approved design document (artifacts/outputs/design-document.yaml — status: approved)"
      on_failure: "Design returned to Step 2.1; LAD documents required changes"
    - id: n-sc2a
      step_number: "2.3"
      title: STRIDE Threat Modelling
      control: SC-05
      description: Generate and validate STRIDE threat model
      delegation: "Agent generates, SA validates"
      depends_on: [n-qc2a-draft]
      actors:
        - role: AGT
          action: Identify all trust boundaries in the design
        - role: AGT
          action: "Generate STRIDE threat analysis across each trust boundary; propose mitigations for each threat"
        - role: SA
          action: Review threat model for completeness; validate proposed mitigations
        - role: SA
          action: "Accept: advance to Step 2.5 package. Reject: require design revision to address unmitigated threats"
      input: "Draft design document"
      output: "STRIDE threat model (artifacts/outputs/stride-threat-model.yaml)"
      on_failure: "Unmitigated critical or high threats block Stage 2. Design must be revised"
    - id: n-ac2a
      step_number: "2.4"
      title: AI Component Design Review
      control: AC-03
      description: AI component design review (conditional on ai_component)
      delegation: "Agent assists, AGL approves"
      depends_on: [n-qc2a-draft]
      condition: "Only applicable when the change introduces, modifies, or interacts with AI components. If not applicable, document as not_applicable and skip human confirmation."
      actors:
        - role: AGT
          action: Analyse design for AI component involvement
        - role: AGT
          action: "Validate model selection, data pipeline design, explainability mechanisms, and human oversight provisions against AI Act requirements"
        - role: AGL
          action: Review AI design validation; confirm or require revisions
      input: "Draft design document + AI tier classification from Stage 1"
      output: "AI component design review (artifacts/outputs/ai-component-design-review.yaml)"
      on_uncertainty: "Default to most restrictive AI Act obligations pending AGL resolution"
    - id: n-rc2b
      step_number: "2.3b"
      title: Privacy Impact Assessment
      control: RC-03
      description: Privacy Impact Assessment (conditional on processes_personal_data)
      delegation: "Agent generates, LAD reviews"
      depends_on: [n-qc2a-draft]
      condition: "Only applicable when the change processes personal data, involves profiling, or high-risk AI processing. If not applicable, document as not_applicable."
      actors:
        - role: AGT
          action: Identify all personal data processing activities in the design
        - role: AGT
          action: "Assess privacy risks across: lawfulness, necessity, minimization, retention, recipient access"
        - role: LAD
          action: "Review PIA; confirm privacy safeguards are adequate"
      input: "Draft design document"
      output: "Privacy Impact Assessment (artifacts/outputs/privacy-impact-assessment.yaml)"
      on_failure: "Unacceptable privacy risks block Stage 2; design must be revised"
    - id: n-sc2c
      step_number: "2.3c"
      title: Zero-Trust Architecture Validation
      control: SC-06
      description: Zero-trust architecture validation
      delegation: Fully automated
      depends_on: [n-qc2a-draft]
      actors:
        - role: AGT
          action: Validate design against zero-trust principles; verify all network segments require authentication
        - role: AGT
          action: Check encryption of all data in motion and at rest; verify principle of least privilege
        - role: SA
          action: Review validation results; approve or require mitigations
      input: "Draft design document"
      output: "Zero-trust validation report (artifacts/outputs/zero-trust-validation.yaml)"
      on_failure: "Critical deviations from zero-trust architecture block Stage 2"
    - id: n-rc2a
      step_number: "2.5"
      title: Design Approval
      control: RC-02
      description: Design approval (human-required gate)
      delegation: Human required
      depends_on: [n-qc2a-validate, n-sc2a, n-ac2a, n-rc2b, n-sc2c]
      actors:
        - role: AGT
          action: "Assemble approval package: design document, threat model, AI review (if applicable), risk tier"
        - role: RO
          action: Review approval package; make formal approval decision
        - role: RO
          action: "Approve: record decision with identity and timestamp; advance to Step 2.6"
        - role: RO
          action: "Reject: return to Step 2.1 with documented reasons; no coding may begin"
      input: "Approved design doc + STRIDE threat model + AI review + Stage 1 risk classification"
      output: "Design approval decision (artifacts/outputs/design-approval-decision.yaml)"
      on_failure: "Return to Step 2.1; document reason; revise design and restart parallel steps"
      tables:
        - title: "Sign-off authority by risk tier"
          columns: [Risk Tier, Required Authority]
          rows:
            - [critical, Senior Architecture Board]
            - [high, Senior Architecture Board]
            - [medium, Lead Architect]
            - [low, "Lead Architect (may be pre-approved)"]
    - id: n-ac2b
      step_number: "2.6"
      title: AI Model Governance and Version Control
      control: AC-04
      description: AI model governance and version control (conditional on ai_component)
      delegation: "Agent registers, AGL approves"
      depends_on: [n-rc2a]
      condition: "Only applicable when the change introduces or modifies use of a GPAI or foundation model. If not applicable, document as not_applicable."
      actors:
        - role: AGT
          action: Register all models in the model registry with versioning metadata
        - role: AGT
          action: Record model lineage, data sources, training dates, and performance baselines
        - role: AGL
          action: Approve model registry entries and version pinning
      input: "Approved design document + AI component design review"
      output: "AI model governance record (artifacts/outputs/ai-model-governance-record.yaml)"
      note: "Runs after design approval (RC-02)"
    - id: n-sc2b
      step_number: "2.7"
      title: Stage Directive Injection
      control: SC-02
      description: Stage directive injection confirmation
      delegation: Fully automated
      depends_on: [n-rc2a, n-ac2b]
      actors:
        - role: AGT
          action: Receive signed Stage 2 and Stage 3 directive payloads; load into agent context
        - role: AGT
          action: Acknowledge receipt of both payloads with confirmation
      input: "directives/stages/02-system-design.yaml · directives/stages/03-coding-implementation.yaml"
      output: "Directive injection confirmation (artifacts/outputs/directive-injection-confirmation.yaml)"
      on_failure: "Stage 2 completion is blocked; Stage 3 cannot begin until injection is confirmed"
  parallelism:
    max_concurrent: 5
    groups:
      - [n-qc2a-validate, n-sc2a, n-ac2a, n-rc2b, n-sc2c]

required_controls:
- id: QC-03
- id: RC-02
  note: Human-required gate — cannot be delegated to an agent
- id: RC-03
  note: Applicable when the change involves personal data, profiling, or high-risk AI systems
- id: SC-05
- id: SC-06
  note: Validate zero-trust architecture principles in design
- id: SC-02
  note: Directive injection must be confirmed before Stage 3 begins
- id: AC-03
  note: Applicable when the change involves an AI component
- id: AC-04
  note: Applicable when the change involves AI models — register in model registry
exit_criteria:
- 'QC-03: Design validated and approved by Lead Architect'
- 'RC-02: Design approval granted and logged'
- 'RC-03: Privacy Impact Assessment completed (if applicable)'
- 'SC-05: STRIDE threat model validated and all critical threats mitigated'
- 'SC-06: Zero-trust architecture principles validated'
- 'SC-02: Stage 2 and Stage 3 directive bundles injected and acknowledged by agent'
- 'AC-03: AI component design review approved (or not-applicable documented)'
- 'AC-04: AI model registry entry created with version pinning (if applicable)'
next_stage: 3
artifacts:
  inputs:
    - ../01-intent-ingestion/artifacts/outputs/QC-01-feature-spec.yaml
    - ../01-intent-ingestion/artifacts/outputs/RC-01-risk-classification.yaml
  outputs:
    - artifacts/outputs/QC-03-design-document.yaml
    - artifacts/outputs/SC-05-stride-threat-model.yaml
    - artifacts/outputs/RC-02-design-approval-decision.yaml
    - artifacts/outputs/SC-02-directive-injection-confirmation.yaml
    - artifacts/outputs/AC-03-ai-component-design-review.yaml
    - artifacts/outputs/RC-03-privacy-impact-assessment.yaml
    - artifacts/outputs/SC-06-zero-trust-validation.yaml
    - artifacts/outputs/AC-04-ai-model-governance-record.yaml
directives:
  - directives/stages/02-system-design.yaml
  - directives/stages/03-coding-implementation.yaml
