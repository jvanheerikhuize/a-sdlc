# =============================================================================
# Design Document Template
# =============================================================================
# Produced during Step 2.1 (draft) and Step 2.2 (approval) by control QC-2A.
# Records the approved system architecture for the change.
#
# Usage:
#   Copy: cp design-document.yaml FEAT-XXXX-design-document.yaml
# =============================================================================

feat_id: ""                        # FEAT-XXXX
stage: 2
control: QC-2A
drafted_at: ""                     # ISO 8601 datetime
approved_by: ""                    # Lead Architect name
approved_at: ""                    # ISO 8601 datetime
status: ""                         # draft | approved | requires_revision

components: []
# List of system components, e.g.:
# - id: COMP-001
#   name: ""
#   type: ""          # service | database | queue | gateway | library
#   description: ""
#   requirements_covered: []   # List of requirement IDs from feature spec

integrations: []
# List of integrations, e.g.:
# - id: INT-001
#   from: ""          # COMP-ID or external system name
#   to: ""
#   protocol: ""
#   data_classification: ""   # public | internal | confidential | restricted

data_flows: []
# Key data flows, e.g.:
# - id: FLOW-001
#   description: ""
#   source: ""
#   destination: ""
#   data_type: ""
#   encrypted_in_transit: null   # true | false

technology_decisions: []
# Technology choices with rationale, e.g.:
# - component: ""
#   technology: ""
#   rationale: ""
#   alternatives_considered: []

requirements_coverage:
  all_covered: null              # true | false — must be true before Stage 2 can exit
  unmapped_requirements: []      # Any requirements not mapped to a component

standards_compliance:
  compliant: null                # true | false
  violations: []                 # Any standards violations with remediation required

review_notes: ""                 # LAD review notes; populated during Step 2.2
