# =============================================================================
# Stage 3: Coding & Implementation — Controls
# =============================================================================
# Schema: ../../schema/control.schema.json
# =============================================================================

controls:

  - id: QC-3A
    name: Pull Request Creation & Review
    description: >-
      All implementation work — whether produced by humans, agents, or both —
      converges into a pull request that includes evidence from every other
      Stage 3 control. The PR must be reviewed and approved by the appropriate
      number of reviewers before merge. Reviewer count and seniority are
      determined by the risk classification from RC-1A.
    stage:
      number: 3
      name: Coding & Implementation
    track:
      code: QC
      name: Quality Controls
    delegation:
      pattern: agent_creates_human_reviews
      human_display: Agent creates, human reviews
      agent_role: Create pull request with all Stage 3 control evidence attached; assign reviewers per risk tier.
      human_role: Review all evidence; review code; approve or request changes; log approval with identity and timestamp.
    owner:
      team: Engineering
      role: Tech Lead
      contact: ""
    regulatory_mapping:
      dora:
        - article: "Art. 8(5)"
          obligation: Documented procedures for ICT change management including peer review
      dnb:
        - area: Four-eyes principle for code changes
          requirement: All code changes require independent review before merge
    inputs:
      - name: Implementation code
        description: Code produced by human developers, agents, or both during Stage 3.
      - name: Stage 3 control evidence
        description: Evidence artefacts from QC-3B, RC-3A, SC-3A, SC-3B, SC-3C, and GC-3A.
    outputs:
      - name: Approved pull request
        type: artefact
        description: Merged PR with full evidence package and reviewer approvals recorded.
        retention: 7 years (DORA)
    failure_behaviour:
      action: block
      escalation_target: Tech Lead
      description: PRs with failing controls or unresolved review comments cannot be merged.
    automation:
      frequency: per_change
    dependencies:
      - QC-3B
      - RC-3A
      - SC-3A
      - SC-3B
      - SC-3C
      - GC-3A
    feedback_loops:
      - path: path_a_autofix
        required_in_path: true
      - path: path_b_quickfix
        required_in_path: true
    metadata:
      version: "1.0"
      last_updated: "2026-03-02"
      status: approved

  - id: QC-3B
    name: Code Quality Standards
    description: >-
      Enforce automated code quality standards continuously during implementation:
      linting, cyclomatic complexity thresholds, coding standards compliance,
      and maintainability metrics. Blocks commits that fall below defined
      quality thresholds.
    stage:
      number: 3
      name: Coding & Implementation
    track:
      code: QC
      name: Quality Controls
    delegation:
      pattern: fully_automated
      human_display: Fully automated
      agent_role: Run quality checks on every commit; report violations; block commits that exceed thresholds.
      human_role: Configure thresholds; review and triage recurring violations; update standards as needed.
    owner:
      team: Engineering
      role: Tech Lead
      contact: ""
    regulatory_mapping:
      dora:
        - article: "Art. 8(4)"
          obligation: ICT systems must be built to minimise ICT risk through quality controls
      dnb:
        - area: Software quality assurance requirements
          requirement: Automated quality gates must be applied to all code changes
      eu_ai_act:
        - article: "Art. 15(1)"
          requirement: AI systems must be designed for appropriate levels of accuracy and reliability
    outputs:
      - name: Quality gate report
        type: evidence
        description: Per-commit quality scan results including metrics and any threshold violations.
        retention: 7 years (DORA)
    failure_behaviour:
      action: block
      escalation_target: Tech Lead
      description: Commits failing quality thresholds are blocked. Developer must resolve violations before re-committing.
    automation:
      tooling:
        - Linter (language-specific)
        - Complexity analyser
        - Standards checker
      frequency: per_change
    feedback_loops:
      - path: path_a_autofix
        required_in_path: true
      - path: path_b_quickfix
        required_in_path: true
    metadata:
      version: "1.0"
      last_updated: "2026-03-02"
      status: approved

  - id: RC-3A
    name: Decision Log
    description: >-
      Capture all significant implementation decisions — especially those made
      autonomously by agents — including the decision taken, rationale,
      alternatives considered, and the human who reviewed the decision. Provides
      the audit trail required by DORA and the AI Act.
    stage:
      number: 3
      name: Coding & Implementation
    track:
      code: RC
      name: Risk Controls
    delegation:
      pattern: agent_logs_human_reviews
      human_display: Agent logs, human reviews
      agent_role: Automatically log all autonomous decisions with rationale and alternatives considered.
      human_role: Periodically review decision log; flag decisions that should have been escalated.
    owner:
      team: Engineering
      role: Tech Lead
      contact: ""
    regulatory_mapping:
      dora:
        - article: "Art. 8(6)"
          obligation: Documentation of ICT risk management decisions throughout the change process
      dnb:
        - area: Decision audit trail for changes
          requirement: All implementation decisions must be recorded with rationale and reviewer identity
      eu_ai_act:
        - article: "Art. 12(1)"
          requirement: Automatic recording of events including agent decisions for high-risk AI systems
    outputs:
      - name: Implementation decision log
        type: log_entry
        description: Structured log of decisions made during implementation with rationale, alternatives, and reviewer attribution.
        retention: 7 years (DORA)
    failure_behaviour:
      action: log_and_continue
      escalation_target: Tech Lead
      description: Decisions that cannot be logged are escalated to Tech Lead for manual recording.
    automation:
      frequency: per_change
    feedback_loops:
      - path: path_a_autofix
        required_in_path: false
      - path: path_b_quickfix
        required_in_path: true
    metadata:
      version: "1.0"
      last_updated: "2026-03-02"
      status: approved

  - id: SC-3A
    name: Permission Management
    description: >-
      Enforce least-privilege access on all agent operations during implementation.
      Define and apply the permission boundary governing which files, APIs,
      databases, and network resources the agent may access. Any access attempt
      outside the defined boundary must be blocked and logged.
    stage:
      number: 3
      name: Coding & Implementation
    track:
      code: SC
      name: Security Controls
    delegation:
      pattern: automated_policy_enforced
      human_display: Automated (policy-enforced)
      agent_role: Operate strictly within defined permission boundary; log all access attempts.
      human_role: Define and maintain permission policies per agent trust tier; review access violation logs.
    owner:
      team: Security
      role: Security Architect
      contact: ""
    regulatory_mapping:
      dora:
        - article: "Art. 9(4)(c)"
          obligation: Access and identity management policies must govern all ICT systems including agents
      dnb:
        - area: Logical access management and separation of duties
          requirement: Least-privilege must be enforced on all automated processes
      eu_ai_act:
        - article: "Art. 15(4)"
          requirement: Protection against unauthorised third-party manipulation through access controls
    outputs:
      - name: Permission enforcement log
        type: evidence
        description: Log of all access requests, granted permissions, and blocked attempts during the implementation session.
        retention: 7 years (DORA)
    failure_behaviour:
      action: block
      escalation_target: Security Architect
      description: Out-of-boundary access attempts are blocked immediately and logged as security events.
    automation:
      frequency: per_change
    feedback_loops:
      - path: path_b_quickfix
        required_in_path: true
    metadata:
      version: "1.0"
      last_updated: "2026-03-02"
      status: approved

  - id: SC-3B
    name: Post-Guardrails
    description: >-
      Scan all agent-generated code for malicious patterns, backdoors, supply
      chain attacks, and adversarial constructs before the code is included in
      a pull request. Apply heightened scrutiny to agent-generated code compared
      to human-written code.
    stage:
      number: 3
      name: Coding & Implementation
    track:
      code: SC
      name: Security Controls
    delegation:
      pattern: fully_automated
      human_display: Fully automated
      agent_role: Scan all agent-generated code automatically; flag and block any detected malicious patterns.
      human_role: Review flagged code; investigate and resolve security findings.
    owner:
      team: Security
      role: Security Architect
      contact: ""
    regulatory_mapping:
      dora:
        - article: "Art. 9(2)"
          obligation: Protection and prevention of ICT systems from malicious code and integrity violations
      dnb:
        - area: Malware and code integrity controls
          requirement: All code must be scanned for malicious patterns before merge
      eu_ai_act:
        - article: "Art. 15(3)"
          requirement: Resilience against attempts to alter system use by exploiting vulnerabilities in the code
    outputs:
      - name: Post-guardrail scan result
        type: evidence
        description: Pass/fail result with details of any detected malicious patterns in agent-generated code.
        retention: 7 years (DORA)
    failure_behaviour:
      action: block
      escalation_target: Security Architect
      description: Detected malicious patterns block the PR from being created. Security team is notified immediately.
    automation:
      frequency: per_change
    feedback_loops:
      - path: path_a_autofix
        required_in_path: true
      - path: path_b_quickfix
        required_in_path: true
    metadata:
      version: "1.0"
      last_updated: "2026-03-02"
      status: approved

  - id: SC-3C
    name: Secrets & Credentials Scanning
    description: >-
      Scan all code changes in real-time for hardcoded secrets, API keys,
      passwords, tokens, connection strings, and certificates. Block any commit
      containing exposed credentials before it enters version control history.
    stage:
      number: 3
      name: Coding & Implementation
    track:
      code: SC
      name: Security Controls
    delegation:
      pattern: fully_automated
      human_display: Fully automated
      agent_role: Scan every commit for credential patterns; block commits containing matches.
      human_role: Review blocked commits; investigate false positives; remediate confirmed secrets.
    owner:
      team: Security
      role: Security Architect
      contact: ""
    regulatory_mapping:
      dora:
        - article: "Art. 9(4)(c)"
          obligation: Strong authentication and cryptographic key management policies
      dnb:
        - area: Credential and key management controls
          requirement: No credentials may be committed to version control in any form
    outputs:
      - name: Secrets scan result
        type: evidence
        description: Per-commit scan result confirming no credentials detected or listing blocked commits with findings.
        retention: 7 years (DORA)
    failure_behaviour:
      action: block
      escalation_target: Security Architect
      description: Commits containing secrets are blocked and cannot enter version control. Developer must remove the secret and rotate the credential.
    automation:
      frequency: per_change
    feedback_loops:
      - path: path_a_autofix
        required_in_path: true
      - path: path_b_quickfix
        required_in_path: true
    metadata:
      version: "1.0"
      last_updated: "2026-03-02"
      status: approved

  - id: GC-3A
    name: Code Provenance Tracking
    description: >-
      Tag all code with immutable provenance metadata identifying whether each
      contribution was written by a human, generated by an agent, or co-authored.
      Maintain an auditable record of agent contributions for DORA third-party
      accountability and EU AI Act record-keeping requirements.
    stage:
      number: 3
      name: Coding & Implementation
    track:
      code: GC
      name: Governance Controls
    delegation:
      pattern: fully_automated
      human_display: Fully automated
      agent_role: Tag all code with provenance metadata at the point of generation; write entries to the Agent Provenance Registry (GC-0C).
      human_role: Review provenance reports during audits; confirm attribution accuracy.
    owner:
      team: Governance & Compliance
      role: Compliance Officer
      contact: ""
    regulatory_mapping:
      dora:
        - article: "Art. 8(6)"
          obligation: Traceability of ICT changes including identification of all contributors
      dnb:
        - area: Auditability of development activities
          requirement: Immutable record of human vs. agent contributions to all code changes
      eu_ai_act:
        - article: "Art. 12"
          requirement: Record-keeping requirements for high-risk AI systems including output attribution
        - article: "Art. 17(1)(f)"
          requirement: Quality management system documentation of AI system contributions
    outputs:
      - name: Code provenance record
        type: registry_entry
        description: Per-contribution entry in the Agent Provenance Registry attributing code to human, agent, or co-authored.
        retention: 7 years (DORA)
    failure_behaviour:
      action: block
      escalation_target: Compliance Officer
      description: Code without provenance tags cannot be included in a pull request.
    automation:
      frequency: per_change
    feedback_loops:
      - path: path_a_autofix
        required_in_path: true
      - path: path_b_quickfix
        required_in_path: true
    metadata:
      version: "1.0"
      last_updated: "2026-03-02"
      status: approved
