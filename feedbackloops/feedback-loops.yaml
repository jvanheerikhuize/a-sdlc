# =============================================================================
# Feedback Loops
# =============================================================================
# Defines the re-entry paths by which issues detected in Stage 4
# (Testing & Documentation) or Stage 6 (Observability & Maintenance)
# flow back into the lifecycle.
# Each path specifies the minimum controls that must be re-executed.
#
# Process (roles, steps, decision points): process.md
# Artifacts: artifacts/outputs/
#
# Regulatory basis:
#   DORA Art. 8(1)  — ICT risk management framework must cover ALL changes.
#                     No exception for urgency.
#   DORA Art. 8(5)  — Even expedited changes must follow documented procedures.
#   DORA Art. 17(3) — Incident response and recovery requirements.
# =============================================================================

process: feedback-loops.yaml

roles:
  - role_code: AGT
    role_name: Agent
    responsibilities: "Detects Stage 4 or Stage 6 trigger; prepares activation record; re-executes minimum controls on Path A"
  - role_code: OPS
    role_name: "Operations / SRE"
    responsibilities: "First responder to Stage 6 alerts; co-classifies path; monitors Path A execution"
  - role_code: QA
    role_name: QA Lead
    responsibilities: "First responder to Stage 4 failures; co-classifies path; confirms root cause from test output"
  - role_code: SA
    role_name: Security Architect
    responsibilities: "Validates path classification for SC-4A, SC-4B, SC-6A, and SC-6B triggers; confirms root cause before Path A is approved"
  - role_code: RO
    role_name: Risk Officer
    responsibilities: "Makes the formal path selection and classification decisions; provides signed approval for any Path B selection"
  - role_code: CO
    role_name: Compliance Officer
    responsibilities: "Reviews activation record; confirms DORA Art. 8 reporting obligations are documented"

input_artifacts:
  stage4:
    - artifact: SAST scan report
      source_control: SC-4A
      source_step: "Step 4.1"
    - artifact: Test results report
      source_control: QC-4A
      source_step: "Step 4.2"
    - artifact: DAST scan report
      source_control: SC-4B
      source_step: "Step 4.3"
    - artifact: Risk threshold evaluation
      source_control: RC-4A
      source_step: "Step 4.7"
  stage6:
    - artifact: SLO monitoring record
      source_control: QC-6A
      source_step: "Step 6.2"
    - artifact: Risk & health monitoring record
      source_control: RC-6A
      source_step: "Step 6.3"
    - artifact: Incident detection record
      source_control: SC-6A
      source_step: "Step 6.4"
    - artifact: Anomaly detection record
      source_control: SC-6B
      source_step: "Step 6.5"
    - artifact: AI post-market surveillance report
      source_control: AC-6A
      source_step: "Step 6.6"

steps:
  - id: FL.1
    name: Path Classification
    delegation: human_required
    delegation_description: "Human required — Runs first — blocks re-entry until path is formally approved"
    runs: "Every activation"
    actions:
      - actor: "AGT"
        action: "Retrieve the trigger: source stage (4 or 6), originating control, alert or finding ID, issue description"
      - actor: "OPS / QA"
        action: "Assess issue scope, urgency, and affected components; provide initial path recommendation"
      - actor: "SA"
        action: "For SC-4A, SC-4B, SC-6A, or SC-6B triggers: confirm root cause is understood before any path is approved"
      - actor: "RO"
        action: "Make the formal path selection decision: Path A or Path B"
      - actor: "RO"
        action: "Record identity, role, timestamp, rationale, and selected path in the activation record"
    eligibility_stage6:
      - condition: "Issue matches a pre-approved autofix template exactly (no partial matches)"
        check: "AGT verifies against template registry"
      - condition: "Risk classification of the issue is low"
        check: "RO confirms"
      - condition: "No new architectural changes are required"
        check: "OPS confirms"
      - condition: "Root cause is understood (for security-triggered issues: SA confirms)"
        check: "SA / OPS confirms"
    eligibility_stage4:
      - condition: "Root cause is unambiguous from the failing control output"
        check: "QA / SA confirms"
      - condition: "Risk classification is low"
        check: "RO confirms"
      - condition: "No new architectural changes are required"
        check: "QA confirms"
      - condition: "Fix is isolated to code only — no schema, API, or contract changes"
        check: "QA confirms"
    inputs:
      - "Stage 4 or Stage 6 trigger record"
    outputs:
      - "Signed path selection (Path A or Path B) recorded in the activation record"
    on_ambiguity: "Default to Path B — never assume Path A eligibility under uncertainty"

  - id: FL.2A
    name: "Path A: Quick Fix"
    delegation_description: "Agent executes minimum control set, OPS/QA monitors — Runs after FL.1 (Path A selected)"
    runs: "Path A selected"
    path_ref: path_a
    actions:
      - actor: "AGT"
        action: "For Stage 6 triggers: retrieve the matched pre-approved autofix template; verify exact signature match"
      - actor: "AGT"
        action: "Execute minimum controls in sequence: Stage 3 group, then Stage 4 group, then Stage 5 check"
      - actor: "AGT"
        action: "For Stage 4 triggers: additionally re-execute the specific Stage 4 control(s) that raised the issue"
      - actor: "AGT"
        action: "At any deviation from expected scope during execution: stop immediately; escalate to OPS/QA; upgrade to Path B"
      - actor: "OPS / QA"
        action: "Monitor execution continuously; validate no out-of-scope actions are taken"
    inputs:
      - "Stage 4 failing control output or matched Stage 6 autofix template + trigger record"
    outputs:
      - "All minimum controls passed; change deployed via SC-5B; activation record updated"
    on_deviation: "Immediately upgrade to Path B — do not attempt to continue with modifications"

  - id: FL.2B
    name: "Path B: Full Re-entry"
    delegation_description: "Full lifecycle from Stage 1 — Runs after FL.1 (Path B selected) or upgrade from FL.2A"
    runs: "Path B selected or FL.2A deviation"
    path_ref: path_b
    actions:
      - actor: "OPS / QA"
        action: "Initiate Stage 1 re-entry; create a new FEAT-XXXX change request referencing the Stage 4 or Stage 6 trigger"
      - actor: "All actors"
        action: "Execute the full lifecycle: Stages 1 → 2 → 3 → 4 → 5 → Stage 6 monitoring re-activation"
    inputs:
      - "Path B selection from FL.1 (or deviation upgrade from FL.2A)"
    outputs:
      - "New FEAT-XXXX proceeding through full lifecycle; Stage 4/6 trigger linked in feature specification"
    linkage: "The trigger record ID must appear in the FEAT-XXXX feature specification's dependencies field"
    on_ambiguity: "Default to Path B — the full lifecycle is always the safe choice"

  - id: FL.3
    name: "Activation Record & Handover"
    delegation_description: "Agent creates, CO reviews — Runs at completion of every path"
    runs: "Every activation"
    actions:
      - actor: "AGT"
        action: "Complete the feedback-loop activation record: trigger source (Stage 4 or 6), control ID, path selected, approvals, re-entry ID, outcome"
      - actor: "AGT"
        action: "Link activation record to the GC-0A audit trail and to the resulting change's Stage 3 or Stage 1 evidence package"
      - actor: "CO"
        action: "Review activation record; confirm DORA Art. 8 documentation obligations are met"
      - actor: "CO"
        action: "For SC-6A-triggered loops: confirm DORA Art. 19 reporting timelines are not impacted by the re-entry"
    outputs:
      - "Activation record (artifacts/outputs/feedback-loop-activation-record.yaml)"
    retention: "7 years (DORA Art. 8(6))"

output_artifacts:
  - artifact: Feedback Loop Activation Record
    produced_at: Step FL.3
    template: artifacts/outputs/feedback-loop-activation-record.yaml

artifacts:
  outputs:
    - artifacts/outputs/feedback-loop-activation-record.yaml

autofix_templates_dir: feedbackloops/autofix-templates/

feedback_loops:

  - id: path_a
    name: Path A — Quick Fix → Stage 3
    trigger_sources:
      - stage: 6
        name: Observability & Maintenance
        source_controls: [QC-6A, RC-6A, SC-6A, SC-6B, AC-6A]
        description: Alert or incident detected during continuous Stage 6 monitoring.
        eligibility:
          - Issue matches a pre-approved autofix template exactly (no partial matches).
          - Risk classification is low.
          - No new architectural changes are required.
          - Root cause is confirmed (SA sign-off required for SC-6A and SC-6B triggers).
      - stage: 4
        name: Testing & Documentation
        source_controls: [SC-4A, QC-4A, SC-4B, QC-4B, AC-4A, QC-4C, RC-4A]
        description: >-
          Test failure, SAST/DAST finding, AI validation failure, or documentation
          gap detected during Stage 4.
        eligibility:
          - Root cause is unambiguous from the failing control output.
          - Risk classification is low.
          - No new architectural changes are required.
          - Fix is isolated to code only — no schema, API, or contract changes.
    re_entry_stage: 3
    re_entry_stage_name: Coding & Implementation
    description: >-
      For easy, obvious, low-risk issues with a clear root cause. Re-enters
      directly at Stage 3. If any eligibility condition is not met, Path B is
      mandatory — no exceptions. When triggered from Stage 4, the specific
      Stage 4 control(s) that raised the issue must be re-executed in addition
      to the minimum control set below.
    minimum_controls:
      - id: QC-3A
        name: Pull Request Creation & Review
        rationale: All code changes must be reviewed before merge.
      - id: QC-3B
        name: Code Quality Standards
        rationale: Automated quality checks apply to all fixes.
      - id: SC-3B
        name: Post-Guardrails
        rationale: Agent-generated fix must be scanned for malicious patterns.
      - id: SC-3C
        name: Secrets & Credentials Scanning
        rationale: Fix must not introduce exposed credentials.
      - id: GC-3A
        name: Code Provenance Tracking
        rationale: Fix output must be attributed to the agent or developer that produced it.
      - id: QC-4A
        name: Functional & Non-Functional Testing
        rationale: Fix must be tested before deployment.
      - id: SC-4A
        name: SAST
        rationale: Static security analysis is mandatory even for expedited paths.
      - id: RC-4A
        name: Risk Threshold Evaluation
        rationale: Residual risk must be assessed before deployment.
      - id: SC-5B
        name: Deployment Integrity
        rationale: Cryptographic verification that tested artefact matches deployed artefact.
    regulatory_mapping:
      dora:
        - article: "Art. 8(5)"
          obligation: Even expedited changes must follow documented procedures.
        - article: "Art. 17(3)"
          obligation: Incident response and recovery must follow defined procedures.

  - id: path_b
    name: Path B — Full Re-entry → Stage 1
    trigger_sources:
      - stage: 6
        name: Observability & Maintenance
      - stage: 4
        name: Testing & Documentation
    re_entry_stage: 1
    re_entry_stage_name: Intent Ingestion
    description: >-
      For any issue not meeting Path A eligibility: complex bugs, new functionality
      requirements, architectural changes, or cases where root cause is unclear.
      Re-enters at Stage 1 for complete processing through all six stages.
      No controls are skipped. The change is treated as a new feature request.
    minimum_controls:
      scope: full_lifecycle
      stages:
        - number: 1
          controls: [SC-1A, QC-1A, QC-1B, RC-1A, AC-1A, GC-1A]
        - number: 2
          controls: [SC-2B, QC-2A, RC-2A, SC-2A, AC-2A]
        - number: 3
          controls: [SC-3A, QC-3B, RC-3A, SC-3B, SC-3C, QC-3A, GC-3A]
        - number: 4
          controls: [SC-4A, QC-4A, SC-4B, QC-4B, AC-4A, QC-4C, RC-4A]
          note: QC-4B and AC-4A applicable only if AI components are involved.
        - number: 5
          controls: [QC-5A, RC-5A, RC-5B, SC-5A, SC-5B]
        - number: 6
          controls: [QC-6A, RC-6A, SC-6A, SC-6B, AC-6A]
          note: Stage 6 monitoring must be re-activated after the change is deployed.
    regulatory_mapping:
      dora:
        - article: "Art. 8(1)"
          obligation: ICT risk management framework must cover all changes. No exception for urgency.
