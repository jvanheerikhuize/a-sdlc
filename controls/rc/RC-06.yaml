# =============================================================================
# Control: RC-06 — CAB Approval
# Track:   RC (Risk Controls)
# Owner:   Risk Management / Release Management / Change Advisory Board
# Schema:  ../../../schema/control.schema.json
# =============================================================================

id: RC-06
moscow_score: must
name: CAB Approval
description: 'Formal change approval from the appropriate authority based on risk classification: high-risk changes require
  Change Advisory Board (CAB) approval; medium-risk requires line management; low-risk may use a pre-approved standard change
  procedure. This control cannot be delegated to an agent under any circumstances.'
required_in_stages:
- number: 5
  name: Deployment & Release
  mandatory: true
track:
  code: RC
  name: Risk Controls
delegation:
  pattern: human_required
  human_display: Human required
  agent_role: Prepare change approval request with full evidence package; schedule CAB slot if required.
  human_role: Make the formal approval decision. This control cannot be delegated to an agent under any circumstances.
owner:
  team: Risk Management / Release Management
  role: Change Advisory Board
  contact: ''
regulatory_mapping:
  dora:
  - article: Art. 8(1)
    obligation: Governance and control of ICT changes requires formal approval at appropriate authority level
  - article: Art. 5
    obligation: Management body accountability for ICT risk framework and change approvals
inputs:
- name: Release readiness checklist
  source_control: QC-09
  description: Completed checklist confirming all controls passed; forms the basis of the CAB submission.
- name: Risk classification
  source_control: RC-01
  description: Determines required approval authority (CAB vs. line management vs. pre-approved).
outputs:
- name: Change approval record
  type: decision
  description: Formal approval decision with approver identity, role, timestamp, and any conditions.
  retention: 7 years (DORA)
failure_behaviour:
  action: block
  escalation_target: Change Advisory Board
  description: Rejected changes cannot proceed to deployment. Work may return to any required stage.
automation:
  frequency: per_release
dependencies:
- QC-09
feedback_loops:
- path: path_b
  required_in_path: true
metadata:
  version: '1.0'
  last_updated: '2026-03-02'
  status: draft                    # draft | review | approved | deprecated
  approval_owner: ''
  approval_contact: ''
