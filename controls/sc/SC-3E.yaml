# =============================================================================
# Control: SC-3E — Container & IaC Security Scanning
# Track:   SC (Security Controls)
# Owner:   Security / Infrastructure Security Engineer
# Schema:  ../../../schema/control.schema.json
# =============================================================================

id: SC-3E
moscow_score: should
name: Container & IaC Security Scanning
description: >-
  Scan all container images, Dockerfiles, Kubernetes manifests, Terraform configurations,
  Helm charts, and other Infrastructure-as-Code (IaC) artefacts at commit time for:
  known vulnerabilities (CVE) in base images and layers, CIS benchmark violations,
  security misconfigurations, and hardcoded secrets in manifests. Enforce policies:
  no base images with critical CVEs, no privileged containers without justification,
  no host network access without explicit approval, no default service account permissions,
  secrets not passed as environment variables. Block commits that violate policies.
required_in_stages:
- number: 3
  name: Coding & Implementation
  mandatory: true
  note: >-
    Container and IaC security scanning at Stage 3 shifts security left before artefacts
    reach testing. SC-5A checks production baseline; this control prevents IaC
    misconfigurations from being committed.
track:
  code: SC
  name: Security Controls
delegation:
  pattern: fully_automated
  human_display: Automated scanning with human policy exception management
  agent_role: >-
    Execute container and IaC security scanner (Trivy, Snyk, Checkov, or equivalent)
    against all container images, Dockerfiles, and IaC manifests. Check for: CVEs in
    base images, CIS benchmark compliance, security misconfigurations, hardcoded secrets.
    Reject commits violating security policies. Flag findings for human review.
  human_role: >-
    Review flagged issues. Decide: remediate (update base image, fix misconfiguration),
    accept risk and document exception (with business justification), or redesign to
    remove the risky configuration.
owner:
  team: Security, Infrastructure
  role: Infrastructure Security Engineer
  contact: ''
regulatory_mapping:
  dora:
    - article: "Art. 9(2)"
      obligation: Protection of ICT infrastructure including containerised workloads
    - article: "Art. 25"
      obligation: Vulnerability assessments must include infrastructure components
  eu_ai_act:
    - article: "Art. 15(4)"
      requirement: Appropriate cybersecurity in production environment for AI systems deployed in containers
inputs:
- name: Container images and Dockerfiles
  description: All Dockerfile and container image source code
- name: IaC manifests
  description: Kubernetes YAML, Terraform, Helm charts, CloudFormation, or equivalent
- name: CVE database and CIS benchmarks
  description: Current vulnerability intelligence and infrastructure security standards
outputs:
- name: Container & IaC Security Scan Report
  type: report
  description: >-
    Findings by category: CVE vulnerabilities in base images, CIS benchmark violations,
    security misconfigurations, hardcoded secrets. Include affected files, severity,
    and remediation guidance.
  retention: 7 years (audit trail)
- name: Exception tickets (if any)
  type: decision
  description: >-
    Documented exceptions for accepted IaC security issues, including business justification
    and approval sign-off
  retention: 7 years
failure_behaviour:
  action: block
  escalation_target: Infrastructure Security Engineer
  description: >-
    Critical container or IaC issues block commit unless an exception ticket is linked.
    Examples: critical-severity CVE in base image, privileged container without justification,
    hardcoded secrets in manifests.
automation:
  tooling:
    - Trivy
    - Snyk Container Security
    - Checkov (IaC scanning)
    - Aqua Security
    - HashiCorp Sentinel (Terraform policy)
  frequency: per_change
  sla_minutes: 15
dependencies:
- SC-3B   # Post-Guardrails (complements code scanning)
- SC-3D   # SCA & SBOM Generation (for container dependency analysis)
metadata:
  version: '1.0'
  last_updated: '2026-03-04'
  status: approved
