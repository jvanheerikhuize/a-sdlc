# =============================================================================
# Control: SC-06 — Zero-Trust Architecture Validation
# Track:   SC (Security Controls)
# Owner:   Security / Security Architect
# Schema:  ../../../schema/control.schema.json
# =============================================================================

id: SC-06
moscow_score: should
name: Zero-Trust Architecture Validation
description: >-
  Validate that the proposed system architecture adheres to zero-trust principles:
  no implicit trust between components, mutual authentication for all service-to-service
  communication, network micro-segmentation with explicit allow-listing, identity-based
  access to all resources (regardless of network location), continuous verification rather
  than perimeter-based trust. SC-05 produces a threat model; this control validates the
  architectural trust posture against zero-trust criteria.
required_in_stages:
- number: 2
  name: System Design
  mandatory: true
  note: >-
    Zero-trust validation occurs at design time, before implementation commits the
    architecture. SC-16 validates production baseline; this control prevents flawed
    trust assumptions in the design.
track:
  code: SC
  name: Security Controls
delegation:
  pattern: agent_analyses_human_resolves
  human_display: Agent analyses, human resolves gaps
  agent_role: >-
    Review the architecture design (diagrams, component specifications, authentication
    flows). Analyse for zero-trust compliance: Are all service-to-service connections
    using mTLS or equivalent? Is there explicit deny-by-default network policy? Are
    lateral movement controls documented? Identify gaps and propose design changes.
  human_role: >-
    Review agent analysis. For any identified gap, decide: redesign to implement zero-trust
    (preferred), accept the architectural risk and document exception, or adjust the design
    scope. Sign off on final architecture against zero-trust criteria.
owner:
  team: Security
  role: Security Architect
  contact: ''
regulatory_mapping:
  dora:
    - article: "Art. 9(4)"
      obligation: >-
        Network infrastructure "must be instantaneously severable or segmentable to
        minimise and prevent contagion." Zero-trust is the enabling architecture.
    - article: "Art. 9(2-3)"
      obligation: >-
        ICT solutions must secure data transfer and prevent unauthorised access;
        zero-trust enforces these through architecture.
inputs:
- name: System architecture design
  source_control: QC-03
  description: Architecture diagrams, component specifications, data flows
- name: Threat model
  source_control: SC-05
  description: STRIDE threat analysis to validate assumptions
outputs:
- name: Zero-Trust Validation Report
  type: report
  description: >-
    Assessment of architecture against zero-trust criteria. For each criterion
    (mutual authentication, micro-segmentation, identity-based access, continuous
    verification): status (Compliant/Gap), details, and remediation recommendation.
  retention: 7 years (audit trail)
- name: Design change requests (if applicable)
  type: decision
  description: >-
    Recommendations for architecture modifications to achieve zero-trust compliance.
    Prioritised by security impact.
  retention: 7 years
failure_behaviour:
  action: escalate
  escalation_target: Chief Information Security Officer
  description: >-
    Architecture with critical zero-trust gaps (e.g., implicit trust zones, no
    micro-segmentation, plaintext inter-service communication) must be remediated
    or escalated to CISO for risk acceptance.
automation:
  tooling:
    - Architecture analysis tools (ArchiMate, draw.io with zero-trust checklist)
    - Zero-Trust Maturity Model (NIST CSF, CIS Controls)
  frequency: per_release
  sla_minutes: 480
dependencies:
- QC-03   # Design Completeness & Standards (provides design to validate)
- SC-05   # Threat Model Validation (threat analysis informs validation)
metadata:
  version: '1.0'
  last_updated: '2026-03-04'
  status: approved
