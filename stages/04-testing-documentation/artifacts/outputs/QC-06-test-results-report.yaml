# criteria from the Stage 1 feature specification.
#
# Retention: 7 years (DORA Art. 8(6)).
#
# Usage:
#   Copy: cp test-results-report.yaml FEAT-XXXX-test-results-report.yaml
# =============================================================================

feat_id: ""                        # FEAT-XXXX
stage: 4
