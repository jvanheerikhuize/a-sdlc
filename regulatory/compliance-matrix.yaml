      percentage: 100%

  fully_mapped_controls: 51

  mapping_approach: >
    All 51 controls now have explicit regulatory mappings to DORA and/or EU AI Act. Mappings
    include both direct mappings (controls that satisfy specific articles) and foundational
    mappings (controls that enable regulatory compliance by supporting risk management gates,
    documentation, and decision-making across the lifecycle). Quality Control (QC) and Risk
