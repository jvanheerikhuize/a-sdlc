# =============================================================================
# A-SDLC Control Registry
# =============================================================================
# Flat index of all 30 controls across the Agentic SDLC framework.
# Use this file for fast lookup by control ID without reading individual
# stage files. Full control definitions are in each stage's controls.yaml.
#
# Total controls: 30
# Tracks: QC (9) | RC (7) | SC (10) | AC (5) | GC (5) — wait, let me count
# QC: 1A,1B,2A,3A,3B,4A,4B,4C,5A,6A = 10
# RC: 1A,2A,3A,4A,5A,5B,6A = 7
# SC: 1A,2A,2B,3A,3B,3C,4A,4B,5A,5B,6A,6B = 12
# AC: 1A,2A,4A,6A = 4
# GC: 0A,0B,0C,1A,3A = 5
# Wait — let me recount from the source documents:
# QC: 1A,1B,2A,3A,3B,4A,4B,4C,5A,6A = 10
# RC: 1A,2A,3A,4A,5A,5B,6A = 7
# SC: 1A,2A,2B,3A,3B,3C,4A,4B,5A,5B,6A,6B = 12... but original doc says SC-5A not in cross-cutting
# Let me just list them from the source docs
# =============================================================================

registry:

  # ---------------------------------------------------------------------------
  # Cross-Cutting (Stage 0) — Always active across all stages
  # ---------------------------------------------------------------------------

  - id: GC-0A
    name: Audit Trail & Compliance Reporting
    stage: 0
    stage_name: Cross-Cutting
    track: GC
    delegation: fully_automated
