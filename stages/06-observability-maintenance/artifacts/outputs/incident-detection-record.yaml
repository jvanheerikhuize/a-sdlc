# =============================================================================
# Incident Detection Record Template
# =============================================================================
# Produced continuously by control SC-6A (Step 6.4).
# Records SIEM detections, DORA Art. 18 incident classifications, and
# Art. 19 regulatory reporting timelines.
# Updated on a rolling basis for the operational lifetime of the system.
#
# Retention: 7 years (DORA Art. 8(6)).
#
# Usage:
#   This file is continuously updated. Do not copy per feature.
# =============================================================================

system_id: ""                      # System or service identifier
stage: 6
control: SC-6A

incidents: []
# Per-incident entries, e.g.:
# - id: ""                         # Incident identifier
#   detected_at: ""                # ISO 8601 datetime
#   detection_source: ""           # SIEM | anomaly_escalation (SC-6B) | manual
#   mitre_technique: ""            # MITRE ATT&CK technique ID (e.g. T1078)
#
#   # DORA Art. 18 classification
#   dora_classification:
#     is_major: null               # true | false
#     category: ""                 # e.g. availability | integrity | confidentiality | ...
#     classification_rationale: ""
#     classified_by: ""            # SA name
#     classified_at: ""
#
#   # DORA Art. 19 reporting — populated only when is_major is true
#   regulatory_reporting:
#     initial_notification:
#       due_at: ""                 # detected_at + 4 hours
#       submitted_at: ""
#       submitted_by: ""           # CO name
#     intermediate_report:
#       due_at: ""                 # detected_at + 72 hours
#       submitted_at: ""
#       submitted_by: ""
#     final_report:
#       due_at: ""                 # resolved_at + 1 month
#       submitted_at: ""
#       submitted_by: ""
#
#   resolution:
#     status: ""                   # open | contained | resolved
#     resolved_at: ""
#     feedback_loop_triggered: null
#     feedback_loop_path: ""       # path_b_quickfix | path_b_feature

summary:
  total_incidents: 0
  open_incidents: 0
  major_incidents: 0
  overdue_regulatory_reports: 0
  last_updated: ""                 # ISO 8601 datetime
