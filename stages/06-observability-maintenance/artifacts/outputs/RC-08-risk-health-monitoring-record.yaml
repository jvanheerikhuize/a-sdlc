# =============================================================================
# Risk & Health Monitoring Record Template
# =============================================================================
# Produced continuously by control RC-08 (Step 6.3).
# Records configuration drift, SBOM vulnerability alerts, application health,
# capacity trends, certificate expiry, and dependency health.
# Updated on a rolling basis for the operational lifetime of the system.
#
# Retention: 7 years (DORA Art. 8(6)).
#
# Usage:
#   This file is continuously updated. Do not copy per feature.
# =============================================================================

system_id: ""                      # System or service identifier
stage: 6
control: RC-08

configuration_drift:
  last_checked: ""                 # ISO 8601 datetime
  baseline_ref: ""                 # Approved baseline version
  drifted_resources: 0
  status: ""                       # compliant | drifted

sbom_vulnerabilities:
  last_checked: ""
  new_cves_detected: 0
  critical: 0
  high: 0
  unresolved: 0

application_health:
  last_checked: ""
  health_indicators: []
  # e.g.:
  # - name: ""                     # Health check name
  #   status: ""                   # healthy | degraded | unhealthy
  #   last_checked: ""

capacity:
  last_checked: ""
  resources: []
  # e.g.:
  # - name: ""                     # Resource name (CPU, memory, disk, etc.)
  #   utilisation_pct: null
  #   trend: ""                    # stable | increasing | decreasing
  #   projected_exhaustion_days: null

certificates:
  last_checked: ""
  expiring_within_30_days: 0
  expired: 0
  items: []
  # e.g.:
  # - name: ""
  #   expiry_date: ""
  #   status: ""                   # valid | expiring_soon | expired

dependency_health:
  last_checked: ""
  degraded_dependencies: 0
  items: []
  # e.g.:
  # - name: ""
  #   status: ""                   # healthy | degraded | unavailable
  #   impact: ""

escalations: []
# Per-escalation entries, e.g.:
# - id: "RHM-001"
#   triggered_at: ""
#   type: ""                       # configuration_drift | cve | health | capacity | certificate | dependency
#   severity: ""                   # critical | high | medium | low
#   description: ""
#   reviewed_by: ""                # RO name
#   feedback_loop_triggered: null  # true | false
#   feedback_loop_path: ""         # path_a | path_b_quickfix | path_b_feature
#   resolved: null
#   resolved_at: ""

summary:
  open_escalations: 0
  last_updated: ""                 # ISO 8601 datetime
