# =============================================================================
# A-SDLC Framework Manifest
# =============================================================================
# Machine-readable index of all stages, controls, and supporting artefacts.
# Use this file to programmatically discover the full framework structure
# without reading individual stage files.
#
# Schema: schema/control.schema.json
# Agent entrypoint: AGENTS.md
# =============================================================================

framework:
  name: Agentic Software Development Life Cycle
  abbreviation: A-SDLC
  version: "1.0"
  status: approved
  tagline: >-
    A framework that defines how software is built, tested, and released when AI agents
    work alongside human developers.
  narrative:
    what_is_it: >-
      The Agentic SDLC is a paradigm shift where AI agents evolve from passive coding
      assistants to autonomous owners of specific lifecycle phases. It moves the human role
      from granular execution to high-level orchestration, decoupling output from headcount
      and eliminating the "wait states" inherent in manual hand-offs.
    properties:
      - Replaces the traditional SDLC — backwards- and forwards-compatible
      - Is solution, model, and toolchain agnostic — works with any agent or stack
      - Is usable by both humans and agents at every step and task
    value_propositions:
      - benefit: Velocity
        target: "20–30% faster delivery"
        mechanism: Agents handle "in-between" work — environment setup, triage, PR descriptions
      - benefit: Quality
        target: "70% fewer production defects"
        mechanism: Deep-context testing; programmatically enforced standards during coding
      - benefit: Governance
        target: Non-negotiable compliance
        mechanism: Immutable Core Security Directives injected into every agent context
      - benefit: Role Evolution
        target: Developer → System Orchestrator
        mechanism: Agents own repetitive tasks; engineers focus on architectural innovation
  regulatory_scope:
    - DORA
    - EU AI Act
  regulatory_summary:
    frameworks:
      - name: DORA
        full_name: "Digital Operational Resilience Act"
        regulation: "EU 2022/2554"
        controls_mapped: 43
        total_controls: 51
        coverage_pct: "84.3%"
      - name: EU AI Act
        full_name: "EU AI Act"
        regulation: "EU 2024/1689"
        controls_mapped: 30
        total_controls: 51
        coverage_pct: "58.8%"

  control_tracks:
    - code: QC
      name: Quality Controls
      description: Ensure work meets standards
    - code: RC
      name: Risk Controls
      description: Identify and manage what can go wrong
    - code: SC
      name: Security Controls
      description: Protect against threats and vulnerabilities
    - code: AC
      name: AI Controls
      description: Address EU AI Act requirements
    - code: GC
      name: Governance Controls
      description: Maintain the audit trail across everything

  delegation_patterns:
    - pattern: fully_automated
      description: Agent executes; no human judgement required
    - pattern: automated_policy_enforced
      description: Agent executes via policy engine; no human intervention
    - pattern: automated_with_human_escalation
      description: Agent executes; human escalated on anomaly
    - pattern: agent_drafts_human_approves
      description: Agent produces draft; human validates before proceeding
    - pattern: agent_analyses_human_resolves
      description: Agent surfaces findings; human makes the decision
    - pattern: agent_executes_human_reviews
      description: Agent runs the process; human reviews results
    - pattern: agent_classifies_human_validates
      description: Agent classifies; human confirms classification
    - pattern: agent_proposes_human_confirms
      description: Agent proposes option; human confirms
    - pattern: agent_calculates_human_decides
      description: Agent computes outcome; human makes go/no-go
    - pattern: agent_validates_human_approves
      description: Agent checks completeness; human signs off
    - pattern: agent_monitors_human_reports
      description: Agent detects; human files the report
    - pattern: agent_creates_human_reviews
      description: Agent creates artefact; human reviews
    - pattern: agent_logs_human_reviews
      description: Agent writes log; human reviews it
    - pattern: agent_compiles_human_approves
      description: Agent compiles checklist; human approves
    - pattern: agent_checks_human_approves
      description: Agent verifies; human approves
    - pattern: human_required
      description: Cannot be delegated. Human must decide. Agent must stop and escalate.

roles:
  REQ:
    name: Requester
    description: Submits change requests; the originator of intent.
  AGT:
    name: Agent
    description: Automated AI agent performing processing, drafting, analysis, generation, and logging tasks.
  PO:
    name: Product Owner
    description: Business decision authority; approves specifications and resolves requirement conflicts.
  RO:
    name: Risk Officer
    description: Validates risk classifications; may override agent-proposed tiers with documented justification.
  SA:
    name: Security Architect
    description: Reviews security-flagged items; owns security control escalations and security directive authorship.
  AGL:
    name: AI Governance Lead
    description: Confirms EU AI Act risk tiers for changes involving AI components; owns AC-track controls.
  LAD:
    name: Lead Architect
    description: Owns architectural decisions; formal approval authority for system design at Stage 2.
  DEV:
    name: Developer
    description: Authors and reviews code at Stage 3; accountable for implementation quality and peer review.
  QA:
    name: QA Engineer
    description: Owns test coverage and quality sign-off at Stage 4.
  REL:
    name: Release Manager
    description: Manages the deployment pipeline and CAB coordination at Stage 5.
  OPS:
    name: Operations / SRE
    description: Monitors production health; primary actor triggering feedback loops from Stage 6.
  CO:
    name: Compliance Officer
    description: Reviews audit records and traceability evidence during regulatory audits; no stage-execution role.

cross_cutting:
  description: Controls and directives active across all six stages for every agent session.
  feedback_loops:
    definition: feedbackloops/feedback-loops.yaml
    process: feedbackloops/process.md
    readme: feedbackloops/README.md
    artifacts_dir: feedbackloops/artifacts/
    autofix_templates_dir: feedbackloops/autofix-templates/
  directives:
    core: directives/core/core-directives.yaml
    stages: directives/stages/
  controls:
    - id: SC-0D
      name: Core Directive Injection
      track: SC
    - id: SC-2B
      name: Stage Directive Injection
      track: SC
    - id: GC-0A
      name: Audit Trail & Compliance Reporting
      track: GC
    - id: GC-0B
      name: End-to-End Traceability
      track: GC
    - id: GC-0C
      name: Agent Provenance Registry
      track: GC
    - id: GC-0D
      name: Compliance Evidence Automation
      track: GC

stages:
  - number: 1
    name: Intent Ingestion
    slug: 01-intent-ingestion
    directory: stages/01-intent-ingestion
    stage_file: stages/01-intent-ingestion/01-intent-ingestion.yaml
    readme: stages/01-intent-ingestion/README.md
    artifacts_dir: stages/01-intent-ingestion/artifacts/
    description: >-
      High-level business goals are captured, disambiguated, and transformed
      into structured technical requirements. Establishes the source of truth
      for all subsequent agentic actions.
    controls:
      - id: QC-1A
        name: Specification Validation
        track: QC
      - id: QC-1B
        name: Coherence & Conflict Resolution
        track: QC
      - id: RC-1A
        name: Risk Classification
        track: RC
      - id: SC-1A
        name: Pre-Guardrails
        track: SC
      - id: SC-1B
        name: Data Classification & Sensitivity Screening
        track: SC
      - id: AC-1A
        name: AI Risk Tier Classification
        track: AC
      - id: AC-1B
        name: GPAI & Foundation Model Obligation Screening
        track: AC
      - id: GC-1A
        name: Intent Traceability
        track: GC

  - number: 2
    name: System Design
    slug: 02-system-design
    directory: stages/02-system-design
    stage_file: stages/02-system-design/02-system-design.yaml
    readme: stages/02-system-design/README.md
    description: >-
      Validated intent is translated into architecture and technical
      specifications. Threat modelling and stage directive injection
      occur here before any coding begins.
    controls:
      - id: QC-2A
        name: Design Completeness & Standards
        track: QC
      - id: RC-2A
        name: Design Approval
        track: RC
      - id: RC-2B
        name: Privacy Impact Assessment Gate
        track: RC
      - id: SC-2A
        name: Threat Model Validation
        track: SC
      - id: SC-2B
        name: Directive Injection
        track: SC
      - id: SC-2C
        name: Zero-Trust Architecture Validation
        track: SC
      - id: AC-2A
        name: AI Component Design Review
        track: AC
      - id: AC-2B
        name: AI Model Governance & Version Control
        track: AC

  - number: 3
    name: Coding & Implementation
    slug: 03-coding-implementation
    directory: stages/03-coding-implementation
    stage_file: stages/03-coding-implementation/03-coding-implementation.yaml
    readme: stages/03-coding-implementation/README.md
    description: >-
      Code is produced by human developers, AI agents, or both. The most
      control-dense stage: enforces quality, controls agent permissions, scans
      for security issues, tracks provenance, and converges into a reviewed PR.
    controls:
      - id: QC-3A
        name: Pull Request Creation & Review
        track: QC
      - id: QC-3B
        name: Code Quality Standards
        track: QC
      - id: RC-3A
        name: Decision Log
        track: RC
      - id: SC-3A
        name: Permission Management
        track: SC
      - id: SC-3B
        name: Post-Guardrails
        track: SC
      - id: SC-3C
        name: Secrets & Credentials Scanning
        track: SC
      - id: SC-3D
        name: Software Composition Analysis & SBOM Generation
        track: SC
      - id: SC-3E
        name: Container & IaC Security Scanning
        track: SC
      - id: GC-3A
        name: Code Provenance Tracking
        track: GC

  - number: 4
    name: Testing & Documentation
    slug: 04-testing-documentation
    directory: stages/04-testing-documentation
    stage_file: stages/04-testing-documentation/04-testing-documentation.yaml
    readme: stages/04-testing-documentation/README.md
    description: >-
      The verification gate. Answers "does it work correctly?" and "is it safe
      to release?" Culminates in a risk threshold evaluation that opens or
      blocks the door to deployment.
    controls:
      - id: QC-4A
        name: Functional & Non-Functional Testing
        track: QC
      - id: QC-4B
        name: AI Output Validation
        track: QC
      - id: QC-4C
        name: Documentation Completeness
        track: QC
      - id: RC-4A
        name: Risk Threshold Evaluation
        track: RC
      - id: SC-4A
        name: SAST
        track: SC
      - id: SC-4B
        name: DAST
        track: SC
      - id: SC-4C
        name: API Security Testing
        track: SC
      - id: SC-4D
        name: Adversarial AI Robustness Testing
        track: SC
      - id: AC-4A
        name: Bias & Fairness Testing
        track: AC

  - number: 5
    name: Deployment & Release
    slug: 05-deployment-release
    directory: stages/05-deployment-release
    stage_file: stages/05-deployment-release/05-deployment-release.yaml
    readme: stages/05-deployment-release/README.md
    description: >-
      Promotion to production. Carries the strongest governance requirements.
      Ensures everything prior is complete, the deployment is trustworthy, and
      there is a verified rollback path.
    controls:
      - id: QC-5A
        name: Release Readiness Checklist
        track: QC
      - id: RC-5A
        name: CAB Approval
        track: RC
      - id: RC-5B
        name: Rollback Plan Validation
        track: RC
      - id: SC-5A
        name: Infrastructure Security
        track: SC
      - id: SC-5B
        name: Deployment Integrity
        track: SC
      - id: SC-5C
        name: Secrets & Key Management Lifecycle
        track: SC

  - number: 6
    name: Observability & Maintenance
    slug: 06-observability-maintenance
    directory: stages/06-observability-maintenance
    stage_file: stages/06-observability-maintenance/06-observability-maintenance.yaml
    readme: stages/06-observability-maintenance/README.md
    description: >-
      The only stage that never ends. Continuous monitoring of operational
      health, security posture, risk evolution, and AI behaviour. Feeds back
      into the lifecycle through defined re-entry paths.
    controls:
      - id: QC-6A
        name: SLA/SLO Monitoring
        track: QC
      - id: RC-6A
        name: Risk & Health Monitoring
        track: RC
      - id: RC-6B
        name: Third-Party Continuous Risk Monitoring
        track: RC
      - id: SC-6A
        name: Incident Scanning & Detection
        track: SC
      - id: SC-6B
