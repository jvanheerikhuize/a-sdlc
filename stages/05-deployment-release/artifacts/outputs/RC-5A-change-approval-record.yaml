# =============================================================================
# Change Approval Record Template
# =============================================================================
# Produced during Step 5.2 by control RC-5A.
# Records the formal CAB approval decision. This control cannot be delegated
# to an agent under any circumstances. IMMUTABLE after decision.
#
# Approval authority:
#   critical / high  → Change Advisory Board (full CAB)
#   medium           → Line management
#   low              → Pre-approved standard change procedure
#
# Retention: 7 years (DORA Art. 8(6)).
#
# Usage:
#   Copy: cp change-approval-record.yaml FEAT-XXXX-change-approval-record.yaml
# =============================================================================

feat_id: ""                        # FEAT-XXXX
stage: 5
control: RC-5A
immutable: true
submitted_at: ""                   # ISO 8601 datetime

risk_tier: ""                      # From Stage 1 RC-1A (low | medium | high | critical)
approval_authority: ""             # full_cab | line_management | pre_approved_procedure
cab_slot_scheduled: ""             # ISO 8601 datetime (blank for low/medium if not required)

evidence_package:
  release_readiness_checklist: ""  # Path to FEAT-XXXX-release-readiness-checklist.yaml
  risk_threshold_evaluation: ""    # Path to FEAT-XXXX-risk-threshold-evaluation.yaml
  stage_1_risk_classification: ""  # Path to Stage 1 risk classification artifact

# --- CAB / Approver decision ---
# Outcomes:
#   approved — proceed to Steps 5.3 and 5.4
#   rejected — deployment blocked; rejection reason documented; work returns to required stage
decision:
  outcome: ""                      # approved | rejected
  decided_by: ""                   # Full name of approver(s)
  decided_by_role: ""              # Risk Officer | Line Manager | CAB Chair
  decided_at: ""                   # ISO 8601 datetime

  # Populated for approval
  approval_conditions: ""          # Any conditions attached to the approval

  # Populated for rejection
  rejection_reason: ""
  return_to_stage: null            # Stage number to which work returns
