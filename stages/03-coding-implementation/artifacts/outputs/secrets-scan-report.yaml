# =============================================================================
# Secrets Scan Report Template
# =============================================================================
# Produced during Step 3.2 (per commit) by control SC-3C.
# Records all secrets scanning results across commits. Blocked commits must
# be fully resolved before the PR can be created.
#
# Retention: 7 years (DORA Art. 8(6)).
#
# Usage:
#   Copy: cp secrets-scan-report.yaml FEAT-XXXX-secrets-scan-report.yaml
# =============================================================================

feat_id: ""                        # FEAT-XXXX
stage: 3
control: SC-3C
period:
  from: ""                         # ISO 8601 — first commit scanned
  to: ""                           # ISO 8601 — last commit before PR creation

commits_scanned: 0
findings: []
# Per-finding entries, e.g.:
# - commit: ""                     # Commit SHA (blocked — never entered history)
#   timestamp: ""
#   file: ""
#   line: null
#   secret_type: ""                # api_key | password | token | certificate | connection_string | private_key
#   description: ""                # Non-identifying description (no actual secret value)
#   resolved: null                 # true | false — must be true before QC-3A
#   resolved_at: ""
#   resolution: ""                 # removed | rotated | moved_to_vault

summary:
  total_commits_scanned: 0
  blocked_commits: 0
  findings_total: 0
  findings_unresolved: 0           # Must be 0 before QC-3A (PR creation)
  status: ""                       # passed | failed
