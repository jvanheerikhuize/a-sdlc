# =============================================================================
# Deployment Integrity Record Template
# =============================================================================
# Produced during Step 5.5 (integrity verification) and updated at Step 5.6
# (handover confirmation) by control SC-5B.
# Cryptographic checksums confirm the deployed artefacts are exactly those
# tested in Stage 4. Any mismatch immediately blocks deployment and initiates
# a security incident. IMMUTABLE after verification.
#
# This record also serves as the Stage 6 handover trigger.
#
# Retention: 7 years (DORA Art. 8(6)).
#
# Usage:
#   Copy: cp deployment-integrity-record.yaml FEAT-XXXX-deployment-integrity-record.yaml
# =============================================================================

feat_id: ""                        # FEAT-XXXX
stage: 5
control: SC-5B
immutable: true

# --- Step 5.5: Integrity verification ---
verification:
  verified_at: ""                  # ISO 8601 datetime
  algorithm: ""                    # e.g. SHA-256

  artefacts: []
  # Per-artefact entries, e.g.:
  # - name: ""                     # Artefact filename or identifier
  #   stage_4_checksum: ""         # Checksum recorded after Stage 4 testing
  #   staged_checksum: ""          # Checksum of artefact staged for production
  #   match: null                  # true | false

  outcome: ""                      # verified | mismatch_detected
  # On mismatch:
  mismatch_details: ""             # Description of which artefact(s) failed
  security_incident_initiated: null  # true | false (set to true on any mismatch)
  incident_ref: ""                 # Incident ID (populated if security_incident_initiated)

# --- Step 5.6: Deployment and handover ---
deployment:
  deployed_at: ""                  # ISO 8601 datetime
  deployed_by: ""                  # AGT | OPS
  pipeline_ref: ""                 # CI/CD pipeline run ID

  smoke_tests:
    executed: null                 # true | false
    passed: null                   # true | false
    failure_detail: ""             # Populated if smoke tests failed
    rollback_initiated: null       # true | false (set if smoke tests failed)

  service_health_confirmed: null   # true | false (OPS confirmation)
  hypercare_window_entered: null   # true | false

handover:
  status: ""                       # completed | failed
  confirmed_by: ""                 # OPS full name
  confirmed_at: ""                 # ISO 8601 datetime
  stage_6_monitoring_activated: null  # true | false
  notes: ""
