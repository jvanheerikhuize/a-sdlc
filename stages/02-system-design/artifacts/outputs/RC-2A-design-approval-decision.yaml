feat_id: ""                        # FEAT-XXXX
stage: 2
control: RC-2A
produced_at: ""                    # ISO 8601 datetime
immutable: true

risk_tier: ""                      # low | medium | high | critical (from Stage 1 RC-1A)
approval_authority: ""             # senior_board | lead_architect | pre_approved

decision: ""                       # approved | rejected
decided_by: ""                     # Full name and role of approving authority
decided_at: ""                     # ISO 8601 datetime

conditions: []
# Any conditions attached to approval, e.g.:
# - "STRIDE mitigations for THREAT-003 must be implemented before deployment"

rejection_reason: ""               # Populated only if decision is rejected

evidence_reviewed:
  - design-document: ""            # FEAT-XXXX-design-document.yaml
  - stride-threat-model: ""        # FEAT-XXXX-stride-threat-model.yaml
  - risk-classification: ""        # FEAT-XXXX-risk-classification.yaml (from Stage 1)
  - ai-component-design-review: "" # FEAT-XXXX-ai-component-design-review.yaml (if applicable)
