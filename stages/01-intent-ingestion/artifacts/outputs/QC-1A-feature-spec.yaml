# =============================================================================
# Feature Specification Template
# =============================================================================
# Produced during Stage 1 (QC-1A). Forms the source of truth for all
# subsequent stages. Every acceptance criterion must be traced to at least
# one test case in Stage 4 (QC-4A).
#
# Usage:
#   1. Copy: cp feature-spec.yaml FEAT-XXXX-your-title.yaml
#   2. Fill in all sections; remove placeholder comments
#   3. Validate against: schema/feature-spec.schema.json
#
# Source: Change Request CR-XXXX (artifacts/inputs/change-request.yaml)
# =============================================================================

metadata:
  id: "FEAT-0000"              # Next available ID (e.g. FEAT-0001)
  title: ""
  version: "1.0.0"
  status: "draft"              # draft | review | approved | implemented | deprecated
  priority: "medium"           # critical | high | medium | low
  author: ""                   # Name of Product Owner or agent that drafted
  created_at: ""               # YYYY-MM-DD
  updated_at: ""               # YYYY-MM-DD
  tags: []                     # e.g. [backend, api, security]

description:
  summary: |
    Brief overview of the feature in 1–2 sentences.

  problem_statement: |
    What problem does this solve?
    - What pain points exist?
    - Who is affected?
    - What is the impact of not solving this?

  proposed_solution: |
    High-level description of how this feature solves the problem.
    Focus on "what", not "how". Implementation details belong in Stage 2.

  out_of_scope:
    - ""                       # Items explicitly excluded from this feature

  dependencies:
    - ""                       # FEAT-XXXX or external dependency references

acceptance_criteria:
  - id: "AC-001"
    given: ""                  # Starting state or precondition
    when: ""                   # Triggering action
    then: ""                   # Expected outcome
    and: []                    # Additional conditions (optional)

technical_requirements:
  constraints:
    - ""                       # e.g. must be backward compatible, no new dependencies

  performance:
    response_time_ms: null     # p99 target in milliseconds
    throughput: ""             # e.g. "1000 requests/second"
    availability: ""           # e.g. "99.9%"

  security:
    - ""                       # e.g. encryption at rest, auth required

  scalability: |
    Expected load, growth trajectory, and scaling requirements.

# Indicative scope for Stage 2 design — not design decisions.
# Remove sections that are not applicable to this change.
api_changes:
  new_endpoints: []
  modified_endpoints: []
  breaking_changes: null       # true | false

ui_changes:
  wireframes: []               # Paths to wireframe files (if available at this stage)
  components: []               # Component names expected to be affected

testing_requirements:
  unit_tests: null             # true | false
  integration_tests: null      # true | false
  e2e_tests: null              # true | false
  performance_tests: null      # true | false
  test_scenarios:
    - ""                       # Key scenarios to cover (happy path, edge cases, errors)

rollout:
  feature_flag: ""             # Flag name if gradual rollout is planned
  rollout_strategy: ""         # immediate | gradual | canary | beta
  rollback_plan: |
    Steps to rollback if issues are detected post-deployment.

# -----------------------------------------------------------------------------
# Risk Classification — populated by controls RC-1A and AC-1A during Stage 1.
# Do not fill in manually. Omit fields that have not yet been classified.
# -----------------------------------------------------------------------------
risk_classification: {}
# Populated fields after classification:
#   risk_tier: low | medium | high | critical         (set by RC-1A)
#   ai_act_tier: minimal | limited | high | unacceptable | not_applicable  (set by AC-1A)
#   governance_intensity: standard | enhanced | full    (derived from risk_tier)
