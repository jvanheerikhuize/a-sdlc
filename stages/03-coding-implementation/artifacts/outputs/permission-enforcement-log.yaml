# =============================================================================
# Permission Enforcement Log Template
# =============================================================================
# Produced during Step 3.1 (started) and Step 3.2 (ongoing) by control SC-3A.
# Records all agent access requests, granted permissions, and blocked attempts
# during the implementation session.
#
# Retention: 7 years (DORA Art. 8(6)).
#
# Usage:
#   Copy: cp permission-enforcement-log.yaml FEAT-XXXX-permission-enforcement-log.yaml
# =============================================================================

feat_id: ""                        # FEAT-XXXX
stage: 3
control: SC-3A
produced_at: ""                    # ISO 8601 datetime — when session started

agent_id: ""                       # Identifier of the agent operating in this session
trust_tier: ""                     # Agent trust tier per SC-3A policy

session:
  started_at: ""                   # ISO 8601 datetime
  ended_at: ""                     # ISO 8601 datetime

permission_policy:
  files: []                        # Allowed file paths or glob patterns
  apis: []                         # Allowed API endpoints
  databases: []                    # Allowed database connections
  network: []                      # Allowed network targets

access_events: []
# Per-event entries, e.g.:
# - timestamp: ""
#   resource: ""
#   resource_type: ""              # file | api | database | network | shell
#   action: ""                     # read | write | execute | delete
#   result: ""                     # granted | denied
#   note: ""                       # required if denied — describes the attempted access

summary:
  total_access_events: 0
  granted_events: 0
  denied_events: 0                 # Any denied events are security events requiring review
  status: ""                       # passed | violations_detected
