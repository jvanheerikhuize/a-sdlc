# =============================================================================
# Stage 5: Deployment & Release — Controls
# =============================================================================
# Schema: ../../schema/control.schema.json
# =============================================================================

controls:

  - id: QC-5A
    name: Release Readiness Checklist
    description: >-
      Compile and verify the complete release readiness package: confirm all
      prior stage controls have passed, all approvals are in place, documentation
      is current, and the release package is complete and matches what was tested.
      This is the final quality gate before the formal approval process begins.
    stage:
      number: 5
      name: Deployment & Release
    track:
      code: QC
      name: Quality Controls
    delegation:
      pattern: agent_compiles_human_approves
      human_display: Agent compiles, human approves
      agent_role: Compile release readiness checklist by querying audit trail for all control pass evidences; flag any gaps.
      human_role: Review checklist; approve release package or require resolution of flagged gaps.
    owner:
      team: Engineering / Release Management
      role: Release Manager
      contact: ""
    regulatory_mapping:
      dora:
        - article: "Art. 8(5)"
          obligation: Documented deployment and release procedures with verification of prior controls
      dnb:
        - area: Release management and production acceptance
          requirement: Release readiness must be formally verified before deployment proceeds
    inputs:
      - name: Audit trail
        source_control: GC-0A
        description: Complete audit trail confirming all prior controls were executed and passed.
      - name: Risk threshold evaluation decision
        source_control: RC-4A
        description: Stage 4 go/no-go decision confirming readiness for deployment.
    outputs:
      - name: Release readiness checklist
        type: evidence
        description: Completed checklist confirming all prior controls passed with references to evidence artefacts.
        retention: 7 years (DORA)
    failure_behaviour:
      action: block
      escalation_target: Release Manager
      description: Gaps in prior control evidence block the release. Must be resolved before RC-5A approval can be sought.
    automation:
      frequency: per_release
    dependencies:
      - RC-4A
      - GC-0A
    metadata:
      version: "1.0"
      last_updated: "2026-03-02"
      status: approved

  - id: RC-5A
    name: CAB Approval
    description: >-
      Formal change approval from the appropriate authority based on risk
      classification: high-risk changes require Change Advisory Board (CAB)
      approval; medium-risk requires line management; low-risk may use a
      pre-approved standard change procedure. This control cannot be delegated
      to an agent under any circumstances.
    stage:
      number: 5
      name: Deployment & Release
    track:
      code: RC
      name: Risk Controls
    delegation:
      pattern: human_required
      human_display: Human required
      agent_role: Prepare change approval request with full evidence package; schedule CAB slot if required.
      human_role: Make the formal approval decision. This control cannot be delegated to an agent under any circumstances.
    owner:
      team: Risk Management / Release Management
      role: Change Advisory Board
      contact: ""
    regulatory_mapping:
      dora:
        - article: "Art. 8(1)"
          obligation: Governance and control of ICT changes requires formal approval at appropriate authority level
        - article: "Art. 5"
          obligation: Management body accountability for ICT risk framework and change approvals
      dnb:
        - area: Change Advisory Board requirements and approval authority matrix
          requirement: Formal CAB process for high-risk changes; approval authority must match risk tier
    inputs:
      - name: Release readiness checklist
        source_control: QC-5A
        description: Completed checklist confirming all controls passed; forms the basis of the CAB submission.
      - name: NF-RED risk classification
        source_control: RC-1A
        description: Determines required approval authority (CAB vs. line management vs. pre-approved).
    outputs:
      - name: Change approval record
        type: decision
        description: Formal approval decision with approver identity, role, timestamp, and any conditions.
        retention: 7 years (DORA)
    failure_behaviour:
      action: block
      escalation_target: Change Advisory Board
      description: Rejected changes cannot proceed to deployment. Work may return to any required stage.
    automation:
      frequency: per_release
    dependencies:
      - QC-5A
    feedback_loops:
      - path: path_b_quickfix
        required_in_path: true
    metadata:
      version: "1.0"
      last_updated: "2026-03-02"
      status: approved

  - id: RC-5B
    name: Rollback Plan Validation
    description: >-
      Verify the rollback strategy: define specific triggers that will initiate
      a rollback, test the rollback procedure in a pre-production environment,
      and confirm the decision authority for initiating rollback during a live
      deployment. The rollback procedure must be executable within a defined
      time window.
    stage:
      number: 5
      name: Deployment & Release
    track:
      code: RC
      name: Risk Controls
    delegation:
      pattern: agent_validates_human_approves
      human_display: Agent validates, human approves
      agent_role: Validate rollback plan completeness; execute rollback test in pre-production; report results.
      human_role: Review rollback test results; approve plan or require improvements before deployment.
    owner:
      team: Engineering / Release Management
      role: Release Manager
      contact: ""
    regulatory_mapping:
      dora:
        - article: "Art. 11(6)"
          obligation: ICT business continuity requirements including restoration procedures for failed changes
      dnb:
        - area: Rollback and recovery procedures for changes
          requirement: Verified rollback procedure with tested execution time required for all production changes
    outputs:
      - name: Rollback plan validation report
        type: evidence
        description: Rollback procedure, trigger conditions, decision authority, pre-production test results, and execution time.
        retention: 7 years (DORA)
    failure_behaviour:
      action: block
      escalation_target: Release Manager
      description: Deployment is blocked if rollback cannot be validated in pre-production.
    automation:
      frequency: per_release
    dependencies:
      - RC-5A
    metadata:
      version: "1.0"
      last_updated: "2026-03-02"
      status: approved

  - id: SC-5A
    name: Infrastructure Security
    description: >-
      Validate the production environment security baseline immediately before
      deployment: verify patching status, access control configurations, network
      segmentation rules, infrastructure-as-code compliance, and absence of
      unexpected configuration drift since last validated baseline.
    stage:
      number: 5
      name: Deployment & Release
    track:
      code: SC
      name: Security Controls
    delegation:
      pattern: fully_automated
      human_display: Fully automated
      agent_role: Scan production environment configuration against approved security baseline; report any deviations.
      human_role: Review deviations; resolve before deployment or provide documented risk acceptance.
    owner:
      team: Security / Infrastructure
      role: Security Architect
      contact: ""
    regulatory_mapping:
      dora:
        - article: "Art. 9(2)"
          obligation: Protection of ICT infrastructure through security baseline management
      dnb:
        - area: Production environment security baseline
          requirement: Security baseline must be validated before each production deployment
      eu_ai_act:
        - article: "Art. 15(4)"
          requirement: Appropriate level of cybersecurity in production environment for AI systems
    outputs:
      - name: Infrastructure security baseline report
        type: evidence
        description: Validation results confirming production environment matches approved security baseline.
        retention: 7 years (DORA)
    failure_behaviour:
      action: block
      escalation_target: Security Architect
      description: Deviations from security baseline block deployment until resolved or formally accepted.
    automation:
      frequency: per_release
    dependencies:
      - RC-5A
    metadata:
      version: "1.0"
      last_updated: "2026-03-02"
      status: approved

  - id: SC-5B
    name: Deployment Integrity
    description: >-
      Cryptographically verify that the artefacts being deployed to production
      are byte-for-byte identical to the artefacts that were tested in Stage 4.
      No tampering, substitution, or modification between test and production
      deployment is permitted. Verification must occur immediately before
      deployment execution.
    stage:
      number: 5
      name: Deployment & Release
    track:
      code: SC
      name: Security Controls
    delegation:
      pattern: fully_automated
      human_display: Fully automated
      agent_role: Compute and compare cryptographic checksums of test and deployment artefacts; block deployment if any mismatch.
      human_role: Investigate any detected integrity failures before deployment can proceed.
    owner:
      team: Security / Release Management
      role: Security Architect
      contact: ""
    regulatory_mapping:
      dora:
        - article: "Art. 9(2)"
          obligation: ICT system integrity must be maintained through the deployment process
        - article: "Art. 28a"
          obligation: Supply chain security requirements for ICT systems
      dnb:
        - area: Integrity of production deployments and supply chain controls
          requirement: Cryptographic verification required between tested and deployed artefacts
      eu_ai_act:
        - article: "Art. 15(3)"
          requirement: Resilience against manipulation of AI systems by third parties during deployment
    outputs:
      - name: Deployment integrity verification record
        type: evidence
        description: Cryptographic hash comparison confirming test and production artefacts are identical.
        retention: 7 years (DORA)
    failure_behaviour:
      action: block
      escalation_target: Security Architect
      description: Any integrity mismatch immediately blocks deployment. Security incident process is initiated.
    automation:
      frequency: per_release
    dependencies:
      - SC-5A
    feedback_loops:
      - path: path_a_autofix
        required_in_path: true
      - path: path_b_quickfix
        required_in_path: true
    metadata:
      version: "1.0"
      last_updated: "2026-03-02"
      status: approved
