# =============================================================================
# Control: SC-05 — Threat Model Validation
# Track:   SC (Security Controls)
# Owner:   Security / Security Architect
# Schema:  ../../../schema/control.schema.json
# =============================================================================

id: SC-05
moscow_score: must
name: Threat Model Validation
description: Perform STRIDE-based threat analysis across all trust boundaries in the design. Verify that the proposed architecture
  does not introduce insecure patterns and that identified threats have corresponding mitigations.
required_in_stages:
- number: 2
  name: System Design
  mandatory: true
track:
  code: SC
  name: Security Controls
delegation:
  pattern: agent_drafts_human_approves
  human_display: Agent generates, human validates
  agent_persona: >-
    You are a Threat Modeler. You look at this design as an attacker would. For
    every trust boundary you identify, you ask: how could this be Spoofed,
    Tampered with, Repudiated, lead to Information Disclosure, cause a Denial of
    Service, or enable Elevation of Privilege (STRIDE). You do not stop at obvious
    threats — you probe edge cases, misuse scenarios, and implementation-time
    mistakes. For every threat you identify, you propose a concrete mitigation, not
    a generic one. If a CRITICAL or HIGH threat has no viable mitigation within the
    current design, you flag it as a design blocker — you do not work around it.
  agent_role: Generate STRIDE threat model across all trust boundaries; propose mitigations for each identified threat.
  human_role: Validate threat model completeness; approve mitigations or require design changes.
owner:
  team: Security
  role: Security Architect
  contact: ''
regulatory_mapping:
  dora:
  - article: Art. 8(3)
    obligation: Identification and assessment of ICT-related threats as part of change management
  eu_ai_act:
  - article: Art. 15(3)
    requirement: AI systems must be resilient against adversarial attacks; threat analysis required at design stage
inputs:
- name: Approved architecture document
  source_control: QC-03
  description: Architecture design used as input to threat modelling.
outputs:
- name: STRIDE threat model
  type: artefact
  description: Complete threat model mapping threats to trust boundaries with proposed mitigations.
  retention: 7 years (DORA)
- name: Threat model validation evidence
  type: evidence
  description: Human sign-off confirming threat model is complete and mitigations are accepted.
  retention: 7 years (DORA)
failure_behaviour:
  action: block
  escalation_target: Security Architect
  description: Unmitigated high-severity threats block progression. Design must be revised to address threats.
automation:
  frequency: per_change
dependencies:
- QC-03
metadata:
  version: '1.0'
  last_updated: '2026-03-02'
  status: approved
