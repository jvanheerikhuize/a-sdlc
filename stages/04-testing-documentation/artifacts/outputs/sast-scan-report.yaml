# =============================================================================
# SAST Scan Report Template
# =============================================================================
# Produced during Step 4.1 by control SC-4A.
# Records static analysis results across the full merged codebase with
# CWE-mapped findings triaged by Security Architect.
#
# Retention: 7 years (DORA Art. 8(6)).
#
# Usage:
#   Copy: cp sast-scan-report.yaml FEAT-XXXX-sast-scan-report.yaml
# =============================================================================

feat_id: ""                        # FEAT-XXXX
stage: 4
control: SC-4A
scanned_at: ""                     # ISO 8601 datetime
tooling: ""                        # Name and version of SAST tool

scope:
  files_scanned: 0
  lines_scanned: 0
  agent_generated_files: 0        # Subset subject to heightened scrutiny

findings: []
# Per-finding entries, e.g.:
# - id: "SAST-001"
#   file: ""
#   line: null
#   cwe_id: ""                     # e.g. CWE-89 (SQL Injection)
#   cwe_name: ""
#   severity: ""                   # critical | high | medium | low | informational
#   description: ""
#   agent_generated: null          # true | false
#   resolution:
#     status: ""                   # open | remediated | accepted
#     remediated_at: ""            # ISO 8601 datetime (if remediated)
#     accepted_by: ""              # SA name (required for critical/high acceptance)
#     acceptance_rationale: ""

summary:
  total_findings: 0
  by_severity:
    critical: 0
    high: 0
    medium: 0
    low: 0
    informational: 0
  unresolved_critical: 0          # Must be 0 or formally accepted before Stage 4 exit
  unresolved_high: 0
  status: ""                       # passed | passed_with_accepted_risk | failed
  reviewed_by: ""                  # SA name and timestamp
  reviewed_at: ""                  # ISO 8601 datetime
