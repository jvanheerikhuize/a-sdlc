# Step 3.2: Implementation Loop
# Stage 3 — Coding & Implementation
# Control: QC-05

id: '3.2'
title: Implementation Loop
stage: 3
control: QC-05
description: Code quality standards (per-commit)
delegation: Agent implements, DEV authors
depends_on:
- '3.1'
actors:
- role: AGT
  action: Implement code against the approved Stage 2 design document
- role: AGT
  action: Tag all agent-generated code with provenance metadata at point of generation (GC-03 Agent Provenance Registry)
- role: AGT
  action: Commit; QC-05 runs quality gates and SC-09 scans for secrets automatically
- role: AGT
  action: 'Log all significant autonomous decisions to the decision log (RC-04): rationale, alternatives considered'
- role: DEV
  action: Review and triage any QC-05 violations or SC-09 blocked commits; resolve before re-committing
- role: AGT
  action: Repeat until all design requirements are implemented
inputs:
- Approved design document
outputs:
- Quality gate report (artifacts/outputs/quality-gate-report.yaml)
- Secrets scan report (artifacts/outputs/secrets-scan-report.yaml)
- Decision log (artifacts/outputs/decision-log.yaml)
on_failure: Commit blocked; developer resolves violations and re-commits
note: This step is the main implementation loop. All four controls run continuously — QC-05 and SC-09 on every commit, GC-03
  at the point of generation, RC-04 whenever a significant decision is made. Repeats on every commit.
