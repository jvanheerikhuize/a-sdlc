# =============================================================================
# Control: GC-03 — Agent Provenance Registry
# Track:   GC (Governance Controls)
# Owner:   Governance & Compliance / AI Governance Lead
# Schema:  ../../../schema/control.schema.json
# =============================================================================

id: GC-03
moscow_score: must
name: Agent Provenance Registry
description: 'Maintain a centralised registry of all agent contributions across the lifecycle: what each agent produced, which
  decisions it made autonomously, and which humans reviewed and approved its output. In Stage 3, tag all code with immutable
  provenance metadata identifying whether each contribution was written by a human, generated by an agent, or co-authored.
  Supports DORA third-party oversight and EU AI Act deployer obligations.'
required_in_stages:
- number: 0
  name: Cross-Cutting
  mandatory: true
track:
  code: GC
  name: Governance Controls
delegation:
  pattern: fully_automated
  human_display: Fully automated
  agent_role: Register every contribution, decision, and approval in the provenance registry automatically. In Stage 3, tag
    all code with provenance metadata at the point of generation.
  human_role: Review provenance records and reports during audits; confirm attribution accuracy; provide regulatory evidence
    of agent oversight.
owner:
  team: Governance & Compliance
  role: AI Governance Lead
  contact: ''
regulatory_mapping:
  dora:
  - article: Art. 28
    obligation: Third-party ICT service provider oversight and accountability
  - article: Art. 8(6)
    obligation: ICT documentation including agent and automation contributions; traceability of ICT changes including identification
      of all contributors
  eu_ai_act:
  - article: Art. 17(1)(f)
    requirement: Data management and quality management documentation of AI system contributions
  - article: Art. 26(5)
    requirement: Deployer obligations for monitoring AI system operation
  - article: Art. 12
    requirement: Record-keeping requirements for high-risk AI systems including output attribution
outputs:
- name: Agent provenance record
  type: registry_entry
  description: Per-contribution entry recording agent identity, action taken, output reference, and approving human.
  retention: 7 years (DORA Art. 28)
- name: Code provenance record
  type: registry_entry
  description: Per-contribution entry attributing code to human, agent, or co-authored (Stage 3).
  retention: 7 years (DORA)
failure_behaviour:
  action: block
  escalation_target: Compliance Officer
  description: Code without provenance tags cannot be included in a pull request.
automation:
  frequency: per_change
feedback_loops:
- path: path_a
  required_in_path: true
- path: path_b
  required_in_path: true
metadata:
  version: '1.1'
  last_updated: '2026-03-06'
  status: approved
