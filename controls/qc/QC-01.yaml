# =============================================================================
# Control: QC-01 — Specification Validation
# Track:   QC (Quality Controls)
# Owner:   Product / Delivery / Product Owner
# Schema:  ../../../schema/control.schema.json
# =============================================================================

id: QC-01
moscow_score: must
name: Specification Validation
description: Confirm the incoming change request has been correctly captured with complete acceptance criteria, non-functional
  requirements (NFRs), and measurable success conditions. Reject incomplete specifications before any design work begins.
required_in_stages:
- number: 1
  name: Intent Ingestion
  mandatory: true
track:
  code: QC
  name: Quality Controls
delegation:
  pattern: agent_drafts_human_approves
  human_display: Agent drafts, human approves
  agent_role: Parse incoming request, generate structured specification, identify gaps in acceptance criteria or NFRs.
  human_role: Review draft specification; approve or reject; resolve identified gaps before sign-off.
owner:
  team: Product / Delivery
  role: Product Owner
  contact: ''
regulatory_mapping:
  dora:
  - article: Art. 8
    obligation: ICT risk management requires documented change procedures with complete specifications
inputs:
- name: Incoming change request
  description: Raw change request from stakeholder (ticket, brief, or natural language intent).
outputs:
- name: Validated feature specification
  type: artefact
  description: Structured FEAT-XXXX specification file conforming to schema/feature-spec.schema.json.
  retention: Lifecycle of the change + 7 years
- name: Specification validation evidence
  type: evidence
  description: Checklist confirming all required fields are present and complete.
  retention: 7 years (DORA)
failure_behaviour:
  action: block
  escalation_target: Product Owner
  description: Specification is returned to requester with identified gaps. Stage 1 cannot progress until all gaps are resolved.
automation:
  frequency: per_change
dependencies: []
metadata:
  version: '1.0'
  last_updated: '2026-03-02'
  status: approved
