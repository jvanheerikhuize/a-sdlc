# =============================================================================
# Control: SC-4C — API Security Testing
# Track:   SC (Security Controls)
# Owner:   Security / Application Security Engineer
# Schema:  ../../../schema/control.schema.json
# =============================================================================

id: SC-4C
moscow_score: must
name: API Security Testing
description: >-
  Execute dedicated API security testing against all exposed API endpoints using OWASP
  API Security Top 10 methodology. Test for: Broken Object Level Authorisation (BOLA),
  Broken Function Level Authorisation (BFLA), Broken Authentication, Unrestricted Resource
  Consumption, Broken Object Property Level Authorisation, Server-Side Request Forgery (SSRF),
  Security Misconfiguration, Improper Inventory Management, API rate limiting, and unsafe
  consumption of downstream APIs. Complement SC-4B (DAST) which tests general OWASP Top 10.
required_in_stages:
- number: 4
  name: Testing & Documentation
  mandatory: true
  note: >-
    API security testing is distinct from general DAST (SC-4B) and must target API-specific
    attack classes. Includes REST, GraphQL, WebSocket, and RPC endpoints.
track:
  code: SC
  name: Security Controls
delegation:
  pattern: agent_executes_human_reviews
  human_display: Agent executes, human reviews findings
  agent_role: >-
    Execute OWASP API Security Top 10 testing using automated tools (Burp Suite,
    OWASP ZAP API scanner, or equivalent). Perform fuzzing, schema validation testing,
    authentication boundary testing, and authorisation logic testing. Generate findings
    report with severity ratings and remediation guidance.
  human_role: >-
    Review findings. Determine which vulnerabilities must be remediated before deployment
    (blocker), which can be accepted as known risks (exception), and which are false positives.
    Approve remediation or exception for each finding.
owner:
  team: Security
  role: Application Security Engineer
  contact: ''
regulatory_mapping:
  dora:
    - article: "Art. 24-25"
      obligation: >-
        Comprehensive digital operational resilience testing must include security
        assessments and gap analyses of exposed interfaces
    - article: "Art. 9(2)"
      obligation: ICT systems must be protected from unauthorised access; API boundaries are primary attack surface
  eu_ai_act:
    - article: "Art. 15(3-5)"
      requirement: >-
        AI systems must be resilient against attempts to alter use, outputs or performance.
        API endpoints are primary vectors for adversarial attacks on AI systems.
inputs:
- name: API specification (OpenAPI/Swagger, GraphQL schema, etc.)
  description: Definition of all exposed API endpoints, operations, and parameters
- name: Deployed system under test
  description: Staging/test environment with deployed APIs ready for testing
- name: Test data
  description: Valid and invalid test payloads for fuzzing and boundary testing
outputs:
- name: API Security Test Report
  type: report
  description: >-
    Findings by OWASP API Top 10 category, including affected endpoints, attack vectors,
    severity ratings (CVSS), and remediation guidance
  retention: 7 years (regulatory audit trail)
- name: Remediation tracking
  type: decision
  description: >-
    For each finding: remediation status, owner, target fix date, and approval sign-off
  retention: 7 years
failure_behaviour:
  action: escalate
  escalation_target: Security Team Lead
  description: >-
    Critical API vulnerabilities (BOLA exposing sensitive data, BFLA allowing privilege
    escalation, SSRF enabling lateral movement) must be remediated before deployment.
    If remediation cannot be completed, escalate to security leadership for risk decision.
automation:
  tooling:
    - Burp Suite Professional (API scanner module)
    - OWASP ZAP (API fuzzing plugin)
    - Postman Security
    - 42Crunch API Security
  frequency: per_release
  sla_minutes: 120
dependencies:
- SC-4A   # SAST (code-level security)
- SC-4B   # DAST (general OWASP Top 10)
- QC-4A   # Functional & Non-Functional Testing
metadata:
  version: '1.0'
  last_updated: '2026-03-04'
  status: approved
