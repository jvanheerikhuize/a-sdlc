# ============================================================
# A-SDLC Framework Manifest
# ============================================================
# Lightweight index of stages, controls, and supporting files.
# Stages:   stages/NN-name/stage.yaml
# Steps:    stages/NN-name/steps/step-N-N.yaml
# Controls: controls/[track]/[ID].yaml
# Registry: controls/registry.yaml
# Schema:   schema/framework.schema.json
# ============================================================

framework:
  name: Agentic Software Development Life Cycle
  abbreviation: A-SDLC
  version: '1.0'
  status: draft
  approval_owner: ''
  approval_contact: ''
  module:
    name: A-SDLC-GOVERNANCE-MODULE
    deployment: git-submodule
    default_mount_path: a-sdlc-governance
    companion_module: A-SDLC-AGENTIC-MODULE
    description: Governance, controls, directives, and lifecycle definitions for agentic and human-AI hybrid software development.
      Consumed as a git submodule by target repositories. The companion A-SDLC-AGENTIC-MODULE provides entry-point scaffolding
      and instructions for traditional human development repos that want to adopt the A-SDLC framework.
  tagline: A framework that defines how software is built, tested, and released when AI agents work alongside human developers.
  narrative:
    what_is_it: The Agentic SDLC is a paradigm shift where AI agents evolve from passive coding assistants to autonomous owners
      of specific lifecycle phases. It moves the human role from granular execution to high-level orchestration, decoupling
      output from headcount and eliminating the "wait states" inherent in manual hand-offs.
    properties:
    - Replaces the traditional SDLC — backwards- and forwards-compatible
    - Is solution, model, and toolchain agnostic — works with any agent or stack
    - Is usable by both humans and agents at every step and task
    value_propositions:
    - benefit: Velocity
      target: 20–30% faster delivery
      mechanism: Agents handle "in-between" work — environment setup, triage, PR descriptions
    - benefit: Quality
      target: 70% fewer production defects
      mechanism: Deep-context testing; programmatically enforced standards during coding
    - benefit: Governance
      target: Non-negotiable compliance
      mechanism: Immutable Core Security Directives injected into every agent context
    - benefit: Role Evolution
      target: Developer → System Orchestrator
      mechanism: Agents own repetitive tasks; engineers focus on architectural innovation
  regulatory_scope:
  - DORA
  - EU AI Act
  regulatory_summary:
    frameworks:
    - name: DORA
      full_name: Digital Operational Resilience Act
      regulation: EU 2022/2554
      controls_mapped: 44
      total_controls: 50
      coverage_pct: 88.0%
    - name: EU AI Act
      full_name: EU AI Act
      regulation: EU 2024/1689
      controls_mapped: 40
      total_controls: 50
      coverage_pct: 80.0%
  control_tracks:
  - code: QC
    name: Quality Controls
    description: Ensure work meets standards
  - code: RC
    name: Risk Controls
    description: Identify and manage what can go wrong
  - code: SC
    name: Security Controls
    description: Protect against threats and vulnerabilities
  - code: AC
    name: AI Controls
    description: Address EU AI Act requirements
  - code: GC
    name: Governance Controls
    description: Maintain the audit trail across everything
  delegation_patterns:
  - pattern: fully_automated
    description: Agent executes; no human judgement required
  - pattern: automated_policy_enforced
    description: Agent executes via policy engine; no human intervention
  - pattern: automated_with_human_escalation
    description: Agent executes; human escalated on anomaly
  - pattern: agent_drafts_human_approves
    description: Agent produces draft; human validates before proceeding
  - pattern: agent_analyses_human_resolves
    description: Agent surfaces findings; human makes the decision
  - pattern: agent_executes_human_reviews
    description: Agent runs the process; human reviews results
  - pattern: agent_classifies_human_validates
    description: Agent classifies; human confirms classification
  - pattern: agent_proposes_human_confirms
    description: Agent proposes option; human confirms
  - pattern: agent_calculates_human_decides
    description: Agent computes outcome; human makes go/no-go
  - pattern: agent_validates_human_approves
    description: Agent checks completeness; human signs off
  - pattern: agent_monitors_human_reports
    description: Agent detects; human files the report
  - pattern: agent_creates_human_reviews
    description: Agent creates artefact; human reviews
  - pattern: agent_logs_human_reviews
    description: Agent writes log; human reviews it
  - pattern: agent_compiles_human_approves
    description: Agent compiles checklist; human approves
  - pattern: agent_checks_human_approves
    description: Agent verifies; human approves
  - pattern: human_required
    description: Cannot be delegated. Human must decide. Agent must stop and escalate.
roles:
  IA:
    name: Intake Analyst
    execution_mode: autonomous
    description: Stage 1 executor. Converts raw change requests into feature specifications.
    ref: roles/IA.yaml
  ARCH:
    name: Solution Architect
    execution_mode: autonomous
    description: Stage 2 executor. Translates specifications into system designs with threat models.
    ref: roles/ARCH.yaml
  IMPL:
    name: Implementation Engineer
    execution_mode: autonomous
    description: Stage 3 executor. Writes secure, traceable code that faithfully implements the approved design.
    ref: roles/IMPL.yaml
  TENG:
    name: Test Engineer
    execution_mode: autonomous
    description: Stage 4 executor. Runs tests and scans; assembles the go/no-go evidence package.
    ref: roles/TENG.yaml
  RENG:
    name: Release Engineer
    execution_mode: autonomous
    description: Stage 5 executor. Validates deployment readiness, artefact integrity, and rollback plans.
    ref: roles/RENG.yaml
  SRE:
    name: Site Reliability Engineer
    execution_mode: autonomous
    description: Stage 6 executor. Monitors production, classifies incidents, triggers feedback loops.
    ref: roles/SRE.yaml
  REQ:
    name: Requester
    execution_mode: gated
    description: Submits change requests; the originator of intent.
    ref: roles/REQ.yaml
  AGT:
    name: Agent
    execution_mode: autonomous
    description: Cross-cutting executor. Performs all automated work across all stages.
    ref: roles/AGT.yaml
  PO:
    name: Product Owner
    execution_mode: gated
    description: Business decision authority; approves specifications and resolves requirement conflicts.
    ref: roles/PO.yaml
  RO:
    name: Risk Officer
    execution_mode: gated
    description: Validates risk classifications; makes go/no-go and CAB approval decisions.
    ref: roles/RO.yaml
  SA:
    name: Security Architect
    execution_mode: gated
    description: Owns security posture; signs threat model; sole authority for security exceptions.
    ref: roles/SA.yaml
  AGL:
    name: AI Governance Lead
    execution_mode: gated
    description: Confirms EU AI Act risk tiers for AI components; owns AC-track controls.
    ref: roles/AGL.yaml
  LAD:
    name: Lead Architect
    execution_mode: gated
    description: Owns architectural decisions; design completeness approval gate at Stage 2.
    ref: roles/LAD.yaml
  DEV:
    name: Developer
    execution_mode: gated
    description: Authors and reviews code; pull request approval gate at Stage 3.
    ref: roles/DEV.yaml
  QA:
    name: QA Engineer
    execution_mode: gated
    description: Owns test coverage; quality sign-off gate at Stage 4.
    ref: roles/QA.yaml
  REL:
    name: Release Manager
    execution_mode: gated
    description: Manages deployment pipeline; release readiness and rollback approval at Stage 5.
    ref: roles/REL.yaml
  OPS:
    name: Operations / SRE
    execution_mode: gated
    description: Owns production; executes deployment, monitors health, triggers feedback loops.
    ref: roles/OPS.yaml
  CO:
    name: Compliance Officer
    execution_mode: gated
    description: Audit consumer; reviews artefacts for regulatory compliance across all stages.
    ref: roles/CO.yaml
cross_cutting:
  description: Controls and directives active across all six stages for every agent session.
  feedback_loops:
    definition: feedbackloops/feedback-loops.yaml
    process: feedbackloops/process.md
    readme: feedbackloops/README.md
    artifacts_dir: feedbackloops/artifacts/
    autofix_templates_dir: feedbackloops/autofix-templates/
  directives:
    core: directives/core/core-directives.yaml
    stages: directives/stages/
  controls:
  - id: SC-01
    name: Core Directive Injection
    track: SC
  - id: SC-02
    name: Stage Directive Injection
    track: SC
  - id: GC-01
    name: Audit Trail & Compliance Reporting
    track: GC
  - id: GC-02
    name: End-to-End Traceability
    track: GC
  - id: GC-03
    name: Agent Provenance Registry
    track: GC
  - id: GC-04
    name: Compliance Evidence Automation
    track: GC
stages:
- number: 1
  name: Intent Ingestion
  slug: 01-intent-ingestion
  directory: stages/01-intent-ingestion
  stage_file: stages/01-intent-ingestion/stage.yaml
  readme: stages/01-intent-ingestion/README.md
  artifacts_dir: stages/01-intent-ingestion/artifacts/
  description: High-level business goals are captured, disambiguated, and transformed into structured technical requirements.
    Establishes the source of truth for all subsequent agentic actions.
- number: 2
  name: System Design
  slug: 02-system-design
  directory: stages/02-system-design
  stage_file: stages/02-system-design/stage.yaml
  readme: stages/02-system-design/README.md
  description: Validated intent is translated into architecture and technical specifications. Threat modelling and stage directive
    injection occur here before any coding begins.
- number: 3
  name: Coding & Implementation
  slug: 03-coding-implementation
  directory: stages/03-coding-implementation
  stage_file: stages/03-coding-implementation/stage.yaml
  readme: stages/03-coding-implementation/README.md
  description: 'Code is produced by human developers, AI agents, or both. The most control-dense stage: enforces quality,
    controls agent permissions, scans for security issues, tracks provenance, and converges into a reviewed PR.'
- number: 4
  name: Testing & Documentation
  slug: 04-testing-documentation
  directory: stages/04-testing-documentation
  stage_file: stages/04-testing-documentation/stage.yaml
  readme: stages/04-testing-documentation/README.md
  description: The verification gate. Answers "does it work correctly?" and "is it safe to release?" Culminates in a risk
    threshold evaluation that opens or blocks the door to deployment.
- number: 5
  name: Deployment & Release
  slug: 05-deployment-release
  directory: stages/05-deployment-release
  stage_file: stages/05-deployment-release/stage.yaml
  readme: stages/05-deployment-release/README.md
  description: Promotion to production. Carries the strongest governance requirements. Ensures everything prior is complete,
    the deployment is trustworthy, and there is a verified rollback path.
- number: 6
  name: Observability & Maintenance
  slug: 06-observability-maintenance
  directory: stages/06-observability-maintenance
  stage_file: stages/06-observability-maintenance/stage.yaml
  readme: stages/06-observability-maintenance/README.md
  description: The only stage that never ends. Continuous monitoring of operational health, security posture, risk evolution,
    and AI behaviour. Feeds back into the lifecycle through defined re-entry paths.
supporting_files:
  schema:
    control_definition: schema/control.schema.json
    feature_specification: schema/feature-spec.schema.json
  registry: controls/registry.yaml
  regulatory: regulatory/compliance-matrix.yaml
