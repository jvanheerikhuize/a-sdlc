# =============================================================================
# AI Tier Classification Template
# =============================================================================
# Produced during Stage 1 Step 5 by control AC-01 (conditional).
# Only applicable when the change introduces, modifies, or interacts with
# AI components. If not applicable, set tier to not_applicable.
#
# Regulatory basis: EU AI Act Art. 6, Annex III.
#
# Usage:
#   Copy: cp ai-tier-classification.yaml FEAT-XXXX-ai-tier-classification.yaml
# =============================================================================

feat_id: ""                        # FEAT-XXXX
stage: 1
control: AC-01
classified_at: ""                  # ISO 8601 datetime

has_ai_component: null             # true | false
                                   # If false: set tier to not_applicable

tier: ""                           # minimal | limited | high | unacceptable | not_applicable

rationale: |
  # Justification for the assigned tier, referencing EU AI Act Art. 6 and Annex III.

eu_ai_act_references:
  - article: ""                    # e.g. "Art. 6", "Annex III §1"
    relevance: ""                  # Why this article applies

# Compliance obligations triggered for downstream stages.
# Populated only when tier is high or unacceptable.
triggered_obligations:
  - stage: 2
    control: AC-03
    obligation: ""                 # e.g. AI component design review required
  - stage: 4
    control: AC-05
    obligation: ""                 # e.g. bias and fairness testing required
  - stage: 6
    control: AC-06
    obligation: ""                 # e.g. post-market surveillance required

classification:
  proposed_by_agent: ""            # Tier proposed by the agent
  confirmed_by: ""                 # AI Governance Lead name
  confirmed_at: ""                 # ISO 8601 datetime
  override: null                   # true if AGL changed the agent's proposed tier
  override_rationale: ""           # Required if override is true
