# =============================================================================
# Stage 4: Testing & Documentation — Controls
# =============================================================================
# Schema: ../../schema/control.schema.json
# =============================================================================

controls:

  - id: QC-4A
    name: Functional & Non-Functional Testing
    description: >-
      Execute the full test suite covering: functional tests mapped to every
      Stage 1 acceptance criterion, regression tests, negative and boundary
      tests, performance tests, load tests, stress tests, accessibility tests,
      and resilience tests. All tests must be traced to their originating
      acceptance criteria.
    stage:
      number: 4
      name: Testing & Documentation
    track:
      code: QC
      name: Quality Controls
    delegation:
      pattern: agent_executes_human_reviews
      human_display: Agent executes, human reviews
      agent_role: Execute full test suite; generate pass/fail report mapped to acceptance criteria.
      human_role: Review test results; investigate failures; determine if failures block release or require fix.
    owner:
      team: Quality Assurance
      role: QA Lead
      contact: ""
    regulatory_mapping:
      dora:
        - article: "Art. 8(4)"
          obligation: Thorough testing of ICT systems before deployment to production
      dnb:
        - area: OTAP testing methodology and acceptance testing
          requirement: All changes must pass acceptance testing against defined criteria before production
      eu_ai_act:
        - article: "Art. 15(1)"
          requirement: AI systems must be tested for appropriate levels of accuracy and reliability
    inputs:
      - name: Validated feature specification
        source_control: QC-1A
        description: Stage 1 acceptance criteria used as the test basis.
      - name: Approved pull request
        source_control: QC-3A
        description: Merged code that is the subject of testing.
    outputs:
      - name: Test results report
        type: evidence
        description: Full test results mapped to acceptance criteria with pass/fail status per criterion.
        retention: 7 years (DORA)
    failure_behaviour:
      action: block
      escalation_target: QA Lead
      description: Failing tests block Stage 4 exit. Work is returned to Stage 3 for remediation.
    automation:
      frequency: per_release
    dependencies:
      - QC-3A
    feedback_loops:
      - path: path_a_autofix
        required_in_path: true
      - path: path_b_quickfix
        required_in_path: true
    metadata:
      version: "1.0"
      last_updated: "2026-03-02"
      status: approved

  - id: QC-4B
    name: AI Output Validation
    description: >-
      For changes involving AI systems: execute hallucination detection tests,
      accuracy benchmarking against defined thresholds, output consistency tests
      across equivalent inputs, and boundary condition tests. Results feed into
      the RC-4A risk threshold evaluation. Not applicable to changes with no
      AI component.
    stage:
      number: 4
      name: Testing & Documentation
    track:
      code: QC
      name: Quality Controls
    delegation:
      pattern: agent_executes_human_reviews
      human_display: Agent executes, human reviews
      agent_role: Execute AI validation test suite; measure hallucination rate, accuracy, and consistency.
      human_role: Review AI validation results; determine if accuracy thresholds are acceptable for release.
    owner:
      team: AI Governance
      role: AI Governance Lead
      contact: ""
    regulatory_mapping:
      eu_ai_act:
        - article: "Art. 15(1)"
          requirement: Accuracy, robustness, and cybersecurity requirements for high-risk AI systems
        - article: "Art. 9(7)"
          requirement: Testing to identify appropriate risk management measures for AI systems
    inputs:
      - name: AI Act risk tier classification
        source_control: AC-1A
        description: Determines the depth and scope of AI validation required.
    outputs:
      - name: AI output validation report
        type: evidence
        description: Hallucination detection results, accuracy scores, consistency test results, and boundary test outcomes.
        retention: 7 years (AI Act)
    failure_behaviour:
      action: block
      escalation_target: AI Governance Lead
      description: AI systems failing accuracy thresholds cannot proceed to production.
    automation:
      frequency: per_release
    dependencies:
      - QC-3A
      - AC-1A
    metadata:
      version: "1.0"
      last_updated: "2026-03-02"
      status: approved

  - id: QC-4C
    name: Documentation Completeness
    description: >-
      Verify that all required documentation is present, current, and accurately
      reflects the implementation. Required documentation includes: runbooks,
      API documentation, Architecture Decision Records (ADRs), decision logs
      from Stage 3, and technical documentation required by the AI Act for
      AI components.
    stage:
      number: 4
      name: Testing & Documentation
    track:
      code: QC
      name: Quality Controls
    delegation:
      pattern: agent_checks_human_approves
      human_display: Agent checks, human approves
      agent_role: Verify all required documentation exists and is current against the implementation; flag gaps.
      human_role: Review documentation completeness report; approve or require documentation updates.
    owner:
      team: Engineering
      role: Tech Lead
      contact: ""
    regulatory_mapping:
      dora:
        - article: "Art. 8(6)"
          obligation: Documentation requirements for ICT risk management including change documentation
      dnb:
        - area: Documentation standards for changes
          requirement: All changes must have complete documentation before production deployment
      eu_ai_act:
        - article: "Art. 11, Annex IV"
          requirement: Technical documentation requirements for high-risk AI systems must be complete before deployment
    outputs:
      - name: Documentation completeness report
        type: evidence
        description: Checklist confirming all required documentation is present, current, and accurately reflects the implementation.
        retention: 7 years (DORA)
    failure_behaviour:
      action: block
      escalation_target: Tech Lead
      description: Missing or outdated documentation blocks Stage 4 exit until resolved.
    automation:
      frequency: per_release
    dependencies:
      - QC-3A
    metadata:
      version: "1.0"
      last_updated: "2026-03-02"
      status: approved

  - id: RC-4A
    name: Risk Threshold Evaluation
    description: >-
      Aggregate all Stage 4 control results and determine whether the residual
      risk of the change falls within the organisation's risk appetite. Produces
      one of three outcomes: pass (proceed to Stage 5), conditional pass (proceed
      with documented risk acceptance from appropriate authority), or fail (return
      to Stage 3). This is the formal go/no-go gate for deployment.
    stage:
      number: 4
      name: Testing & Documentation
    track:
      code: RC
      name: Risk Controls
    delegation:
      pattern: agent_calculates_human_decides
      human_display: Agent calculates, human decides
      agent_role: Aggregate all Stage 4 results; calculate residual risk score; present recommendation with supporting evidence.
      human_role: Make the formal go/no-go decision. For conditional pass: provide documented risk acceptance.
    owner:
      team: Risk Management
      role: Risk Officer
      contact: ""
    regulatory_mapping:
      dora:
        - article: "Art. 8(1)"
          obligation: Risk appetite and tolerance levels must be respected; changes exceeding appetite must not proceed
      dnb:
        - area: Risk acceptance procedures and residual risk assessment
          requirement: Formal risk acceptance required for conditional pass; appropriate authority must sign off
      eu_ai_act:
        - article: "Art. 9(2)(a)"
          requirement: Estimation and evaluation of known and foreseeable risks before deployment
    inputs:
      - name: Test results report
        source_control: QC-4A
        description: Functional and NFR test results.
      - name: AI output validation report
        source_control: QC-4B
        description: AI-specific test results (if applicable).
      - name: Documentation completeness report
        source_control: QC-4C
        description: Documentation verification results.
      - name: SAST scan results
        source_control: SC-4A
        description: Static security analysis findings.
      - name: DAST scan results
        source_control: SC-4B
        description: Dynamic security analysis findings.
      - name: Bias & fairness test report
        source_control: AC-4A
        description: AI bias testing results (if applicable).
    outputs:
      - name: Risk threshold evaluation decision
        type: decision
        description: Go/no-go decision with residual risk score, rationale, and (for conditional pass) formal risk acceptance.
        retention: 7 years (DORA)
    failure_behaviour:
      action: block
      escalation_target: Risk Officer
      description: Fail result blocks progression. Work returns to Stage 3. Conditional pass requires formal risk acceptance before Stage 5.
    automation:
      frequency: per_release
    dependencies:
      - QC-4A
      - QC-4C
      - SC-4A
      - SC-4B
    feedback_loops:
      - path: path_a_autofix
        required_in_path: true
      - path: path_b_quickfix
        required_in_path: true
    metadata:
      version: "1.0"
      last_updated: "2026-03-02"
      status: approved

  - id: SC-4A
    name: SAST
    description: >-
      Static Application Security Testing: analyse the full codebase for security
      vulnerabilities mapped to CWE (Common Weakness Enumeration) categories.
      Apply heightened scrutiny to agent-generated code. Block release of any
      critical or high-severity findings.
    stage:
      number: 4
      name: Testing & Documentation
    track:
      code: SC
      name: Security Controls
    delegation:
      pattern: fully_automated
      human_display: Fully automated
      agent_role: Execute static analysis scan across full codebase; map findings to CWE; generate findings report.
      human_role: Review findings; triage; remediate or accept residual risk per severity policy.
    owner:
      team: Security
      role: Security Architect
      contact: ""
    regulatory_mapping:
      dora:
        - article: "Art. 24"
          obligation: General requirements for ICT testing including security testing
      dnb:
        - area: Security testing of applications
          requirement: Static security analysis required for all code changes before production
      eu_ai_act:
        - article: "Art. 15(2)"
          requirement: Examination of AI systems for biases and cybersecurity vulnerabilities
    outputs:
      - name: SAST scan report
        type: evidence
        description: Complete static analysis findings report with CWE mappings, severity ratings, and remediation recommendations.
        retention: 7 years (DORA)
    failure_behaviour:
      action: block
      escalation_target: Security Architect
      description: Critical and high-severity findings block Stage 4 exit. Must be remediated or have formal risk acceptance.
    automation:
      tooling:
        - SAST tool (language-specific)
      frequency: per_release
    feedback_loops:
      - path: path_a_autofix
        required_in_path: true
      - path: path_b_quickfix
        required_in_path: true
    metadata:
      version: "1.0"
      last_updated: "2026-03-02"
      status: approved

  - id: SC-4B
    name: DAST
    description: >-
      Dynamic Application Security Testing: execute runtime security tests against
      a deployed test instance including injection attack tests, authentication
      flaw detection, session management validation, TLS configuration checks,
      and other OWASP top-10 categories.
    stage:
      number: 4
      name: Testing & Documentation
    track:
      code: SC
      name: Security Controls
    delegation:
      pattern: fully_automated
      human_display: Fully automated
      agent_role: Execute runtime security test suite against test environment; generate findings report.
      human_role: Review findings; remediate or formally accept residual risk per severity policy.
    owner:
      team: Security
      role: Security Architect
      contact: ""
    regulatory_mapping:
      dora:
        - article: "Art. 24"
          obligation: Requirements for ICT testing of security controls
        - article: "Art. 25"
          obligation: Testing of ICT tools and systems including penetration testing
      dnb:
        - area: Penetration and vulnerability testing
          requirement: Dynamic security testing required before production deployment
      eu_ai_act:
        - article: "Art. 15(3)"
          requirement: Technical solutions for AI-specific cybersecurity including runtime attack simulation
    outputs:
      - name: DAST scan report
        type: evidence
        description: Runtime security test results with findings, severity ratings, and remediation recommendations.
        retention: 7 years (DORA)
    failure_behaviour:
      action: block
      escalation_target: Security Architect
      description: Critical and high-severity findings block Stage 4 exit.
    automation:
      tooling:
        - DAST tool (e.g. OWASP ZAP, Burp Suite)
      frequency: per_release
    metadata:
      version: "1.0"
      last_updated: "2026-03-02"
      status: approved

  - id: AC-4A
    name: Bias & Fairness Testing
    description: >-
      For changes involving AI systems: test for discriminatory outcomes across
      protected characteristics (e.g. age, gender, ethnicity, disability) as
      defined by applicable EU regulations. Results feed into RC-4A. Not
      applicable to changes with no AI component.
    stage:
      number: 4
      name: Testing & Documentation
    track:
      code: AC
      name: AI Controls
    delegation:
      pattern: agent_executes_human_reviews
      human_display: Agent executes, human reviews
      agent_role: Execute bias and fairness test suite across protected characteristic groups; measure disparate impact.
      human_role: Review bias test results; determine if disparate impact is within acceptable thresholds.
    owner:
      team: AI Governance
      role: AI Governance Lead
      contact: ""
    regulatory_mapping:
      eu_ai_act:
        - article: "Art. 10(2)(f)"
          requirement: Examination of training data and outputs for potential biases
        - article: "Art. 10(5)"
          requirement: Special category data may be used for bias detection and correction
        - article: "Art. 15(1)"
          requirement: Appropriate levels of accuracy across all population groups
    outputs:
      - name: Bias & fairness test report
        type: evidence
        description: Test results showing disparate impact measurements across protected groups with threshold comparison.
        retention: 7 years (AI Act)
    failure_behaviour:
      action: block
      escalation_target: AI Governance Lead
      description: Discriminatory outcomes exceeding defined thresholds block deployment. Design or training data must be revised.
    automation:
      frequency: per_release
    dependencies:
      - AC-1A
    metadata:
      version: "1.0"
      last_updated: "2026-03-02"
      status: approved
