# =============================================================================
# Feature Specification Template
# =============================================================================
# Usage:
#   1. Copy this file: cp feature-spec.yaml FEAT-XXXX-your-title.yaml
#   2. Replace all <placeholder> values with actual content
#   3. Validate against schema: ../../schema/feature-spec.schema.json
#
# This template is produced during Stage 1 (QC-1A) and forms the source of
# truth for all subsequent stages. Every acceptance criterion defined here
# must be traced to at least one test case in Stage 4 (QC-4A).
# =============================================================================

metadata:
  id: "FEAT-0000"              # Replace with next available ID (e.g. FEAT-0001)
  title: "Feature Title"
  version: "1.0.0"
  status: "draft"              # draft | review | approved | implemented | deprecated
  priority: "medium"           # critical | high | medium | low
  author: ""
  created_at: "2026-01-01"
  updated_at: "2026-01-01"
  tags:
    - ""                       # Add relevant tags (e.g. backend, api, security)

description:
  summary: |
    Brief overview of the feature in 1-2 sentences.

  problem_statement: |
    Describe the problem this feature solves.
    - What pain points exist?
    - Who is affected?
    - What is the impact of not solving this?

  proposed_solution: |
    High-level description of how this feature solves the problem.
    Focus on the "what" rather than the "how". Implementation details
    belong in the Stage 2 architecture document.

  out_of_scope:
    - "Item explicitly not included in this feature"

  dependencies:
    - "FEAT-0000: Name of any dependent feature"
    - "External system or service dependency"

acceptance_criteria:
  - id: "AC-001"
    given: "A user is in state X"
    when: "They perform action Y"
    then: "Result Z occurs"
    and:
      - "Additional condition A is also true"
      - "Additional condition B is also true"

  - id: "AC-002"
    given: "Precondition"
    when: "Trigger"
    then: "Expected outcome"

technical_requirements:
  constraints:
    - "Must be backward compatible with version X.Y"
    - "Must not introduce new external dependencies without approval"

  performance:
    response_time_ms: 200          # p99 target in milliseconds
    throughput: "1000 requests/second"
    availability: "99.9%"

  security:
    - "All data must be encrypted at rest and in transit"
    - "Requires authentication and authorisation"

  scalability: |
    Describe expected load, growth trajectory, and scaling requirements.

api_changes:
  new_endpoints:
    - method: "POST"
      path: "/api/v1/resource"
      description: "Create new resource"

  modified_endpoints:
    - "PUT /api/v1/existing-resource — Added new optional field X"

  breaking_changes: false

ui_changes:
  wireframes:
    - "docs/wireframes/feature-name.png"

  components:
    - "ComponentName"

testing_requirements:
  unit_tests: true
  integration_tests: true
  e2e_tests: false
  performance_tests: false
  test_scenarios:
    - "Happy path: user completes X successfully"
    - "Edge case: user attempts X with invalid input"
    - "Error handling: downstream service is unavailable"

rollout:
  feature_flag: "feature_name_enabled"
  rollout_strategy: "gradual"    # immediate | gradual | canary | beta
  rollback_plan: |
    Steps to rollback if issues are detected:
    1. Disable feature flag
    2. Monitor for error reduction
    3. If persistent, roll back deployment using Stage 5 rollback procedure

# -----------------------------------------------------------------------------
# Risk Classification (populated by RC-1A and AC-1A during Stage 1)
# Do not fill in manually — this section is completed by the risk controls.
# -----------------------------------------------------------------------------
risk_classification:
  nf_red_tier: ""               # low | medium | high | critical — set by RC-1A
  ai_act_tier: ""               # minimal | limited | high | unacceptable | not_applicable — set by AC-1A
  governance_intensity: ""      # standard | enhanced | full — derived from nf_red_tier
