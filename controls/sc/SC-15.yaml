# =============================================================================
# Control: SC-15 — Adversarial AI Robustness Testing
# Track:   SC (Security Controls)
# Owner:   Security / AI Security Researcher
# Schema:  ../../../schema/control.schema.json
# =============================================================================

id: SC-15
moscow_score: could
name: Adversarial AI Robustness Testing
description: >-
  For AI components: test resilience against adversarial attacks targeting the model
  and its inference endpoints. Test categories: prompt injection attacks (malicious
  instructions to LLMs), data poisoning (training data corruption), model poisoning
  (compromise of pre-trained model components), adversarial examples (crafted inputs to
  degrade accuracy), confidentiality probes (attempts to extract training data or model
  weights), and API-level attacks on inference endpoints. AC-05 covers bias/fairness;
  this control covers the security-oriented attack surface of AI systems per EU AI Act Art. 15(5).
required_in_stages:
- number: 4
  name: Testing & Documentation
  mandatory: false
  note: >-
    Adversarial AI testing is specialised and high-effort. Recommended for high-risk
    or security-critical AI deployments. Phase 3 capability.
track:
  code: SC
  name: Security Controls
delegation:
  pattern: agent_executes_human_reviews
  human_display: Agent executes adversarial tests, human reviews findings
  agent_role: >-
    Execute adversarial robustness tests: prompt injection fuzzing, input perturbation
    testing, model extraction attacks, membership inference probes. Generate adversarial
    examples using techniques (FGSM, PGD, C&W). Measure accuracy degradation. Report findings.
  human_role: >-
    Review adversarial test findings. Determine: is the accuracy degradation acceptable?
    Are inference endpoints sufficiently hardened? Request design changes (input validation,
    rate limiting, model hardening) if robustness is insufficient.
owner:
  team: Security
  role: AI Security Researcher
  contact: ''
regulatory_mapping:
  eu_ai_act:
    - article: "Art. 15(5)"
      requirement: >-
        Protection against data poisoning, model poisoning, adversarial examples targeting
        accuracy, confidentiality breaches, and model flaws
  dora:
    - article: "Art. 9(2)"
      obligation: Protection of ICT systems from unauthorised access and manipulation
inputs:
- name: Trained AI model
  description: Model ready for testing
- name: Test data
  description: Valid and adversarial test inputs
- name: Model metadata
  source_control: AC-04
  description: Model limitations and known vulnerabilities
outputs:
- name: Adversarial Robustness Test Report
  type: report
  description: >-
    Findings by adversarial attack category: prompt injection success rate, adversarial
    example success rate, accuracy degradation, confidentiality breach attempts.
    Recommendations for model hardening or input validation.
  retention: 7 years (audit trail)
failure_behaviour:
  action: escalate
  escalation_target: Chief Information Security Officer
  description: >-
    If adversarial tests reveal unacceptable degradation in model accuracy or successful
    model extraction attacks, escalate to CISO for risk decision.
automation:
  tooling:
    - Adversarial attack frameworks (Foolbox, CleverHans, TextAttack)
    - Model security testing (Giskard, AI Fairness 360)
    - Prompt injection testing tools
  frequency: per_release
  sla_minutes: 480
dependencies:
- AC-03   # AI Component Design Review (design decisions inform attack surface)
- AC-05   # Bias & Fairness Testing (related AI robustness testing)
metadata:
  version: '1.0'
  last_updated: '2026-03-04'
  status: approved
