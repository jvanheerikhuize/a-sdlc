  total_controls: 39

  dora_mapped_controls: 19
  dora_coverage_percentage: 48.7%

  eu_ai_act_mapped_controls: 13
  eu_ai_act_coverage_percentage: 33.3%

  coverage_by_track:
    QC:
      total: 10
      mapped: 4
      percentage: 40%
    RC:
      total: 7
      mapped: 4
      percentage: 57%
    SC:
      total: 13
      mapped: 10
      percentage: 77%
    AC:
      total: 4
      mapped: 4
      percentage: 100%
    GC:
      total: 5
      mapped: 5
      percentage: 100%

  unmapped_controls:
    - QC-1A     # Specification Validation (quality, not regulatory)
    - QC-1B     # Coherence & Conflict Resolution (quality)
    - QC-2A     # Design Completeness & Standards (quality)
    - QC-3A     # Pull Request Creation & Review (quality)
    - QC-3B     # Code Quality Standards (quality)
    - QC-4A     # Functional & Non-Functional Testing (quality)
    - QC-4B     # AI Output Validation (mapped to EU AI Act Art. 15, implicit)
    - QC-5A     # Release Readiness Checklist (governance)
    - QC-6A     # SLA/SLO Monitoring (mapped to DORA Art. 11)
    - RC-1A     # Risk Classification (mapped to DORA Art. 8)
    - RC-2A     # Design Approval (governance gate)
    - RC-3A     # Decision Log (audit trail)
    - RC-4A     # Risk Threshold Evaluation (mapped to EU AI Act)
    - RC-5A     # CAB Approval (governance)
    - RC-5B     # Rollback Plan Validation (mapped to DORA Art. 11)
    - RC-6A     # Risk & Health Monitoring (mapped to DORA Art. 10/11)

  note: >
    Quality Control (QC) and Risk Control (RC) tracks contain significant governance
    and quality-focused controls that do not directly map to DORA or EU AI Act articles
    but support overall framework integrity and operational effectiveness. Security
    Control (SC), AI Control (AC), and Governance Control (GC) tracks show strong
    regulatory alignment (77-100% coverage).

