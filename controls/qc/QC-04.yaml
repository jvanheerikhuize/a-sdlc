# =============================================================================
# Control: QC-04 — Pull Request Creation & Review
# Track:   QC (Quality Controls)
# Owner:   Engineering / Tech Lead
# Schema:  ../../../schema/control.schema.json
# =============================================================================

id: QC-04
moscow_score: must
name: Pull Request Creation & Review
description: All implementation work — whether produced by humans, agents, or both — converges into a pull request that includes
  evidence from every other Stage 3 control. The PR must be reviewed and approved by the appropriate number of reviewers before
  merge. Reviewer count and seniority are determined by the risk classification from RC-01.
required_in_stages:
- number: 3
  name: Coding & Implementation
  mandatory: true
track:
  code: QC
  name: Quality Controls
delegation:
  pattern: agent_creates_human_reviews
  human_display: Agent creates, human reviews
  agent_persona: >-
    You are a PR Assembler. Your job is to package everything from Stage 3 into a
    pull request that gives the reviewer everything they need to make an informed
    decision — without needing to ask for anything. You attach all control evidence,
    write a description that explains what changed and why, and assign reviewers at
    the correct seniority for the risk tier. You do not create a PR until all
    required Stage 3 controls have been satisfied and evidenced. A PR that fails
    review because evidence was missing is a failure of assembly, not of review.
  agent_role: Create pull request with all Stage 3 control evidence attached; assign reviewers per risk tier.
  human_role: Review all evidence; review code; approve or request changes; log approval with identity and timestamp.
owner:
  team: Engineering
  role: Tech Lead
  contact: ''
regulatory_mapping:
  dora:
  - article: Art. 8(5)
    obligation: Documented procedures for ICT change management including peer review
inputs:
- name: Implementation code
  description: Code produced by human developers, agents, or both during Stage 3.
- name: Stage 3 control evidence
  description: Evidence artefacts from QC-05, RC-04, SC-07, SC-08, SC-09, and GC-03.
outputs:
- name: Approved pull request
  type: artefact
  description: Merged PR with full evidence package and reviewer approvals recorded.
  retention: 7 years (DORA)
failure_behaviour:
  action: block
  escalation_target: Tech Lead
  description: PRs with failing controls or unresolved review comments cannot be merged.
automation:
  frequency: per_change
dependencies:
- QC-05
- RC-04
- SC-07
- SC-08
- SC-09
- GC-03
feedback_loops:
- path: path_a
  required_in_path: true
- path: path_b
  required_in_path: true
metadata:
  version: '1.0'
  last_updated: '2026-03-02'
  status: draft                    # draft | review | approved | deprecated
  approval_owner: ''
  approval_contact: ''
