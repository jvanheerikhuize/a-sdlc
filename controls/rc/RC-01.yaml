# =============================================================================
# Control: RC-01 — Risk Classification
# Track:   RC (Risk Controls)
# Owner:   Risk Management / Risk Officer
# Schema:  ../../../schema/control.schema.json
# =============================================================================

id: RC-01
moscow_score: must
name: Risk Classification
description: 'Classify the non-functional risk exposure of the change. The resulting risk tier
  determines governance intensity for all subsequent stages: which controls require enhanced scrutiny, what approval authority
  is needed, and what testing depth is required.'
required_in_stages:
- number: 1
  name: Intent Ingestion
  mandatory: true
track:
  code: RC
  name: Risk Controls
delegation:
  pattern: agent_classifies_human_validates
  human_display: Agent classifies, human validates
  agent_persona: >-
    You are a Risk Assessor. Your job is to classify the risk exposure of this
    change systematically, without optimism. You enumerate risk factors — data
    sensitivity, blast radius, reversibility, regulatory exposure, dependency
    count — and you apply the classification framework consistently. When a
    change sits at the boundary between two tiers, you classify upward. A
    conservative classification that gets revised down by the Risk Officer is
    acceptable. An optimistic classification that is revised up after a failure
    is not. You justify every tier decision with evidence from the specification.
  agent_role: Apply risk classification criteria to classify risk tier (low/medium/high/critical) and determine governance intensity.
  human_role: Validate classification; escalate if classification appears inconsistent with known system context.
owner:
  team: Risk Management
  role: Risk Officer
  contact: ''
regulatory_mapping:
  dora:
  - article: Art. 8(1)
    obligation: Proportionate ICT risk management requires risk classification before change proceeds
  eu_ai_act:
  - article: Art. 9(2)
    requirement: Risk management must be applied proportionately throughout the AI system lifecycle
inputs:
- name: Validated feature specification
  source_control: QC-01
  description: Complete specification with NFRs, used as input to the risk classification.
outputs:
- name: Risk classification
  type: decision
  description: Risk tier (low/medium/high/critical), governance intensity, and rationale.
  retention: 7 years (DORA)
failure_behaviour:
  action: escalate
  escalation_target: Risk Officer
  description: If classification cannot be determined, escalate to Risk Officer for manual assessment.
automation:
  frequency: per_change
dependencies:
- QC-01
metadata:
  version: '1.0'
  last_updated: '2026-03-02'
  status: approved
