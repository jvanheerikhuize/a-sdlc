# =============================================================================
# Control: SC-09 — Secrets & Credentials Scanning
# Track:   SC (Security Controls)
# Owner:   Security / Security Architect
# Schema:  ../../../schema/control.schema.json
# =============================================================================

id: SC-09
moscow_score: must
name: Secrets & Credentials Scanning
description: Scan all code changes in real-time for hardcoded secrets, API keys, passwords, tokens, connection strings, and
  certificates. Block any commit containing exposed credentials before it enters version control history.
required_in_stages:
- number: 3
  name: Coding & Implementation
  mandatory: true
track:
  code: SC
  name: Security Controls
delegation:
  pattern: fully_automated
  human_display: Fully automated
  agent_role: Scan every commit for credential patterns; block commits containing matches.
  human_role: Review blocked commits; investigate false positives; remediate confirmed secrets.
owner:
  team: Security
  role: Security Architect
  contact: ''
regulatory_mapping:
  dora:
  - article: Art. 9(4)(c)
    obligation: Strong authentication and cryptographic key management policies
outputs:
- name: Secrets scan result
  type: evidence
  description: Per-commit scan result confirming no credentials detected or listing blocked commits with findings.
  retention: 7 years (DORA)
failure_behaviour:
  action: block
  escalation_target: Security Architect
  description: Commits containing secrets are blocked and cannot enter version control. Developer must remove the secret and
    rotate the credential.
automation:
  frequency: per_change
feedback_loops:
- path: path_a
  required_in_path: true
- path: path_b
  required_in_path: true
metadata:
  version: '1.0'
  last_updated: '2026-03-02'
  status: draft                    # draft | review | approved | deprecated
  approval_owner: ''
  approval_contact: ''
