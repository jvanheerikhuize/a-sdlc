# =============================================================================
# Control: RC-03 — Privacy Impact Assessment Gate
# Track:   RC (Risk Controls)
# Owner:   Compliance / Data Protection Officer
# Schema:  ../../../schema/control.schema.json
# =============================================================================

id: RC-03
moscow_score: should
name: Privacy Impact Assessment Gate
description: >-
  For changes that process personal data, involve user profiling, or involve high-risk
  AI systems, conduct or review a Privacy Impact Assessment (PIA, also called DPIA under GDPR)
  before design is approved. Determine: categories of personal data processed, data flows,
  legal basis for processing, data subject rights mechanisms, retention and deletion schedules,
  third-party data sharing, and specific risks to data subjects (discrimination, re-identification,
  surveillance). Gates on design approval (RC-02). Requires DPO review for high-risk scenarios.
required_in_stages:
- number: 2
  name: System Design
  mandatory: false
  note: >-
    Only applicable when the change processes personal data, involves profiling, or is
    classified as high-risk AI (AC-01). Triggered as a conditional gate on RC-02
    (Design Approval).
track:
  code: RC
  name: Risk Controls
delegation:
  pattern: agent_analyses_human_resolves
  human_display: Agent analyses, human resolves privacy risks
  agent_role: >-
    Review the design for personal data processing. Identify data types, processing
    activities, and potential privacy risks. Recommend mitigation measures: data
    minimisation, purpose limitation, consent mechanisms, encryption, access controls,
    retention limits. Draft a PIA/DPIA summary.
  human_role: >-
    Review the agent analysis. Engage DPO for high-risk processing (biometric data,
    sensitive categories, large-scale profiling). Determine: is the processing compliant
    with GDPR, DORA, and AI Act? What additional controls are needed? Approve or request
    design changes to address privacy risks.
owner:
  team: Compliance, Legal
  role: Data Protection Officer
  contact: ''
regulatory_mapping:
  eu_ai_act:
    - article: "Art. 10(5)"
      requirement: >-
        Processing of special categories of personal data for bias detection requires
        documented justification and strict controls
    - article: "Art. 9(2)(a)"
      requirement: >-
        Risk management must identify risks to fundamental rights (including privacy);
        presupposes early identification via PIA
  dora:
    - article: "Art. 9(2)"
      obligation: High standards for data protection across all states
inputs:
- name: System design specification
  source_control: QC-03
  description: Description of data processing activities, data flows, retention
- name: Data classification (if available)
  source_control: SC-04
  description: Sensitivity levels of personal data types involved
outputs:
- name: Privacy Impact Assessment (PIA/DPIA)
  type: report
  description: >-
    Comprehensive analysis of privacy risks, legal basis for processing, data subject
    rights, mitigation measures, and residual risks. Includes DPO review and recommendations.
  retention: 7 years (GDPR record-keeping, regulatory audit trail)
- name: Design change requests for privacy compliance
  type: decision
  description: >-
    Recommendations for design modifications to achieve privacy compliance. Examples:
    implement data minimisation, add consent mechanisms, reduce retention periods.
  retention: 7 years
failure_behaviour:
  action: escalate
  escalation_target: Data Protection Officer
  description: >-
    If privacy risks are identified that cannot be mitigated through design changes,
    escalate to DPO for risk acceptance decision. High-risk or non-compliant processing
    must be approved by DPO and Legal before design approval.
automation:
  tooling:
    - GDPR/Privacy Impact Assessment templates (ISO 29134)
    - Data mapping tools
  frequency: per_release
  sla_minutes: 480
dependencies:
- RC-02   # Design Approval (gates on this control)
- QC-03   # Design Completeness & Standards (provides design to assess)
metadata:
  version: '1.0'
  last_updated: '2026-03-04'
  status: draft                    # draft | review | approved | deprecated
  approval_owner: ''
  approval_contact: ''
