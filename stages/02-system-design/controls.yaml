# =============================================================================
# Stage 2: System Design — Controls
# =============================================================================
# Schema: ../../schema/control.schema.json
# =============================================================================

controls:

  - id: QC-2A
    name: Design Completeness & Standards
    description: >-
      Validate that the proposed design addresses all requirements from the
      Stage 1 specification, follows organisational architectural patterns, meets
      technology standards, and is sufficiently detailed for implementation.
    stage:
      number: 2
      name: System Design
    track:
      code: QC
      name: Quality Controls
    delegation:
      pattern: agent_drafts_human_approves
      human_display: Agent assists, human approves
      agent_role: Validate design coverage against specification; flag gaps, pattern deviations, and standards violations.
      human_role: Review validation report; approve design or request revisions before sign-off.
    owner:
      team: Engineering
      role: Lead Architect
      contact: ""
    regulatory_mapping:
      dora:
        - article: "Art. 8(4)"
          obligation: ICT systems must be designed to ensure resilience and meet quality standards
      dnb:
        - area: Architecture review and approval procedures
          requirement: Design must be reviewed against organisational standards before implementation
    inputs:
      - name: Validated feature specification
        source_control: QC-1A
        description: Complete specification from Stage 1 used to validate design coverage.
    outputs:
      - name: Design validation report
        type: evidence
        description: Structured report confirming all requirements are addressed and all standards are met.
        retention: 7 years (DORA)
      - name: Approved architecture document
        type: artefact
        description: Final approved design including component diagrams, integration maps, and data flows.
        retention: Lifecycle of system + 7 years
    failure_behaviour:
      action: block
      escalation_target: Lead Architect
      description: Design is returned for revision. Stage 2 cannot progress until all gaps are resolved.
    automation:
      frequency: per_change
    dependencies:
      - QC-1A
      - QC-1B
    metadata:
      version: "1.0"
      last_updated: "2026-03-02"
      status: approved

  - id: RC-2A
    name: Design Approval (F-RED)
    description: >-
      Consolidated governance gate combining design approval with functional
      risk classification (F-RED). Determines the appropriate sign-off authority
      based on the functional risk tier: high-risk requires senior architecture
      board approval; medium requires lead architect; low may be pre-approved.
      This control cannot be delegated to an agent.
    stage:
      number: 2
      name: System Design
    track:
      code: RC
      name: Risk Controls
    delegation:
      pattern: human_required
      human_display: Human required
      agent_role: Prepare design approval package with F-RED classification, risk summary, and supporting evidence.
      human_role: Make the formal approval decision. This control cannot be delegated to an agent under any circumstances.
    owner:
      team: Risk Management
      role: Risk Officer
      contact: ""
    regulatory_mapping:
      dora:
        - article: "Art. 8(1)"
          obligation: Governance and approval of ICT changes must be proportionate to risk
      dnb:
        - area: Risk-based approval authority for changes
          requirement: Approval authority must match risk tier; high-risk changes require senior sign-off
      eu_ai_act:
        - article: "Art. 9"
          requirement: Risk management approval required for AI system design before implementation
    inputs:
      - name: Design validation report
        source_control: QC-2A
        description: Completed design validation confirming standards compliance.
      - name: NF-RED risk classification
        source_control: RC-1A
        description: Risk tier from Stage 1 informing approval authority requirements.
    outputs:
      - name: Design approval decision
        type: decision
        description: Formal approval or rejection with authority identity, timestamp, and conditions.
        retention: 7 years (DORA)
    failure_behaviour:
      action: block
      escalation_target: Risk Officer
      description: Rejected designs are returned for revision. No coding may begin without approval.
    automation:
      frequency: per_change
    dependencies:
      - QC-2A
      - RC-1A
    metadata:
      version: "1.0"
      last_updated: "2026-03-02"
      status: approved

  - id: SC-2A
    name: Threat Model Validation
    description: >-
      Perform STRIDE-based threat analysis across all trust boundaries in the
      design. Verify that the proposed architecture does not introduce insecure
      patterns and that identified threats have corresponding mitigations.
    stage:
      number: 2
      name: System Design
    track:
      code: SC
      name: Security Controls
    delegation:
      pattern: agent_drafts_human_approves
      human_display: Agent generates, human validates
      agent_role: Generate STRIDE threat model across all trust boundaries; propose mitigations for each identified threat.
      human_role: Validate threat model completeness; approve mitigations or require design changes.
    owner:
      team: Security
      role: Security Architect
      contact: ""
    regulatory_mapping:
      dora:
        - article: "Art. 8(3)"
          obligation: Identification and assessment of ICT-related threats as part of change management
      dnb:
        - area: Threat analysis as part of change process
          requirement: STRIDE or equivalent threat analysis required for all significant design changes
      eu_ai_act:
        - article: "Art. 15(3)"
          requirement: AI systems must be resilient against adversarial attacks; threat analysis required at design stage
    inputs:
      - name: Approved architecture document
        source_control: QC-2A
        description: Architecture design used as input to threat modelling.
    outputs:
      - name: STRIDE threat model
        type: artefact
        description: Complete threat model mapping threats to trust boundaries with proposed mitigations.
        retention: 7 years (DORA)
      - name: Threat model validation evidence
        type: evidence
        description: Human sign-off confirming threat model is complete and mitigations are accepted.
        retention: 7 years (DORA)
    failure_behaviour:
      action: block
      escalation_target: Security Architect
      description: Unmitigated high-severity threats block progression. Design must be revised to address threats.
    automation:
      frequency: per_change
    dependencies:
      - QC-2A
    metadata:
      version: "1.0"
      last_updated: "2026-03-02"
      status: approved

  - id: SC-2B
    name: Directive Injection
    description: >-
      Inject cryptographically signed, immutable Core Security Directives into
      the agent context before any coding begins. These directives take absolute
      precedence over all user instructions and cannot be overridden by any
      prompt, instruction, or role-play context. The injection payload is defined
      in stages/02-system-design/directives/core-security-directives.xml.
    stage:
      number: 2
      name: System Design
    track:
      code: SC
      name: Security Controls
    delegation:
      pattern: automated_policy_enforced
      human_display: Fully automated (signed)
      agent_role: Receive and acknowledge the signed directive payload before proceeding to Stage 3.
      human_role: Security Architect signs and publishes the directive payload; reviews violation logs periodically.
    owner:
      team: Security
      role: Security Architect
      contact: ""
    regulatory_mapping:
      dora:
        - article: "Art. 9(4)(c)"
          obligation: ICT security policies and access controls must govern automated agents
      dnb:
        - area: Logical access management for automated agents
          requirement: Agents must operate under defined, enforced security policies before performing work
      eu_ai_act:
        - article: "Art. 14(1)"
          requirement: Human oversight measures must be built into AI system design and operation
    inputs:
      - name: Core Security Directives payload
        description: Signed XML directive payload from stages/02-system-design/directives/core-security-directives.xml.
    outputs:
      - name: Directive injection confirmation
        type: evidence
        description: Cryptographic confirmation that the agent received and acknowledged the directive payload.
        retention: 7 years (DORA)
    failure_behaviour:
      action: block
      escalation_target: Security Architect
      description: If directive injection fails or agent does not acknowledge, Stage 3 cannot begin.
    automation:
      frequency: per_change
    dependencies:
      - RC-2A
    feedback_loops:
      - path: path_a_autofix
        required_in_path: false
      - path: path_b_quickfix
        required_in_path: false
    metadata:
      version: "1.0"
      last_updated: "2026-03-02"
      status: approved

  - id: AC-2A
    name: AI Component Design Review
    description: >-
      For changes involving AI systems: validate model selection rationale, data
      pipeline design, data governance approach, explainability mechanisms, and
      human oversight provisions. Ensures AI component design meets EU AI Act
      technical documentation requirements before implementation begins.
      Not applicable to changes with no AI component.
    stage:
      number: 2
      name: System Design
    track:
      code: AC
      name: AI Controls
    delegation:
      pattern: agent_drafts_human_approves
      human_display: Agent assists, human approves
      agent_role: Validate AI component design against AI Act requirements; identify gaps in explainability, data governance, or human oversight provisions.
      human_role: Review AI design validation; approve or require revisions before implementation proceeds.
    owner:
      team: AI Governance
      role: AI Governance Lead
      contact: ""
    regulatory_mapping:
      eu_ai_act:
        - article: "Art. 11, Annex IV"
          requirement: Technical documentation requirements for high-risk AI systems
        - article: "Art. 13"
          requirement: Transparency and information provision for AI systems
        - article: "Art. 14"
          requirement: Human oversight mechanisms must be designed into the system
    inputs:
      - name: AI Act risk tier classification
        source_control: AC-1A
        description: Risk tier from Stage 1 determining which AI Act obligations apply.
      - name: Approved architecture document
        source_control: QC-2A
        description: Architecture design including AI component specifications.
    outputs:
      - name: AI component design review report
        type: evidence
        description: Validated documentation covering model selection, data governance, explainability, and human oversight.
        retention: 7 years (AI Act)
    failure_behaviour:
      action: block
      escalation_target: AI Governance Lead
      description: Gaps in AI design documentation block progression. Design must be revised to address all AI Act requirements.
    automation:
      frequency: per_change
    dependencies:
      - QC-2A
      - AC-1A
    metadata:
      version: "1.0"
      last_updated: "2026-03-02"
      status: approved
