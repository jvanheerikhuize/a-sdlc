# =============================================================================
# Control: QC-4C — Documentation Completeness
# Track:   QC (Quality Controls)
# Owner:   Engineering / Tech Lead
# Schema:  ../../../schema/control.schema.json
# =============================================================================

id: QC-4C
name: Documentation Completeness
description: 'Verify that all required documentation is present, current, and accurately reflects the implementation. Required
  documentation includes: runbooks, API documentation, Architecture Decision Records (ADRs), decision logs from Stage 3, and
  technical documentation required by the AI Act for AI components.'
required_in_stages:
- number: 4
  name: Testing & Documentation
  mandatory: true
track:
  code: QC
  name: Quality Controls
delegation:
  pattern: agent_checks_human_approves
  human_display: Agent checks, human approves
  agent_role: Verify all required documentation exists and is current against the implementation; flag gaps.
  human_role: Review documentation completeness report; approve or require documentation updates.
owner:
  team: Engineering
  role: Tech Lead
  contact: ''
regulatory_mapping:
  dora:
  - article: Art. 8(6)
    obligation: Documentation requirements for ICT risk management including change documentation
  eu_ai_act:
  - article: Art. 11, Annex IV
    requirement: Technical documentation requirements for high-risk AI systems must be complete before deployment
outputs:
- name: Documentation completeness report
  type: evidence
  description: Checklist confirming all required documentation is present, current, and accurately reflects the implementation.
  retention: 7 years (DORA)
failure_behaviour:
  action: block
  escalation_target: Tech Lead
  description: Missing or outdated documentation blocks Stage 4 exit until resolved.
automation:
  frequency: per_release
dependencies:
- QC-3A
metadata:
  version: '1.0'
  last_updated: '2026-03-02'
  status: approved
