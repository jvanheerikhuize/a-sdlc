# =============================================================================
# Stage 2: System Design
# Lightweight stage definition — lists required controls by ID.
# Full control definitions: controls/[track]/[ID].yaml
# =============================================================================

number: 2
name: System Design
description: Translate the approved specification into a complete, approved system design. Security directives are injected
  before coding begins. No implementation may start without RC-2A (design approval) and SC-2B directive injection confirmation.
required_controls:
- id: QC-2A
- id: RC-2A
  note: Human-required gate — cannot be delegated to an agent
- id: SC-2A
- id: SC-2B
  note: Directive injection must be confirmed before Stage 3 begins
- id: AC-2A
  note: Applicable when the change involves an AI component
exit_criteria:
- 'QC-2A: Design validated and approved by Lead Architect'
- 'RC-2A: Design approval granted and logged'
- 'SC-2A: STRIDE threat model validated and all critical threats mitigated'
- 'SC-2B: Stage 2 and Stage 3 directive bundles injected and acknowledged by agent'
- 'AC-2A: AI component design review approved (or not-applicable documented)'
next_stage: 3
process: process.md
artifacts:
  inputs:
    - ../01-intent-ingestion/artifacts/outputs/feature-spec.yaml
  outputs:
    - artifacts/outputs/design-document.yaml
    - artifacts/outputs/stride-threat-model.yaml
    - artifacts/outputs/design-approval-decision.yaml
    - artifacts/outputs/directive-injection-confirmation.yaml
    - artifacts/outputs/ai-component-design-review.yaml
directives:
  - directives/stages/02-system-design.yaml
  - directives/stages/03-coding-implementation.yaml
