# =============================================================================
# Stage 6: Observability & Maintenance — Controls
# =============================================================================
# Schema: ../../schema/control.schema.json
# =============================================================================

controls:

  - id: QC-6A
    name: SLA/SLO Monitoring
    description: >-
      Continuously measure all defined Service Level Indicators (SLIs) against
      Service Level Objectives (SLOs): availability, latency percentiles, error
      rates, and throughput. Track error budget consumption rates and alert when
      burn rate exceeds defined thresholds before SLO breach occurs.
    stage:
      number: 6
      name: Observability & Maintenance
    track:
      code: QC
      name: Quality Controls
    delegation:
      pattern: fully_automated
      human_display: Fully automated
      agent_role: Continuously measure SLIs; compute error budget consumption; trigger alerts when burn rate thresholds are exceeded.
      human_role: Respond to alerts; make decisions on service degradation; initiate feedback loop if code change is needed.
    owner:
      team: Engineering / SRE
      role: SRE Lead
      contact: ""
    regulatory_mapping:
      dora:
        - article: "Art. 10"
          obligation: Detection of anomalous activities impacting operational performance
        - article: "Art. 8(4)"
          obligation: Operational resilience monitoring of ICT systems
      dnb:
        - area: Service level management and performance monitoring
          requirement: Continuous monitoring of service levels with alerting for degradation
    outputs:
      - name: SLO monitoring dashboard
        type: evidence
        description: Continuous record of SLI measurements, SLO compliance status, and error budget consumption.
        retention: 2 years operational + 7 years regulatory
      - name: SLO breach alert
        type: alert
        description: Real-time alert when error budget burn rate exceeds threshold or SLO is breached.
    failure_behaviour:
      action: escalate
      escalation_target: SRE Lead
      description: SLO breach triggers immediate escalation and may initiate a feedback loop for code remediation.
    automation:
      frequency: continuous
    metadata:
      version: "1.0"
      last_updated: "2026-03-02"
      status: approved

  - id: RC-6A
    name: Risk & Health Monitoring
    description: >-
      Continuously monitor the system's operational risk posture: configuration
      drift against approved baseline, new vulnerabilities in the SBOM, threat
      landscape changes, application health indicators, capacity trends, TLS
      certificate expiry, and dependency health. Escalate when risk thresholds
      are crossed.
    stage:
      number: 6
      name: Observability & Maintenance
    track:
      code: RC
      name: Risk Controls
    delegation:
      pattern: automated_with_human_escalation
      human_display: Automated with human escalation
      agent_role: Continuously monitor all risk and health indicators; detect drift, vulnerabilities, and capacity risks; alert on threshold breaches.
      human_role: Respond to escalations; make decisions on risk acceptance or remediation; initiate feedback loops.
    owner:
      team: Risk Management / SRE
      role: Risk Officer
      contact: ""
    regulatory_mapping:
      dora:
        - article: "Art. 8(2)"
          obligation: Continuous identification and assessment of ICT risk including vulnerability management
        - article: "Art. 10"
          obligation: Detection of anomalous activities and potential ICT vulnerabilities
      dnb:
        - area: Continuous risk monitoring and infrastructure health management
          requirement: Ongoing monitoring of configuration, vulnerability, and capacity risks
      eu_ai_act:
        - article: "Art. 9(1)"
          requirement: Continuous and iterative risk management process throughout the AI system lifecycle
    outputs:
      - name: Risk & health monitoring record
        type: evidence
        description: Continuous record of all monitored risk indicators with threshold breach events.
        retention: 7 years (DORA)
      - name: Risk escalation alert
        type: alert
        description: Alert when any monitored risk indicator exceeds its defined threshold.
    failure_behaviour:
      action: escalate
      escalation_target: Risk Officer
      description: Threshold breaches escalate to Risk Officer. Critical risks may trigger emergency feedback loop.
    automation:
      frequency: continuous
    metadata:
      version: "1.0"
      last_updated: "2026-03-02"
      status: approved

  - id: SC-6A
    name: Incident Scanning & Detection
    description: >-
      Real-time SIEM monitoring for security incidents using MITRE ATT&CK
      detection patterns. Classify all detected incidents per DORA Art. 18
      taxonomy and trigger the appropriate reporting timelines: 4-hour initial
      notification, 72-hour intermediate report, 1-month final report for
      major incidents.
    stage:
      number: 6
      name: Observability & Maintenance
    track:
      code: SC
      name: Security Controls
    delegation:
      pattern: automated_with_human_escalation
      human_display: Automated with human escalation
      agent_role: Monitor SIEM continuously; detect and classify incidents; trigger reporting timelines; prepare incident reports.
      human_role: Validate incident classification; approve regulatory reports; make escalation decisions.
    owner:
      team: Security
      role: Security Architect
      contact: ""
    regulatory_mapping:
      dora:
        - article: "Art. 17"
          obligation: ICT-related incident management process including detection and classification
        - article: "Art. 18"
          obligation: Classification of ICT-related incidents per DORA taxonomy
        - article: "Art. 19"
          obligation: Reporting of major ICT incidents to competent authorities within defined timelines
      dnb:
        - area: Incident management and reporting to DNB
          requirement: All major incidents must be reported to DNB within DORA-specified timelines
      eu_ai_act:
        - article: "Art. 73"
          requirement: Reporting of serious AI incidents to relevant authorities
    outputs:
      - name: Incident detection record
        type: log_entry
        description: Real-time log of all detected security events with DORA Art. 18 classification.
        retention: 7 years (DORA)
      - name: Major incident report
        type: report
        description: Regulatory incident report per DORA Art. 19 timelines (initial, intermediate, final).
        retention: 7 years (DORA)
    failure_behaviour:
      action: escalate
      escalation_target: Security Architect
      description: Major incidents trigger immediate escalation and regulatory reporting process.
    automation:
      tooling:
        - SIEM platform
        - MITRE ATT&CK detection rules
      frequency: continuous
    metadata:
      version: "1.0"
      last_updated: "2026-03-02"
      status: approved

  - id: SC-6B
    name: Runtime Anomaly Detection
    description: >-
      Detect behavioural anomalies through statistical baseline monitoring:
      identify deviations in system behaviour patterns, detect AI model drift,
      identify adversarial input patterns, and surface any runtime behaviour
      inconsistent with the approved design. Feeds detected anomalies into the
      SC-6A incident process when thresholds are exceeded.
    stage:
      number: 6
      name: Observability & Maintenance
    track:
      code: SC
      name: Security Controls
    delegation:
      pattern: automated_with_human_escalation
      human_display: Automated with human escalation
      agent_role: Maintain behavioural baselines; apply statistical anomaly detection; detect AI model drift and adversarial inputs; escalate on anomaly.
      human_role: Investigate escalated anomalies; determine whether anomaly represents a security incident or requires code change.
    owner:
      team: Security / SRE
      role: Security Architect
      contact: ""
    regulatory_mapping:
      dora:
        - article: "Art. 10"
          obligation: Detection of anomalous activities and ICT-related incidents through continuous monitoring
      dnb:
        - area: Anomaly detection and early warning systems
          requirement: Statistical anomaly detection required as part of operational monitoring
      eu_ai_act:
        - article: "Art. 15(3)"
          requirement: Resilience of AI systems against errors, inconsistencies, and adversarial inputs
        - article: "Art. 9(2)(b)"
          requirement: Continuous monitoring of identified risks during operation
    outputs:
      - name: Anomaly detection record
        type: log_entry
        description: Continuous record of detected behavioural anomalies with severity and baseline deviation measurements.
        retention: 7 years (DORA)
      - name: Anomaly escalation alert
        type: alert
        description: Alert when anomaly exceeds defined threshold; includes context for human investigation.
    failure_behaviour:
      action: escalate
      escalation_target: Security Architect
      description: High-severity anomalies trigger immediate escalation to Security Architect and may initiate feedback loop.
    automation:
      frequency: continuous
    metadata:
      version: "1.0"
      last_updated: "2026-03-02"
      status: approved

  - id: AC-6A
    name: AI Post-Market Surveillance
    description: >-
      Implement the EU AI Act Art. 72 post-market monitoring system for all
      deployed AI components: continuously track performance metrics, execute
      scheduled bias re-testing, maintain an incident log for serious AI
      incidents, and keep technical documentation current. Report serious AI
      incidents per Art. 73.
    stage:
      number: 6
      name: Observability & Maintenance
    track:
      code: AC
      name: AI Controls
    delegation:
      pattern: agent_monitors_human_reports
      human_display: Agent monitors, human reports
      agent_role: Track AI performance metrics continuously; schedule and execute bias re-testing; detect performance degradation; prepare incident reports.
      human_role: Review AI performance trends; file serious incident reports to regulators; make decisions on retraining or rollback.
    owner:
      team: AI Governance
      role: AI Governance Lead
      contact: ""
    regulatory_mapping:
      eu_ai_act:
        - article: "Art. 72"
          requirement: Post-market monitoring system tracking AI performance and collecting operational data
        - article: "Art. 73"
          requirement: Reporting of serious incidents involving high-risk AI systems to authorities
        - article: "Art. 61"
          requirement: Post-market monitoring plan and system required for all high-risk AI systems
    outputs:
      - name: AI post-market surveillance report
        type: report
        description: Periodic report on AI system performance, bias re-test results, and incident summary.
        retention: 7 years (AI Act)
      - name: Serious AI incident report
        type: report
        description: Regulatory report for serious AI incidents per Art. 73 timelines.
        retention: 7 years (AI Act)
    failure_behaviour:
      action: escalate
      escalation_target: AI Governance Lead
      description: Performance degradation or serious incidents trigger escalation and may initiate a feedback loop for retraining or design change.
    automation:
      frequency: continuous
    metadata:
      version: "1.0"
      last_updated: "2026-03-02"
      status: approved
