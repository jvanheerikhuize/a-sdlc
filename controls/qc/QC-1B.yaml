# =============================================================================
# Control: QC-1B — Coherence & Conflict Resolution
# Track:   QC (Quality Controls)
# Owner:   Product / Delivery / Product Owner
# Schema:  ../../../schema/control.schema.json
# =============================================================================

id: QC-1B
moscow_score: should
name: Coherence & Conflict Resolution
description: Detect contradictions, competing priorities, and logical inconsistencies between requirements. Surface all conflicts
  with severity ratings and resolution options. Force stakeholders to resolve all blocking conflicts before design begins.
required_in_stages:
- number: 1
  name: Intent Ingestion
  mandatory: true
track:
  code: QC
  name: Quality Controls
delegation:
  pattern: agent_analyses_human_resolves
  human_display: Agent analyses, human resolves
  agent_role: Cross-reference all requirements; identify conflicts; generate conflict map with severity ratings and resolution
    options.
  human_role: Review conflict map; make binding decisions on all blocking and significant conflicts.
owner:
  team: Product / Delivery
  role: Product Owner
  contact: ''
regulatory_mapping:
  dora:
  - article: Art. 8
    obligation: Risk identification and assessment of ICT changes must include conflict analysis
  eu_ai_act:
  - article: Art. 9
    requirement: Risk management system must identify foreseeable risks including specification conflicts
inputs:
- name: Validated feature specification
  source_control: QC-1A
  description: Complete specification produced by QC-1A.
outputs:
- name: Conflict resolution record
  type: decision
  description: Log of all conflicts identified, severity ratings, resolution options presented, and stakeholder decisions
    made.
  retention: 7 years (DORA)
failure_behaviour:
  action: block
  escalation_target: Product Owner
  description: Unresolved blocking conflicts prevent progression to Stage 2. Non-blocking conflicts are documented and accepted.
automation:
  frequency: per_change
dependencies:
- QC-1A
metadata:
  version: '1.0'
  last_updated: '2026-03-02'
  status: approved
