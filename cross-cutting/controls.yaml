# =============================================================================
# Cross-Cutting Controls
# =============================================================================
# These three governance controls span all six A-SDLC stages.
# They are always active regardless of the current stage.
# Schema: ../schema/control.schema.json
# =============================================================================

controls:

  - id: GC-0A
    name: Audit Trail & Compliance Reporting
    description: >-
      Log every control execution with timestamp, actor, outcome, and supporting
      evidence. Produce DORA/DNB examination artefacts on demand. The audit trail
      must be immutable and tamper-evident.
    stage:
      number: 0
      name: Cross-Cutting
    track:
      code: GC
      name: Governance Controls
    delegation:
      pattern: fully_automated
      human_display: Fully automated
      agent_role: Execute all control logging and produce audit artefacts automatically.
      human_role: Review audit reports on demand; present artefacts during regulatory examinations.
    owner:
      team: Governance & Compliance
      role: Compliance Officer
      contact: ""
    regulatory_mapping:
      dora:
        - article: "Art. 8(6)"
          obligation: Documentation and reporting of ICT risk management activities
        - article: "Art. 5(2)"
          obligation: Management body accountability for ICT risk framework
      dnb:
        - area: Audit trail requirements
          requirement: Complete, tamper-evident log of all control executions for examination readiness
      eu_ai_act:
        - article: "Art. 12"
          requirement: Record-keeping and logging requirements for high-risk AI systems
        - article: "Art. 17(1)(d)"
          requirement: Quality management documentation requirements
    outputs:
      - name: Control execution log
        type: log_entry
        description: Timestamped, attributed record of every control execution with outcome and evidence references.
        retention: 7 years (DORA Art. 8(6))
      - name: Regulatory examination pack
        type: report
        description: On-demand compilation of all audit artefacts mapped to regulatory obligations.
        retention: 7 years (DORA Art. 8(6))
    failure_behaviour:
      action: block
      escalation_target: Compliance Officer
      description: If audit logging fails, the associated control execution is blocked until logging is restored.
    automation:
      frequency: per_change
    metadata:
      version: "1.0"
      last_updated: "2026-03-02"
      status: approved

  - id: GC-0B
    name: End-to-End Traceability
    description: >-
      Maintain bidirectional traceability linking every deployment artefact back
      to its originating intent, and every intent forward to its resulting
      deployment and monitoring state. Supports impact analysis for proposed changes.
    stage:
      number: 0
      name: Cross-Cutting
    track:
      code: GC
      name: Governance Controls
    delegation:
      pattern: fully_automated
      human_display: Fully automated
      agent_role: Maintain the traceability graph continuously; expose query interface for impact analysis.
      human_role: Invoke impact analysis queries; validate traceability completeness during audits.
    owner:
      team: Engineering Platform
      role: Platform Lead
      contact: ""
    regulatory_mapping:
      dora:
        - article: "Art. 8(5)"
          obligation: Traceability of ICT changes through the full change management process
        - article: "Art. 8(6)"
          obligation: Documented ICT risk management with full change history
      dnb:
        - area: Traceability of changes
          requirement: Bidirectional traceability from requirement to deployment; impact analysis capability
      eu_ai_act:
        - article: "Art. 12(2)"
          requirement: Traceability of AI system functioning and decision-making
    outputs:
      - name: Traceability graph
        type: artefact
        description: Bidirectional graph linking intent → design → code → tests → deployment → monitoring.
        retention: Lifecycle of the system + 7 years
      - name: Impact analysis report
        type: report
        description: On-demand report showing blast radius of a proposed or executed change.
    automation:
      frequency: continuous
    metadata:
      version: "1.0"
      last_updated: "2026-03-02"
      status: approved

  - id: GC-0C
    name: Agent Provenance Registry
    description: >-
      Maintain a centralised registry of all agent contributions across the
      lifecycle: what each agent produced, which decisions it made autonomously,
      and which humans reviewed and approved its output. Supports DORA third-party
      oversight and EU AI Act deployer obligations.
    stage:
      number: 0
      name: Cross-Cutting
    track:
      code: GC
      name: Governance Controls
    delegation:
      pattern: fully_automated
      human_display: Fully automated
      agent_role: Register every contribution, decision, and approval in the provenance registry automatically.
      human_role: Review provenance records; provide regulatory evidence of agent oversight.
    owner:
      team: Governance & Compliance
      role: AI Governance Lead
      contact: ""
    regulatory_mapping:
      dora:
        - article: "Art. 28"
          obligation: Third-party ICT service provider oversight and accountability
        - article: "Art. 8(6)"
          obligation: ICT documentation including agent and automation contributions
      dnb:
        - area: Third-party and agent accountability
          requirement: Registry of agent actions for outsourcing governance and accountability
      eu_ai_act:
        - article: "Art. 17(1)(f)"
          requirement: Data management and quality management documentation
        - article: "Art. 26(5)"
          requirement: Deployer obligations for monitoring AI system operation
    outputs:
      - name: Agent provenance record
        type: registry_entry
        description: Per-contribution entry recording agent identity, action taken, output reference, and approving human.
        retention: 7 years (DORA Art. 28)
    automation:
      frequency: per_change
    metadata:
      version: "1.0"
      last_updated: "2026-03-02"
      status: approved
