# =============================================================================
# Documentation Completeness Report Template
# =============================================================================
# Produced during Step 4.6 by control QC-08.
# Records completeness check of all required documentation artefacts:
# runbooks, API docs, ADRs, decision log, and AI Act technical docs (if applicable).
#
# Retention: 7 years (DORA Art. 8(6)).
#
# Usage:
#   Copy: cp documentation-completeness-report.yaml FEAT-XXXX-documentation-completeness-report.yaml
# =============================================================================

feat_id: ""                        # FEAT-XXXX
stage: 4
control: QC-08
checked_at: ""                     # ISO 8601 datetime
has_ai_component: null             # true | false

required_documents:
  runbooks:
    present: null                  # true | false
    current: null                  # true | false (updated for this change)
    location: ""
    gaps: ""
  api_documentation:
    present: null
    current: null
    location: ""
    gaps: ""
  architecture_decision_records:
    present: null
    current: null
    location: ""
    gaps: ""
  stage_3_decision_log:
    present: null
    location: ""                   # Link to FEAT-XXXX-decision-log.yaml
    gaps: ""

# Populated only when has_ai_component is true
ai_act_technical_documentation:
  applicability: ""                # applicable | not_applicable
  annex_iv_complete: null          # true | false | not_applicable
  sections_missing: []             # List of missing Annex IV section identifiers
  location: ""
  gaps: ""

gaps: []
# Per-gap entries, e.g.:
# - id: "DOC-001"
#   document_type: ""
#   description: ""
#   severity: ""                   # blocking | non_blocking
#   resolved: null                 # true | false
#   resolved_at: ""

summary:
  total_required_documents: 0
  complete: 0
  incomplete: 0
  blocking_gaps: 0                 # Must be 0 before Stage 4 exit
  status: ""                       # passed | failed
  reviewed_by: ""                  # QA name
  reviewed_at: ""                  # ISO 8601 datetime
