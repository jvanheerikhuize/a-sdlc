# =============================================================================
# Regulatory Compliance Matrix
# =============================================================================
# Consolidated view of how the A-SDLC framework addresses key regulatory
# requirement areas across DORA and the EU AI Act.
#
# Regulatory frameworks:
#   DORA      — Digital Operational Resilience Act (EU, effective January 2025)
#   EU AI Act — Artificial Intelligence Act (EU)
# =============================================================================

compliance_matrix:

  - area: Change Management
    controls:
      - QC-3A   # Pull Request Creation & Review
      - QC-5A   # Release Readiness Checklist
      - RC-5A   # CAB Approval
      - GC-0A   # Audit Trail & Compliance Reporting
      - GC-0B   # End-to-End Traceability
    regulatory_coverage:
      dora:
        - article: "Art. 8(5)"
          obligation: Documented procedures for ICT change management
      eu_ai_act: []

  - area: ICT Risk Management
    controls:
      - RC-1A   # Risk Classification
      - RC-2A   # Design Approval
      - RC-4A   # Risk Threshold Evaluation
      - RC-6A   # Risk & Health Monitoring
    regulatory_coverage:
      dora:
        - article: "Art. 8(1–6)"
          obligation: Full ICT risk lifecycle management from identification through monitoring
      eu_ai_act:
        - article: "Art. 9"
          requirement: AI risk tier classification (AC-1A), risk management approval (RC-4A)

  - area: Security Testing
    controls:
      - SC-4A   # SAST
      - SC-4B   # DAST
      - SC-5A   # Infrastructure Security
      - SC-6A   # Incident Scanning & Detection
    regulatory_coverage:
      dora:
        - article: "Art. 24"
          obligation: General requirements for ICT testing including security testing
        - article: "Art. 25"
          obligation: Testing of ICT tools and systems including penetration testing
      eu_ai_act:
        - article: "Art. 15"
          requirement: Bias and robustness testing (AC-4A)

  - area: Incident Management
    controls:
      - SC-6A   # Incident Scanning & Detection
      - GC-0A   # Audit Trail & Compliance Reporting
    regulatory_coverage:
      dora:
        - article: "Art. 17"
          obligation: ICT-related incident management process
        - article: "Art. 18"
          obligation: Classification of incidents per DORA taxonomy
        - article: "Art. 19"
          obligation: Reporting timelines — 4h initial, 72h intermediate, 1 month final
      eu_ai_act:
        - article: "Art. 73"
          requirement: Reporting of serious AI incidents (AC-6A)

  - area: Operational Resilience
    controls:
      - RC-5B   # Rollback Plan Validation
      - QC-6A   # SLA/SLO Monitoring
      - RC-6A   # Risk & Health Monitoring
    regulatory_coverage:
      dora:
        - article: "Art. 11"
          obligation: ICT business continuity including restoration procedures
      eu_ai_act: []

  - area: AI Transparency & Oversight
    controls:
      - AC-2A   # AI Component Design Review
      - SC-2B   # Directive Injection
      - AC-4A   # Bias & Fairness Testing
      - AC-6A   # AI Post-Market Surveillance
    regulatory_coverage:
      dora: []
      eu_ai_act:
        - article: "Art. 13"
          requirement: Transparency and explainability — AC-2A
        - article: "Art. 14"
          requirement: Human oversight measures — SC-2B, AC-2A
        - article: "Art. 10"
          requirement: Data governance — AC-2A, AC-4A
        - article: "Art. 72"
          requirement: Post-market monitoring — AC-6A

  - area: Third-Party & Agent Oversight
    controls:
      - GC-0C   # Agent Provenance Registry
      - SC-3A   # Permission Management
      - SC-2B   # Directive Injection
      - GC-3A   # Code Provenance Tracking
    regulatory_coverage:
      dora:
        - article: "Art. 28"
          obligation: Third-party ICT service provider oversight
        - article: "Art. 28a"
          obligation: Supply chain security
      eu_ai_act:
        - article: "Art. 17(1)(f)"
          requirement: Data management and quality management documentation (GC-3A, GC-0C)
        - article: "Art. 26(5)"
          requirement: Deployer obligations for monitoring AI systems (GC-0C)

  - area: Supply Chain Integrity
    controls:
      - SC-5B   # Deployment Integrity
      - GC-3A   # Code Provenance Tracking
      - SC-3C   # Secrets & Credentials Scanning
    regulatory_coverage:
      dora:
        - article: "Art. 28a"
          obligation: Supply chain security for ICT systems
      eu_ai_act:
        - article: "Art. 15(3)"
          requirement: Resilience against supply chain manipulation (SC-5B)

  - area: Documentation & Audit
    controls:
      - GC-0A   # Audit Trail & Compliance Reporting
      - GC-0B   # End-to-End Traceability
      - QC-4C   # Documentation Completeness
      - AC-2A   # AI Component Design Review
    regulatory_coverage:
      dora:
        - article: "Art. 8(6)"
          obligation: Documentation and reporting requirements for ICT risk management
      eu_ai_act:
        - article: "Art. 11, Annex IV"
          requirement: Technical documentation requirements (QC-4C, AC-2A)

  - area: Agent Security Governance
    controls:
      - SC-2B   # Directive Injection
      - SC-3A   # Permission Management
      - SC-3B   # Post-Guardrails
      - SC-1A   # Pre-Guardrails
    regulatory_coverage:
      dora:
        - article: "Art. 9(4)"
          obligation: ICT security policies and access controls governing automated agents
      eu_ai_act:
        - article: "Art. 14"
          requirement: Human oversight — SC-2B
        - article: "Art. 15(4)"
          requirement: Resilience against manipulation — SC-1A, SC-3B
