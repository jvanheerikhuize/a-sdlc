# =============================================================================
# Stage 4: Testing & Documentation
# Lightweight stage definition — lists required controls by ID.
# Full control definitions: controls/[track]/[ID].yaml
# =============================================================================

number: 4
name: Testing & Documentation
description: Validate the implementation against all acceptance criteria, security requirements, and documentation standards.
  RC-05 is the formal go/no-go gate for deployment. No change proceeds to Stage 5 without a passing or conditionally accepted
  RC-05 result.

roles:
  - code: AGT
    name: Agent
    responsibilities: Executes test suites; runs scans; checks documentation completeness; calculates risk threshold; presents evidence
  - code: QA
    name: QA Engineer
    responsibilities: Reviews functional and NFR test results; investigates failures; approves documentation completeness
  - code: SA
    name: Security Architect
    responsibilities: Reviews SAST and DAST findings; triages CWE-mapped vulnerabilities; approves risk acceptance for security findings
  - code: AGL
    name: AI Governance Lead
    responsibilities: Reviews AI output validation and bias test results; approves AI-specific risk acceptance
  - code: RO
    name: Risk Officer
    responsibilities: Makes the formal go/no-go decision at RC-05; provides documented risk acceptance for conditional pass
  - code: CO
    name: Compliance Officer
    responsibilities: Reviews documentation artefacts and test evidence during regulatory audits

# Execution DAG: Machine-parseable sequencing (agents use this, not process.md)
# SC-12 (SAST) runs first. Steps 4.2–4.6 (QC-06, SC-13, QC-07, AC-05, QC-08) run in parallel.
# SC-14 (API security) and SC-15 (adversarial robustness) run with the parallel group.
# RC-05 (go/no-go gate) runs last, depends on all others.
workflow:
  nodes:
    - id: n-sc4a
      step_number: "4.1"
      title: SAST
      control: SC-12
      description: SAST (static application security testing)
      delegation: Fully automated
      depends_on: []
      actors:
        - role: AGT
          action: Execute static analysis scan across the full codebase; apply heightened scrutiny to agent-generated code
        - role: AGT
          action: "Map all findings to CWE categories; assign severity ratings"
        - role: SA
          action: "Review findings; triage critical and high findings; remediate or document risk acceptance"
      input: "Merged source code from Stage 3"
      output: "SAST scan report (artifacts/outputs/sast-scan-report.yaml)"
      on_failure: "Critical or high findings block Stage 4 exit until remediated or formally accepted by SA"
    - id: n-qc4a
      step_number: "4.2"
      title: Functional & Non-Functional Testing
      control: QC-06
      description: Functional and non-functional testing
      delegation: "Agent executes, QA reviews"
      depends_on: [n-sc4a]
      actors:
        - role: AGT
          action: Execute functional tests mapped to every Stage 1 acceptance criterion
        - role: AGT
          action: Execute regression, negative, boundary, performance, load, stress, accessibility, and resilience tests
        - role: AGT
          action: Produce pass/fail report with each result traced to its originating acceptance criterion
        - role: QA
          action: Review test results; investigate failures; determine if failures block release or require Stage 3 return
      input: "Merged code + Stage 1 feature specification (acceptance criteria)"
      output: "Test results report (artifacts/outputs/test-results-report.yaml)"
      on_failure: "Failing acceptance criteria block Stage 4 exit; work returns to Stage 3 for remediation"
    - id: n-sc4b
      step_number: "4.3"
      title: DAST
      control: SC-13
      description: DAST (dynamic application security testing)
      delegation: Fully automated
      depends_on: [n-sc4a]
      actors:
        - role: AGT
          action: Execute runtime security test suite against deployed test environment
        - role: AGT
          action: "Test injection attacks, authentication flaws, session management, TLS, OWASP Top 10 categories"
        - role: SA
          action: Review findings; remediate or formally accept residual risk per severity policy
      input: "Application deployed to test environment"
      output: "DAST scan report (artifacts/outputs/dast-scan-report.yaml)"
      on_failure: "Critical or high runtime findings block Stage 4 exit"
    - id: n-qc4b
      step_number: "4.4"
      title: AI Output Validation
      control: QC-07
      description: AI output validation (conditional on ai_component)
      delegation: "Agent executes, AGL reviews"
      depends_on: [n-sc4a]
      condition: "Only applicable when the change involves an AI component. If not applicable, document as not_applicable."
      actors:
        - role: AGT
          action: Execute hallucination detection tests; measure accuracy against defined thresholds
        - role: AGT
          action: Run output consistency tests across equivalent inputs; execute boundary condition tests
        - role: AGL
          action: Review AI validation results; determine whether accuracy thresholds are acceptable for release
      input: "AI component deployed to test environment + AI tier classification from Stage 1"
      output: "AI output validation report (artifacts/outputs/ai-output-validation-report.yaml)"
      on_failure: "AI systems failing accuracy thresholds cannot proceed to Stage 5"
    - id: n-ac4a
      step_number: "4.5"
      title: Bias & Fairness Testing
      control: AC-05
      description: Bias and fairness testing (conditional on ai_component)
      delegation: "Agent executes, AGL reviews"
      depends_on: [n-sc4a]
      condition: "Only applicable when the change involves an AI component. If not applicable, document as not_applicable."
      actors:
        - role: AGT
          action: Execute bias test suite across protected characteristic groups (age, gender, ethnicity, disability)
        - role: AGT
          action: Measure disparate impact for each group; compare against defined thresholds
        - role: AGL
          action: Review bias test results; determine if disparate impact is within acceptable thresholds
      input: "AI component deployed to test environment"
      output: "Bias & fairness report (artifacts/outputs/bias-fairness-report.yaml)"
      on_failure: "Discriminatory outcomes exceeding defined thresholds block deployment; design or training data must be revised"
    - id: n-qc4c
      step_number: "4.6"
      title: Documentation Completeness
      control: QC-08
      description: Documentation completeness
      delegation: "Agent checks, human approves"
      depends_on: [n-sc4a]
      actors:
        - role: AGT
          action: "Verify all required documentation exists and is current: runbooks, API docs, ADRs, Stage 3 decision log"
        - role: AGT
          action: "For AI components: verify AI Act technical documentation (Annex IV) is complete"
        - role: AGT
          action: Flag any gaps or outdated documentation
        - role: QA
          action: Review documentation completeness report; approve or require documentation updates
      input: "All documentation artefacts from the change"
      output: "Documentation completeness report (artifacts/outputs/documentation-completeness-report.yaml)"
      on_failure: "Missing or outdated documentation blocks Stage 4 exit until resolved"
    - id: n-sc4c
      step_number: "4.2-api"
      title: API Security Testing
      control: SC-14
      description: API security testing (OWASP API Top 10)
      delegation: Fully automated
      depends_on: [n-sc4a]
      actors:
        - role: AGT
          action: Execute OWASP API Security Top 10 test suite against all exposed APIs
        - role: SA
          action: Review findings; remediate critical issues or provide risk acceptance
      input: "Deployed APIs"
      output: "API security test report (artifacts/outputs/api-security-report.yaml)"
      on_failure: "Unresolved OWASP API Top 10 violations block Stage 4 exit"
    - id: n-sc4d
      step_number: "4.7-ai-adversarial"
      title: Adversarial AI Robustness Testing
      control: SC-15
      description: Adversarial AI robustness testing (conditional on high-risk AI)
      delegation: Fully automated
      depends_on: [n-sc4a]
      condition: "Only applicable for high-risk or security-critical AI deployments. If not applicable, document as not_applicable."
      actors:
        - role: AGT
          action: Generate adversarial test inputs to probe AI model robustness
        - role: SA
          action: Review results; assess susceptibility to adversarial attack
      input: "AI model + adversarial test suite"
      output: "Adversarial robustness report (artifacts/outputs/adversarial-robustness-report.yaml)"
      note: "Conditional on high-risk AI deployments"
    - id: n-rc4a
      step_number: "4.8"
      title: Risk Threshold Evaluation
      control: RC-05
      description: Risk threshold evaluation and go/no-go gate
      delegation: "Agent calculates, RO decides"
      depends_on: [n-qc4a, n-sc4b, n-qc4b, n-ac4a, n-qc4c, n-sc4c, n-sc4d]
      actors:
        - role: AGT
          action: Aggregate all Stage 4 control results; calculate residual risk score
        - role: AGT
          action: Present recommendation with supporting evidence from each control
        - role: RO
          action: Review aggregated results; make formal go/no-go decision
        - role: RO
          action: "For conditional pass: provide documented risk acceptance signed with identity and timestamp"
      input: "All Stage 4 control outputs (steps 4.1-4.7)"
      output: "Risk threshold evaluation (artifacts/outputs/risk-threshold-evaluation.yaml)"
      on_failure: "Work returns to Stage 3; specific failures documented; remediation required before retesting"
      tables:
        - title: "Go/No-Go Outcomes"
          columns: [Outcome, Meaning, Next step]
          rows:
            - [Pass, "Residual risk within appetite", "Proceed to Stage 5"]
            - [Conditional pass, "Residual risk exceeds appetite but is formally accepted", "RO documents risk acceptance; proceed to Stage 5"]
            - [Fail, "Residual risk exceeds appetite; cannot be accepted", "Return to Stage 3; document specific failures"]
  parallelism:
    max_concurrent: 7
    groups:
      - [n-qc4a, n-sc4b, n-qc4b, n-ac4a, n-qc4c, n-sc4c, n-sc4d]

required_controls:
- id: QC-06
- id: QC-07
  note: Applicable when the change involves an AI component
- id: QC-08
- id: SC-12
- id: SC-13
- id: SC-14
  note: Test all exposed APIs against OWASP API Security Top 10
- id: AC-05
  note: Applicable when the change involves an AI component
- id: SC-15
  note: Applicable for high-risk or security-critical AI deployments
- id: RC-05
  note: Final go/no-go gate — depends on all other Stage 4 controls
exit_criteria:
- 'QC-06: All acceptance criteria from Stage 1 have passing tests'
- 'QC-07: AI output validation passed within defined accuracy thresholds (or not-applicable)'
- 'QC-08: Documentation completeness confirmed and approved'
- 'SC-12: SAST passed — no critical or high-severity findings unresolved'
- 'SC-13: DAST passed — no critical or high-severity findings unresolved'
- 'SC-14: API security testing passed — no OWASP API Top 10 violations unresolved'
- 'AC-05: Bias & fairness test passed within defined thresholds (or not-applicable)'
- 'SC-15: Adversarial robustness testing completed (if applicable for high-risk AI)'
- 'RC-05: Go/no-go decision is PASS or CONDITIONAL PASS with formal risk acceptance'
next_stage: 5
artifacts:
  inputs:
    - ../01-intent-ingestion/artifacts/outputs/QC-01-feature-spec.yaml
    - ../01-intent-ingestion/artifacts/outputs/AC-01-ai-tier-classification.yaml
    - ../03-coding-implementation/artifacts/outputs/QC-04-pull-request-record.yaml
  outputs:
    - artifacts/outputs/QC-06-test-results-report.yaml
    - artifacts/outputs/SC-12-sast-scan-report.yaml
    - artifacts/outputs/SC-13-dast-scan-report.yaml
    - artifacts/outputs/QC-08-documentation-completeness-report.yaml
    - artifacts/outputs/QC-07-ai-output-validation-report.yaml
    - artifacts/outputs/AC-05-bias-fairness-report.yaml
    - artifacts/outputs/RC-05-risk-threshold-evaluation.yaml
    - artifacts/outputs/SC-14-api-security-report.yaml
    - artifacts/outputs/SC-15-adversarial-robustness-report.yaml
