# =============================================================================
# SLO Monitoring Record Template
# =============================================================================
# Produced continuously by control QC-6A (Step 6.2).
# Records SLI measurements, error budget consumption, and burn rate alerts.
# Updated on a rolling basis for the operational lifetime of the system.
#
# Retention: 7 years (DORA Art. 8(6)).
#
# Usage:
#   This file is continuously updated. Do not copy per feature.
# =============================================================================

system_id: ""                      # System or service identifier
stage: 6
control: QC-6A

slos: []
# Per-SLO entries, e.g.:
# - id: "SLO-001"
#   name: ""                       # e.g. "API Availability"
#   sli_type: ""                   # availability | latency | error_rate | throughput
#   target: null                   # e.g. 0.999 (99.9%)
#   window_days: null              # Rolling window in days
#   current_value: null            # Latest measured value
#   error_budget_remaining: null   # Fraction remaining, e.g. 0.40 = 40%
#   burn_rate: null                # Current burn rate multiplier
#   burn_rate_threshold: null      # Alert threshold
#   status: ""                     # healthy | at_risk | breached
#   last_measured_at: ""           # ISO 8601 datetime

alerts: []
# Per-alert entries, e.g.:
# - id: "ALERT-001"
#   slo_id: ""
#   type: ""                       # burn_rate | slo_breach
#   triggered_at: ""               # ISO 8601 datetime
#   severity: ""                   # critical | high | medium
#   acknowledged_by: ""            # OPS name
#   acknowledged_at: ""
#   resolved: null                 # true | false
#   resolved_at: ""
#   action_taken: ""               # What OPS did in response
#   feedback_loop_triggered: null  # true | false
#   feedback_loop_path: ""         # path_a | path_b_quickfix | path_b_feature

summary:
  slos_total: 0
  slos_healthy: 0
  slos_at_risk: 0
  slos_breached: 0
  open_alerts: 0
  last_updated: ""                 # ISO 8601 datetime
